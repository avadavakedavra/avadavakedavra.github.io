<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Calendar — SEHR Academy</title>
<meta name="theme-color" content="#8BC53F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f2eb;--cream-2:#ede9e0;--cream-3:#e4dfd4;
  --white:#fdfcfa;--ink:#1a1a18;--ink-2:#2e2e2b;
  --muted:#7a7970;--pale:#b0ada4;--rule:#d8d4cb;
  --lime:#8BC53F;--lime-2:#72a530;--lime-3:#5e8a24;--lime-mid:#c8e48e;
  --c10:#d97706;--c10bg:rgba(217,119,6,.1);--c10bd:rgba(217,119,6,.3);
  --c11:#2563eb;--c11bg:rgba(37,99,235,.1);--c11bd:rgba(37,99,235,.3);
  --c12:#dc2626;--c12bg:rgba(220,38,38,.1);--c12bd:rgba(220,38,38,.3);
  --cn:#16a34a; --cnbg:rgba(22,163,74,.1);  --cnbd:rgba(22,163,74,.3);
  --cj:#7c3aed; --cjbg:rgba(124,58,237,.1); --cjbd:rgba(124,58,237,.3);
  --hol:#be185d;--holbg:rgba(190,24,93,.07);--holbd:rgba(190,24,93,.25);
  --f:'Open Sans',sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
  --sh:0 1px 4px rgba(0,0,0,.06);
  --sh2:0 4px 16px rgba(0,0,0,.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--cream);color:var(--ink);font-size:13px;line-height:1.5;min-height:100vh}
button{font-family:var(--f);cursor:pointer}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--ink);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .5s var(--ease);opacity:0;pointer-events:none}
#loader.on{opacity:1;pointer-events:all}
#loader::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);background-size:48px 48px}
#loader::after{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(139,197,63,.12),transparent 65%)}
.ld{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.ld-br{font-size:12px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:36px;display:flex;align-items:center;gap:10px}
.ld-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:ldot 2s ease-in-out infinite}
@keyframes ldot{0%,100%{box-shadow:0 0 0 0 rgba(139,197,63,.6)}50%{box-shadow:0 0 0 8px rgba(139,197,63,0)}}
.ld-ring{position:relative;width:60px;height:60px;margin-bottom:30px}
.ldr-a{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(255,255,255,.07)}
.ldr-b{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--lime);border-right-color:rgba(139,197,63,.3);animation:rs .9s linear infinite}
.ldr-c{position:absolute;inset:10px;border-radius:50%;border:1.5px solid transparent;border-bottom-color:rgba(139,197,63,.4);animation:rs .9s linear infinite reverse}
.ldr-d{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 10px rgba(139,197,63,.6)}
@keyframes rs{to{transform:rotate(360deg)}}
.ld-tx{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:28px;animation:ltx 1.8s ease-in-out infinite}
@keyframes ltx{0%,100%{opacity:.3}50%{opacity:.7}}
.ld-ba{width:150px;height:1px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden}
.ld-bf{height:100%;background:linear-gradient(90deg,var(--lime-3),var(--lime),#a6dc52);animation:lf 1.4s cubic-bezier(.4,0,.2,1) infinite}
@keyframes lf{0%{width:0%;margin-left:0%}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.ld-err{color:rgba(255,255,255,.5);font-size:12px;text-align:center;max-width:300px;margin-top:16px;display:none}
.ld-err.on{display:block}

/* MASTHEAD */
.mast{background:var(--ink);border-bottom:3px solid var(--lime);position:relative;overflow:hidden}
.mast::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04)1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.mast::after{content:'';position:absolute;top:-100px;right:-100px;width:440px;height:440px;border-radius:50%;background:radial-gradient(circle,rgba(139,197,63,.16),transparent 65%);pointer-events:none}
.mast-wm{position:absolute;right:-10px;bottom:-20px;font-size:160px;font-weight:800;letter-spacing:-6px;color:rgba(255,255,255,.04);pointer-events:none;user-select:none;white-space:nowrap;line-height:1}
.mast-in{max-width:1400px;margin:0 auto;padding:28px 32px 24px;position:relative;z-index:1;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:24px}
.mast-kick{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mast-kick-rule{width:18px;height:2px;background:var(--lime);flex-shrink:0}
.mast-kick-txt{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--lime);opacity:.9}
.mast-title{font-size:clamp(18px,2.5vw,30px);font-weight:800;letter-spacing:-1px;color:#fff;line-height:1}
.mast-title i{font-style:italic;font-weight:300;color:var(--lime)}
.month-nav{display:flex;align-items:center;gap:8px;justify-content:center}
.nav-arr{width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;transition:all .16s}
.nav-arr:hover{border-color:var(--lime);color:var(--lime)}
.nav-arr svg{width:13px;height:13px}
.month-lbl{font-size:18px;font-weight:800;color:#fff;min-width:190px;text-align:center;position:relative}
.month-lbl select{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
.mast-right{display:flex;align-items:center;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.mast-clock{font-size:11px;color:rgba(255,255,255,.3);font-variant-numeric:tabular-nums}
.mast-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:4px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);font-family:var(--f);font-size:11px;font-weight:700;color:rgba(255,255,255,.6);transition:all .16s;white-space:nowrap}
.mast-btn:hover{background:rgba(255,255,255,.13);color:#fff}
.mast-btn svg{width:11px;height:11px}

/* STATS STRIP */
.stats-strip{background:var(--white);border-bottom:1.5px solid var(--cream-3);display:grid;grid-template-columns:repeat(5,1fr);box-shadow:var(--sh)}
.ss{padding:12px 18px;border-right:1px solid var(--rule);transition:background .12s}
.ss:last-child{border-right:none}
.ss:hover{background:var(--cream)}
.ss-lb{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--pale);margin-bottom:5px}
.ss-vl{font-size:22px;font-weight:800;letter-spacing:-1px;color:var(--ink);line-height:1;margin-bottom:2px}
.ss-vl.lime{color:var(--lime-2)}
.ss-sb{font-size:9px;color:var(--muted)}
.mini-bar{display:flex;gap:2px;margin-top:10px;height:4px;border-radius:4px;overflow:hidden}
.mini-seg{height:100%;border-radius:4px;transition:width .6s var(--ease)}

/* FILTER NAV */
.filter-nav{background:var(--white);border-bottom:1.5px solid var(--cream-3);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.filter-nav::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--lime),var(--lime-2),var(--lime-3))}
.filter-nav-in{max-width:1400px;margin:0 auto;padding:0 32px;display:flex;align-items:center;gap:0}
.ftab{display:flex;align-items:center;gap:6px;padding:11px 14px;font-size:11px;font-weight:700;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;transition:all .14s;white-space:nowrap}
.ftab:hover{color:var(--ink-2)}
.ftab.on{border-bottom-color:var(--lime);color:var(--ink)}
.ftab .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fsep{width:1px;height:20px;background:var(--rule);margin:0 8px;align-self:center;flex-shrink:0}
.sync-btn{margin-left:auto;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:4px;border:1px solid var(--cream-3);background:var(--white);font-family:var(--f);font-size:10px;font-weight:700;color:var(--muted);transition:all .14s;white-space:nowrap}
.sync-btn:hover{border-color:var(--lime-mid);color:var(--lime-2)}
.sync-btn svg{width:10px;height:10px}
.sync-btn.spinning svg{animation:rs .7s linear infinite}

/* PAGE */
.pw{max-width:1400px;margin:0 auto;padding:20px 32px 60px}
.cal-status{font-size:11px;color:var(--pale);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.cal-status-dot{width:6px;height:6px;border-radius:50%;background:var(--lime);animation:ldot 2s ease-in-out infinite}
.cal-status-dot.err{background:var(--hol);animation:none}

/* CALENDAR */
.dow-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
.dow{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--pale);text-align:center;padding:5px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

/* DAY CELL */
.day{background:var(--white);border:1.5px solid var(--cream-3);border-radius:6px;min-height:108px;padding:9px 9px 7px;box-shadow:var(--sh);transition:box-shadow .14s;display:flex;flex-direction:column}
.day:hover:not(.empty):not(.wknd){box-shadow:var(--sh2)}
.day.empty{background:transparent;border-color:transparent;box-shadow:none}
.day.wknd{background:var(--cream);opacity:.5}
.day.today{border-color:var(--lime)!important;box-shadow:0 0 0 2px rgba(139,197,63,.15),var(--sh2)}
.day.hday{border-color:var(--holbd)!important;background:var(--holbg)}
.day.dim{opacity:.3}

/* date number */
.dn{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;line-height:1}
.dn-n{font-size:13px;font-weight:800;color:var(--ink-2)}
.day.today .dn-n{color:var(--lime-2)}
.day.wknd .dn-n{color:var(--pale)}
.today-ring{width:22px;height:22px;border-radius:50%;background:var(--lime);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}

/* subject pill */
.pill{border-radius:5px;padding:5px 8px;cursor:pointer;transition:filter .13s,transform .13s;border-left:3px solid transparent;margin-top:auto}
.pill:hover{filter:brightness(.95);transform:translateX(1px)}
.pill .pl-time{font-size:9px;font-weight:700;opacity:.6;margin-bottom:2px}
.pill .pl-name{font-size:11px;font-weight:800;line-height:1.25}
.pill.math{background:var(--c10bg);border-left-color:var(--c10);color:var(--c10)}
.pill.sci {background:var(--c11bg);border-left-color:var(--c11);color:var(--c11)}
.pill.soc {background:var(--c12bg);border-left-color:var(--c12);color:var(--c12)}
.pill.lang{background:var(--cnbg); border-left-color:var(--cn); color:var(--cn)}
.pill.mix {background:var(--cjbg); border-left-color:var(--cj); color:var(--cj)}
.pill.hol {background:var(--holbg);border-left-color:var(--hol);color:var(--hol)}

.hol-label{font-size:9px;font-weight:600;color:var(--hol);font-style:italic;line-height:1.4;margin-top:auto;opacity:.8}

/* MODAL */
#modal{position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
#modal.on{opacity:1;pointer-events:all}
.mbg{position:absolute;inset:0;background:rgba(26,26,24,.45);backdrop-filter:blur(6px)}
.mbox{position:relative;z-index:1;background:var(--white);border:1.5px solid var(--cream-3);border-radius:8px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.18);animation:mIn .2s var(--ease) both}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(12px)}to{opacity:1;transform:none}}
.mband{height:4px}
.mhead{padding:18px 20px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mhead-l .msub{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;opacity:.65;margin-bottom:3px}
.mhead-l .mtit{font-size:20px;font-weight:800;color:var(--ink);line-height:1.2}
.mcls{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--rule);background:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .14s;margin-top:2px}
.mcls:hover{background:var(--cream-2)}
.mcls svg{width:11px;height:11px;color:var(--muted)}
.mbody{padding:0 20px 14px;display:flex;flex-direction:column;gap:0}
.mr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--rule)}
.mr:last-child{border-bottom:none}
.mr-ic{width:28px;height:28px;border-radius:4px;background:var(--cream-2);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mr-ic svg{width:12px;height:12px;color:var(--lime-2)}
.mr-l{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pale);margin-bottom:1px}
.mr-v{font-size:13px;font-weight:600;color:var(--ink-2)}
.mfoot{padding:12px 20px 16px;display:flex;gap:8px}
.mfb{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:4px;font-family:var(--f);font-size:11px;font-weight:800;cursor:pointer;transition:all .16s;border:none;text-decoration:none}
.mfb.lime{background:var(--lime);color:var(--ink)}
.mfb.lime:hover{background:var(--lime-2)}
.mfb.ghost{background:var(--cream-2);color:var(--ink-2);border:1px solid var(--rule)}
.mfb.ghost:hover{border-color:var(--lime-mid);color:var(--lime-2)}

/* RESPONSIVE */
@media(max-width:1100px){.mast-in{grid-template-columns:1fr auto}.mast-wm{font-size:100px}.stats-strip{grid-template-columns:repeat(3,1fr)}.ss:nth-child(3){border-right:none}.ss:nth-child(n+4){border-top:1px solid var(--rule)}}
@media(max-width:800px){.mast-in{padding:18px 16px;grid-template-columns:1fr}.mast-right{justify-content:flex-start}.mast-wm{display:none}.pw{padding:14px 16px 48px}.filter-nav-in{padding:0 16px}.day{min-height:80px;padding:7px}}
@media(max-width:560px){.cal-grid,.dow-hdr{grid-template-columns:repeat(7,1fr)}.cal-grid{gap:3px}.day{min-height:62px}.stats-strip{grid-template-columns:repeat(2,1fr)}.ss:nth-child(2){border-right:none}.ss:nth-child(n+3){border-top:1px solid var(--rule)}.ss:nth-child(3){border-right:1px solid var(--rule)}}
@media print{.filter-nav,.mast-right,.mfoot,.sync-btn{display:none!important}.mast{-webkit-print-color-adjust:exact;print-color-adjust:exact}.day{break-inside:avoid}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader" class="on">
  <div class="ld">
    <div class="ld-br"><span>SEHR</span><div class="ld-dot"></div><span>ACADEMY</span></div>
    <div class="ld-ring"><div class="ldr-a"></div><div class="ldr-b"></div><div class="ldr-c"></div><div class="ldr-d"></div></div>
    <div class="ld-tx" id="ldTx">Loading calendar</div>
    <div class="ld-ba"><div class="ld-bf"></div></div>
    <div class="ld-err" id="ldErr"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="mbg" id="mBg"></div>
  <div class="mbox">
    <div class="mband" id="mBand"></div>
    <div class="mhead">
      <div class="mhead-l">
        <div class="msub" id="mSub"></div>
        <div class="mtit" id="mTit"></div>
      </div>
      <button class="mcls" id="mClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="mbody" id="mBody"></div>
    <div class="mfoot" id="mFoot"></div>
  </div>
</div>

<!-- MASTHEAD -->
<div class="mast">
  <div class="mast-wm" aria-hidden="true">CALENDAR</div>
  <div class="mast-in">
    <div>
      <div class="mast-kick"><div class="mast-kick-rule"></div><span class="mast-kick-txt">SEHR Academy &middot; SSLC Class 10 &middot; 2026&ndash;27</span></div>
      <div class="mast-title">Academic <i>Calendar</i></div>
    </div>
    <div class="month-nav">
      <button class="nav-arr" id="prevBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
      <div class="month-lbl" id="monthLbl">— <select id="monthSel"></select></div>
      <button class="nav-arr" id="nextBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>
    </div>
    <div class="mast-right">
      <span class="mast-clock" id="clock"></span>
      <button class="mast-btn" id="todayBtn">Today</button>
      <button class="mast-btn" onclick="window.print()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>Print</button>
    </div>
  </div>
</div>

<!-- STATS STRIP -->
<div class="stats-strip">
  <div class="ss"><div class="ss-lb">This Month</div><div class="ss-vl" id="stSess">—</div><div class="ss-sb">class sessions</div></div>
  <div class="ss"><div class="ss-lb">Holidays</div><div class="ss-vl" id="stHols">—</div><div class="ss-sb">this month</div></div>
  <div class="ss"><div class="ss-lb">Mathematics</div><div class="ss-vl lime" id="stMath">—</div><div class="ss-sb">Mon + Fri</div></div>
  <div class="ss"><div class="ss-lb">Science</div><div class="ss-vl" id="stSci">—</div><div class="ss-sb">Tue + Fri</div></div>
  <div class="ss">
    <div class="ss-lb">Subject Mix</div>
    <div class="mini-bar" id="miniBar"></div>
    <div class="ss-sb" style="margin-top:6px">Mon &middot; Tue &middot; Wed &middot; Thu &middot; Fri</div>
  </div>
</div>

<!-- FILTER NAV -->
<div class="filter-nav">
  <div class="filter-nav-in">
    <button class="ftab on" data-f=""><span class="dot" style="background:var(--lime)"></span>All</button>
    <button class="ftab" data-f="Math"><span class="dot" style="background:var(--c10)"></span>Mathematics</button>
    <button class="ftab" data-f="Science"><span class="dot" style="background:var(--c11)"></span>Science</button>
    <button class="ftab" data-f="Social"><span class="dot" style="background:var(--c12)"></span>Social Science</button>
    <button class="ftab" data-f="Language"><span class="dot" style="background:var(--cn)"></span>Languages</button>
    <button class="ftab" data-f="Review"><span class="dot" style="background:var(--cj)"></span>Fri Review</button>
    <div class="fsep"></div>
    <button class="ftab" data-f="Holiday"><span class="dot" style="background:var(--hol)"></span>Holidays</button>
    <button class="sync-btn" id="syncBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Sync Sheet
    </button>
  </div>
</div>

<!-- CALENDAR -->
<div class="pw">
  <div class="cal-status" id="calStatus"></div>
  <div class="dow-hdr">
    <div class="dow">Mon</div><div class="dow">Tue</div><div class="dow">Wed</div>
    <div class="dow">Thu</div><div class="dow">Fri</div>
    <div class="dow" style="opacity:.35">Sat</div><div class="dow" style="opacity:.35">Sun</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<script>
(function(){
'use strict';

/* ================================================================
   APPS SCRIPT CONFIG
   1. In your Sheet: Extensions > Apps Script
   2. Paste the code from AppsScript.gs, save
   3. Deploy > New deployment > Web app
      Execute as: Me | Who has access: Anyone
   4. Copy the /exec URL and paste below
================================================================ */
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiRD9dY_5ghLvhNGQshEW5gn4xEa0UoTCxC_C6W8i4aWMj06hslCFbb2vQ3tDVgo-q/exec';

var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var RANGE=[{y:2026,m:6},{y:2026,m:7},{y:2026,m:8},{y:2026,m:9},{y:2026,m:10},{y:2026,m:11},{y:2026,m:12},{y:2027,m:1},{y:2027,m:2},{y:2027,m:3}];

var TYPE_KEY={
  'Math':    {key:'math', css:'var(--c10)', label:'Mathematics'},
  'Science': {key:'sci',  css:'var(--c11)', label:'Science'},
  'Social':  {key:'soc',  css:'var(--c12)', label:'Social Science'},
  'Language':{key:'lang', css:'var(--cn)',  label:'Languages'},
  'Review':  {key:'mix',  css:'var(--cj)',  label:'Maths + Science'},
  'Holiday': {key:'hol',  css:'var(--hol)', label:'Holiday'}
};

var DATA={}, CUR=0, FILTER='', LOADED=false;

function g(id){return document.getElementById(id);}
function pad(n){return String(n).padStart(2,'0');}

/* clock */
function tick(){var n=new Date(),h=n.getHours(),m=n.getMinutes(),sfx=h>=12?'pm':'am';h=h%12||12;g('clock').textContent=h+':'+(m<10?'0':'')+m+' '+sfx+' \xb7 '+n.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}
setInterval(tick,15000);tick();

/* month select */
(function(){
  var sel=g('monthSel');
  RANGE.forEach(function(r,i){var o=document.createElement('option');o.value=i;o.textContent=MONTHS[r.m-1]+' '+r.y;sel.appendChild(o);});
  var now=new Date(),y=now.getFullYear(),m=now.getMonth()+1;
  var idx=RANGE.findIndex(function(r){return r.y===y&&r.m===m;});
  CUR=idx>=0?idx:0;sel.value=CUR;
})();

/* ── fetch from Apps Script Web App ── */
function fetchSheet(cb){
  if(APPS_SCRIPT_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    loadFallback();
    setStatus('\u26a0 Paste your Apps Script URL in the HTML to sync live data',true);
    render();cb&&cb();
    return;
  }
  setStatus('Syncing with sheet\u2026',false);
  fetch(APPS_SCRIPT_URL)
    .then(function(r){
      if(!r.ok) throw new Error('HTTP '+r.status);
      return r.json();
    })
    .then(function(json){
      if(json.error) throw new Error(json.error);
      DATA={};
      json.rows.forEach(function(row){
        if(!row.date) return;
        DATA[row.date]=row;
      });
      LOADED=true;
      setStatus('\u2713 Synced \u2014 '+json.count+' entries loaded',false);
      render();cb&&cb();
    })
    .catch(function(err){
      console.warn('Apps Script fetch failed:',err.message);
      loadFallback();
      setStatus('\u26a0 Sheet unreachable \u2014 showing built-in data. ('+err.message+')',true);
      render();cb&&cb();
    });
}

/* ── built-in fallback ── */
function loadFallback(){
  var HOLS={
    '2026-06-25':'Muharram',
    '2026-08-12':'Karkadaka Vavu Bali',
    '2026-08-15':'Independence Day',
    '2026-08-25':'First Onam / Milad-i-Sherif',
    '2026-08-26':'Thiruvonam',
    '2026-08-27':'Third Onam',
    '2026-08-28':'Ayyankali Jayanthi / SN Guru Jayanthi',
    '2026-08-31':'Onam (Fourth Day)',
    '2026-09-04':'Janmasthami',
    '2026-09-21':'SN Guru Samadhi Day',
    '2026-10-02':'Gandhi Jayanthi',
    '2026-10-19':'Pooja Holiday',
    '2026-10-20':'Mahanavami',
    '2026-10-21':'Vijayadasami',
    '2026-10-22':'Pooja Holiday',
    '2026-12-24':'Christmas Eve',
    '2026-12-25':'Christmas Day',
    '2027-01-01':"New Year's Day",
    '2027-01-26':'Republic Day',
    '2027-02-23':'Maha Shivaratri',
    '2027-03-01':'Kerala Piravi'
  };
  var SCHED={
    1:{subject:'Mathematics',     type:'Math'},
    2:{subject:'Science',         type:'Science'},
    3:{subject:'Social Science',  type:'Social'},
    4:{subject:'Languages & Others',type:'Language'},
    5:{subject:'Maths + Science', type:'Review'}
  };
  DATA={};
  var d=new Date(2026,5,1), end=new Date(2027,2,31);
  while(d<=end){
    var y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
    var key=y+'-'+pad(m)+'-'+pad(day);
    var dow=d.getDay();
    if(HOLS[key]){
      DATA[key]={date:key,subject:'Holiday',type:'Holiday',start:'',end:'',cls:'',mode:'Holiday',holName:HOLS[key],notes:'Kerala Public Holiday',status:'Holiday'};
    } else if(dow>=1&&dow<=5){
      var s=SCHED[dow];
      DATA[key]={date:key,subject:s.subject,type:s.type,start:'5:00 PM',end:'6:00 PM',cls:'SSLC Class 10',mode:'Offline',holName:'',notes:'',status:'Scheduled'};
    }
    d.setDate(d.getDate()+1);
  }
  LOADED=true;
}

function setStatus(msg,isErr){
  var el=g('calStatus');
  if(!msg){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML='<div class="cal-status-dot'+(isErr?' err':'')+'"></div>'+msg;
}

/* ── STATS ── */
function buildStats(y,m){
  var days=new Date(y,m,0).getDate();
  var sess=0,hols=0,math=0,sci=0;
  var counts={Math:0,Science:0,Social:0,Language:0,Review:0};
  for(var d=1;d<=days;d++){
    var key=y+'-'+pad(m)+'-'+pad(d);
    var row=DATA[key];
    if(!row) continue;
    if(row.status==='Holiday'){hols++;continue;}
    sess++;
    counts[row.type]=(counts[row.type]||0)+1;
    if(row.type==='Math'||row.type==='Review') math++;
    if(row.type==='Science'||row.type==='Review') sci++;
  }
  g('stSess').textContent=sess;
  g('stHols').textContent=hols;
  g('stMath').textContent=math;
  g('stSci').textContent=sci;
  var cols={Math:'var(--c10)',Science:'var(--c11)',Social:'var(--c12)',Language:'var(--cn)',Review:'var(--cj)'};
  var tot=Object.values(counts).reduce(function(a,b){return a+b;},0)||1;
  g('miniBar').innerHTML=Object.keys(cols).map(function(k){
    return '<div class="mini-seg" style="flex:'+(counts[k]/tot)+';background:'+cols[k]+'"></div>';
  }).join('');
}

/* ── RENDER ── */
function render(){
  if(!LOADED) return;
  var ym=RANGE[CUR],y=ym.y,m=ym.m;
  var days=new Date(y,m,0).getDate();
  var lead=(new Date(y,m-1,1).getDay()+6)%7;
  var today=new Date();today.setHours(0,0,0,0);
  var grid=g('calGrid');grid.innerHTML='';
  buildStats(y,m);
  g('monthLbl').childNodes[0].nodeValue=MONTHS[m-1]+' '+y;
  g('monthSel').value=CUR;
  for(var i=0;i<lead;i++){var b=document.createElement('div');b.className='day empty';grid.appendChild(b);}
  for(var d=1;d<=days;d++){
    var key=y+'-'+pad(m)+'-'+pad(d);
    var dow=new Date(y,m-1,d).getDay();
    var isToday=new Date(y,m-1,d).getTime()===today.getTime();
    var isWknd=dow===0||dow===6;
    var row=DATA[key];
    var isHol=row&&row.status==='Holiday';
    var typeKey=row?row.type:'';
    var info=TYPE_KEY[typeKey];
    var match=!FILTER||(FILTER==='Holiday'?isHol:typeKey===FILTER);
    var cell=document.createElement('div');
    var cls='day';
    if(isWknd) cls+=' wknd';
    if(isToday) cls+=' today';
    if(isHol)  cls+=' hday';
    if(FILTER&&!match&&!isWknd) cls+=' dim';
    cell.className=cls;
    var dn=document.createElement('div');dn.className='dn';
    dn.innerHTML=isToday?'<div class="today-ring">'+d+'</div>':'<span class="dn-n">'+d+'</span>';
    cell.appendChild(dn);
    if(isHol&&match){
      var hl=document.createElement('div');hl.className='hol-label';hl.textContent=row.holName||'Public Holiday';cell.appendChild(hl);
      var hp=document.createElement('div');hp.className='pill hol';
      hp.innerHTML='<div class="pl-time">No class</div><div class="pl-name">Holiday</div>';
      (function(r_){hp.addEventListener('click',function(){openModal(r_);});})(row);
      cell.appendChild(hp);
    } else if(!isWknd&&row&&!isHol&&match&&info){
      var pill=document.createElement('div');pill.className='pill '+info.key;
      pill.innerHTML='<div class="pl-time">'+(row.start||'5:00 PM')+' \u2013 '+(row.end||'6:00 PM')+'</div>'
        +'<div class="pl-name">'+row.subject+'</div>';
      (function(r_){pill.addEventListener('click',function(){openModal(r_);});})(row);
      cell.appendChild(pill);
    }
    grid.appendChild(cell);
  }
}

/* ── MODAL ── */
function ic(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12">'+p+'</svg>';}
function mr(icon,lbl,val){return '<div class="mr"><div class="mr-ic">'+icon+'</div><div><div class="mr-l">'+lbl+'</div><div class="mr-v">'+val+'</div></div></div>';}

function openModal(row){
  var info=TYPE_KEY[row.type]||{key:'',css:'var(--lime)',label:row.type};
  var dateStr=new Date(row.date).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  g('mBand').style.background=info.css;
  g('mSub').textContent=row.status==='Holiday'?'Public Holiday':'Class 10 \xb7 SSLC 2026-27';
  g('mSub').style.color=info.css;
  g('mTit').textContent=row.status==='Holiday'?(row.holName||'Holiday'):row.subject;
  var body=mr(ic('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'),'Date',dateStr);
  if(row.status!=='Holiday'){
    body+=mr(ic('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'),'Time',(row.start||'5:00 PM')+' \u2013 '+(row.end||'6:00 PM'));
    body+=mr(ic('<path d="M22 10v6M2 10l10-5 10 5-10 5z"/>'),'Batch',row.cls||'SSLC Class 10');
    body+=mr(ic('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>'),'Mode',row.mode||'Offline');
  } else {
    body+=mr(ic('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'),'Class','No session \u2014 public holiday');
    body+=mr(ic('<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22z"/>'),'Note',row.notes||'Kerala Government Holiday');
  }
  if(row.notes&&row.status!=='Holiday') body+=mr(ic('<path d="M7.9 20A9 9 0 1 0 4 16.1L2 22z"/>'),'Notes',row.notes);
  g('mBody').innerHTML=body;
  var wa='https://wa.me/919539409586?text='+encodeURIComponent('Hi SEHR Academy, question about '+row.subject+' on '+dateStr);
  g('mFoot').innerHTML=(row.status!=='Holiday'?'<a class="mfb lime" href="'+wa+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.334.101 11.893c0 2.096.549 4.14 1.595 5.945L0 24l6.335-1.652c1.746.943 3.71 1.444 5.71 1.447h.006c6.585 0 11.946-5.336 11.949-11.896 0-3.176-1.24-6.165-3.48-8.45z"/></svg>Ask on WhatsApp</a>':'')
    +'<button class="mfb ghost" id="mClose2">Close</button>';
  g('mClose2').addEventListener('click',closeModal);
  g('modal').classList.add('on');
}
function closeModal(){g('modal').classList.remove('on');}
g('mBg').addEventListener('click',closeModal);
g('mClose').addEventListener('click',closeModal);
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

/* ── CONTROLS ── */
function goTo(idx){CUR=Math.max(0,Math.min(RANGE.length-1,idx));g('monthSel').value=CUR;render();}
g('prevBtn').addEventListener('click',function(){goTo(CUR-1);});
g('nextBtn').addEventListener('click',function(){goTo(CUR+1);});
g('monthSel').addEventListener('change',function(){goTo(parseInt(this.value));});
g('todayBtn').addEventListener('click',function(){
  var now=new Date(),y=now.getFullYear(),m=now.getMonth()+1;
  var idx=RANGE.findIndex(function(r){return r.y===y&&r.m===m;});
  goTo(idx>=0?idx:0);
});
g('syncBtn').addEventListener('click',function(){
  g('syncBtn').classList.add('spinning');
  fetchSheet(function(){g('syncBtn').classList.remove('spinning');});
});
document.querySelectorAll('.ftab[data-f]').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.ftab[data-f]').forEach(function(b){b.classList.remove('on');});
    this.classList.add('on');FILTER=this.dataset.f;render();
  });
});
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  if(e.key==='ArrowLeft') g('prevBtn').click();
  if(e.key==='ArrowRight') g('nextBtn').click();
});

/* ── BOOT ── */
setTimeout(function(){
  g('loader').classList.remove('on');
  fetchSheet();
},700);

})();
</script>
