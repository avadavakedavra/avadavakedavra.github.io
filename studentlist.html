<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sehr Academy — Student Database</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --green:#8BC53F;
  --border:#e6e8ec;
  --bg:#f8f7f4;
}

body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:#1f2937;
}

header{
  background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
}

.wrap{
  max-width:1300px;
  margin:auto;
  padding:14px 20px;
  display:flex;
  align-items:center;
}

.brand span:first-child{
  font-family:'Montserrat';
  font-weight:900;
  color:var(--green);
  font-size:22px;
}

.brand span:last-child{
  font-family:'Montserrat';
  font-weight:900;
  font-size:22px;
}

.table-wrap{
  max-width:1300px;
  margin:auto;
  padding:20px;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  min-width:1200px;
}

th{
  font-family:'Montserrat';
  padding:14px;
  text-align:left;
  border-bottom:1px solid var(--border);
  font-size:13px;
}

td{
  padding:14px;
  border-top:1px solid var(--border);
  font-size:14px;
}

tr{
  cursor:pointer;
  transition:.2s;
}

tr:hover{
  background:#f3f7ef;
}

.student-name{
  display:flex;
  align-items:center;
  gap:10px;
}

.student-name img{
  width:38px;
  height:38px;
  border-radius:50%;
  object-fit:cover;
}

.student-link{
  text-decoration:none;
  color:inherit;
  font-weight:600;
}

.student-link:hover{
  color:var(--green);
}

/* 🔒 Blur financial columns */
.blur{
  filter:blur(6px);
  transition:.3s ease;
}

/* When row active, remove blur */
tr.active .blur{
  filter:none;
}

/* Status Colors */
.pill{
  padding:4px 8px;
  font-size:11px;
  font-weight:800;
  border-radius:6px;
  color:#fff;
}

.CLEARED{ background:#16a34a; }
.OVERDUE{ background:#dc2626; }
.INACTIVE{ background:#6b7280; }
.SPONSORSHIP{ background:#2563eb; }

</style>
</head>

<body>

<header>
<div class="wrap">
  <div class="brand">
    <span>SEHR</span><span>ACADEMY</span>
  </div>
</div>
</header>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>Name</th>
<th>Admission No</th>
<th>Class</th>
<th>Syllabus</th>
<th>School</th>
<th>Joining Date</th>
<th>Total Fee</th>
<th>Total Paid</th>
<th>Balance</th>
<th>Status</th>
<th>Next Due</th>
<th>Next Amount</th>
</tr>
</thead>
<tbody id="studentBody"></tbody>
</table>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbzlQp_92V9H6NXLl79-0nZwqhDlS5JzdTnKsjnOhNA8PFhx5PqrdQwKM9xu3I0FNINERw/exec";

let STUDENTS = [];
let USER_PASSWORD = "";

window.onload = () => {
  USER_PASSWORD = prompt("Enter Admin Password:");
  if (!USER_PASSWORD) {
    location.reload();
    return;
  }
  fetchStudents();
};

async function fetchStudents(){
  const res = await fetch(`${BASE_URL}?action=studentList&password=${encodeURIComponent(USER_PASSWORD)}`);
  const data = await res.json();

  if (data.error){
    alert("Wrong Password");
    location.reload();
    return;
  }

  STUDENTS = data.students || [];
  render();
}

function render(){
  const body = document.getElementById("studentBody");
  body.innerHTML = "";

  STUDENTS.forEach(s => {

    const statusText = (s.status || "").toUpperCase().trim();

    body.innerHTML += `
    <tr onclick="toggleRow(this)">
      <td>
        <div class="student-name">
          <img src="${s.photo || ''}">
          <a class="student-link" 
             href="https://sehracademy.com/student?id=${encodeURIComponent(s.id)}" 
             onclick="event.stopPropagation()" 
             target="_blank">
             ${s.full_name || ''}
          </a>
        </div>
      </td>
      <td>${s.admission_no || '-'}</td>
      <td>${s.class || '-'}</td>
      <td>${s.syllabus || '-'}</td>
      <td>${s.school_name || '-'}</td>

      <td class="blur">${formatDate(s.joining_date)}</td>
      <td class="blur">₹${Number(s.total_fee || 0).toLocaleString()}</td>
      <td class="blur">₹${Number(s.total_paid || 0).toLocaleString()}</td>
      <td class="blur">₹${Number(s.balance || 0).toLocaleString()}</td>
      <td class="blur"><span class="pill ${statusText}">${statusText}</span></td>
      <td class="blur">${s.next_due || '-'}</td>
      <td class="blur">₹${Number(s.next_due_amount || 0).toLocaleString()}</td>
    </tr>
    `;
  });
}

/* Toggle blur */
function toggleRow(row){
  row.classList.toggle("active");
}

/* Format Date */
function formatDate(dateStr){
  if (!dateStr) return "-";
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-IN');
}

</script>

</body>
</html>
