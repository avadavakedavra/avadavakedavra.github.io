<html>
<head>
    <title>Student Login</title>
</head>
<body>
    <script>
        const DATA_URL = 'https://script.google.com/macros/s/AKfycbzudeZ677Mxp0KZGtILfVVBk0cB4V2zwpXrpqtemE4cHt7Sp7_Vc6U3_shwcpYmB15vRA/exec?action=list';

        function loadStudents() {
            fetch(DATA_URL)
                .then(response => response.json())
                .then(data => {
                    // Process the student data
                    console.log(data);
                })
                .catch(error => {
                    console.error('Error fetching student data:', error);
                });
        }

        loadStudents();
    </script>
</body>
</html>
