<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exam Leaderboard — SEHR Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f0d;--bg2:#1a1a18;--bg3:#232320;--bg4:#2e2e2a;
  --card:#1e1e1b;--border:#2e2e2a;--border2:#3a3a36;
  --text:#fff;--text2:#e0ddd6;--text3:#9a9790;--text4:#5a5a56;
  --li:#8BC53F;--l2:#72a530;--li-dim:rgba(139,197,63,.1);--li-glow:rgba(139,197,63,.2);
  --gold:#f59e0b;--silver:#94a3b8;--bronze:#cd7c54;
  --gold-dim:rgba(245,158,11,.12);--silver-dim:rgba(148,163,184,.08);--bronze-dim:rgba(205,124,84,.1);
  --re:#ef4444;--re-dim:rgba(239,68,68,.08);
  --f:'Open Sans',sans-serif;--e1:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{
  font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;
  background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);
  background-size:48px 48px;
}
body::before{content:'';position:fixed;top:-100px;right:-80px;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,197,63,.08),transparent 65%);pointer-events:none;z-index:0}
@keyframes fUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop {0%{transform:scale(0);opacity:0}65%{transform:scale(1.14)}100%{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin {to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}

/* ── TOPBAR ── */
.topbar{height:56px;background:#1a1a18;border-bottom:1px solid #8BC53F;display:flex;
  align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:200}
.tb-logo{font-size:22px;font-weight:900;letter-spacing:-1px}.tb-logo span{color:#8BC53F}
.tb-div{width:1px;height:16px;background:#3a3a36}
.tb-sub{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#5a5a56}
.tb-spacer{flex:1}
.tb-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
  border:1px solid #3a3a36;background:#232320;color:#9a9790;font-family:var(--f);
  font-size:11px;font-weight:700;cursor:pointer;transition:all .14s}
.tb-btn:hover{border-color:#8BC53F;color:#8BC53F}
.tb-btn svg{width:13px;height:13px;flex-shrink:0}

/* ── PAGE ── */
.page{max-width:680px;margin:0 auto;padding:24px 16px 72px;position:relative;z-index:1}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.fsel-wrap{position:relative}
.fsel{appearance:none;-webkit-appearance:none;background:var(--card);border:1px solid var(--border2);
  border-radius:10px;color:var(--text2);font-family:var(--f);font-size:13px;font-weight:600;
  padding:9px 34px 9px 13px;cursor:pointer;outline:none;transition:border .14s}
.fsel:focus{border-color:var(--li)}
.farr{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:11px;pointer-events:none}

/* ── EXAM HEADER ── */
.exam-hd{
  background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  padding:22px 22px 18px;margin-bottom:22px;position:relative;overflow:hidden;
  animation:fUp .4s var(--e1);
}
.exam-hd::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--li),rgba(139,197,63,.3),transparent)}
.exam-eyebrow{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  color:var(--li);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.exam-eyebrow::before{content:'';width:3px;height:14px;background:var(--li);border-radius:2px;flex-shrink:0}
.exam-class{font-size:34px;font-weight:900;color:var(--text);letter-spacing:-1px;line-height:1}
.exam-title{font-size:20px;font-weight:700;color:var(--li);font-style:italic;letter-spacing:-.3px;margin-top:2px}
.exam-sub{font-size:13px;color:var(--text3);margin-top:6px}


/* ── CLASS TOPPER ── */
.topper-wrap{
  background:linear-gradient(135deg,#1e1e1b 0%,#232320 100%);
  border:1px solid rgba(245,158,11,.25);border-radius:16px;
  padding:24px;margin-bottom:22px;position:relative;overflow:hidden;
  animation:fUp .45s .05s var(--e1) both;
}
.topper-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),rgba(245,158,11,.3),transparent)}
.topper-glow{position:absolute;top:-60px;right:-60px;width:240px;height:240px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.08),transparent 70%);pointer-events:none}
.topper-label{font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.topper-label::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:2px}
.topper-label-crown{font-size:16px;animation:pop .5s .3s var(--e1) both;display:inline-block}
.topper-body{display:flex;align-items:center;gap:20px}
.topper-av{
  width:120px;height:120px;border-radius:50%;flex-shrink:0;
  border:3px solid var(--gold);background:var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:900;color:var(--gold);overflow:hidden;
  box-shadow:0 0 0 2px rgba(245,158,11,.15),0 8px 24px rgba(245,158,11,.2);
  position:relative;
}
.topper-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.topper-info{flex:1;min-width:0}
.topper-name{font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.6px;line-height:1.05;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topper-meta{font-size:13px;color:var(--text3);margin-top:4px}
.topper-score-wrap{text-align:right;flex-shrink:0}
.topper-pct{font-size:44px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-1.5px}
.topper-marks{font-size:13px;color:rgba(245,158,11,.5);margin-top:3px;font-weight:600}


/* ── SECTION HDR ── */
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text4);display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';width:3px;height:14px;background:var(--li);border-radius:2px}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-cnt{font-size:11px;color:var(--text4);background:var(--bg3);border:1px solid var(--border);
  padding:2px 9px;border-radius:20px}

/* ── LEADERBOARD ROWS ── */
.lb-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;position:relative;overflow:hidden;
  animation:fUp .3s var(--e1) both;transition:border-color .13s;
}
.lb-row:hover{border-color:var(--border2)}
.lb-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px}
.lb-row.r1{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.03)}
.lb-row.r2{border-color:rgba(148,163,184,.15)}
.lb-row.r3{border-color:rgba(205,124,84,.15)}
.lb-row.r1::before{background:var(--gold)}
.lb-row.r2::before{background:var(--silver)}
.lb-row.r3::before{background:var(--bronze)}
.lb-row.pass::before{background:var(--li)}
.lb-row.fail::before{background:var(--re)}

.lb-rank{width:34px;font-size:20px;text-align:center;flex-shrink:0;line-height:1}
.lb-rank.num{font-size:12px;font-weight:800;color:var(--text4)}

.lb-av{width:64px;height:64px;border-radius:12px;flex-shrink:0;overflow:hidden;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;color:var(--li);position:relative;}
.lb-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}

.lb-info{flex:1;min-width:0}
.lb-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-detail{font-size:11px;color:var(--text4);margin-top:3px;display:flex;gap:10px}


.lb-right{text-align:right;flex-shrink:0}
.lb-pct{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.4px}
.lb-marks-txt{font-size:11px;color:var(--text4);margin-top:2px}
.lb-bar{width:70px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:5px 0 0 auto}
.lb-bar-fill{height:100%;border-radius:2px;transition:width .6s var(--e1)}

/* ── LOADING ── */
.spin-ring{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--li);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.loading-txt{text-align:center;padding:48px 20px;color:var(--text4);font-size:13px}
.skel{height:72px;border-radius:12px;margin-bottom:8px;
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);
  background-size:400px 100%;animation:shimmer 1.2s ease infinite}

/* ── EXPORT OVERLAY ── */
#exportOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:999;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
#exportOverlay.on{display:flex}
.export-controls{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;
  align-items:center;padding:0 0 12px;width:100%;max-width:560px}
.export-hint{color:#fff;font-size:13px;font-weight:700}
.export-close{background:#2e2e2a;border:1px solid #3a3a36;color:#fff;padding:7px 14px;
  border-radius:7px;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer}

/* ── WCARD ── */
.wcard{width:100%;max-width:520px;background:#0f0f0d;border-radius:14px;overflow:hidden;
  font-family:'Open Sans',sans-serif;color:#fff;flex-shrink:0}
.wcard-top{background:#1a1a18;border-bottom:3px solid #8BC53F;padding:16px 20px;
  display:flex;align-items:center;justify-content:space-between}
.wcard-logo{font-size:20px;font-weight:900;letter-spacing:-1px}
.wcard-logo span{color:#8BC53F}
.wcard-meta-r{text-align:right;font-size:11px;color:rgba(255,255,255,.35)}
.wcard-meta-r strong{color:#fff;display:block;font-size:13px;font-weight:800;margin-bottom:1px}
.wcard-body{padding:20px}

/* Topper in card */
.wcard-topper{background:linear-gradient(135deg,#1e1e1b,#232320);border:1px solid rgba(245,158,11,.2);
  border-radius:12px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden}
.wcard-topper::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#f59e0b,rgba(245,158,11,.3),transparent)}
.wcard-t-av{width:80px;height:80px;border-radius:50%;border:2px solid #f59e0b;background:rgba(245,158,11,.1);
  display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;
  color:#f59e0b;flex-shrink:0;overflow:hidden;position:relative}
.wcard-t-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.wcard-t-info{flex:1}
.wcard-t-badge{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:#f59e0b;margin-bottom:4px}
.wcard-t-name{font-size:17px;font-weight:900;letter-spacing:-.3px}
.wcard-t-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}
.wcard-t-pct{font-size:30px;font-weight:900;color:#f59e0b;line-height:1;letter-spacing:-1px;flex-shrink:0}

/* Rankings in card */
.wcard-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#1e1e1b;
  border-radius:10px;margin-bottom:6px;border-left:3px solid transparent}
.wcard-row.r1{border-color:#f59e0b}.wcard-row.r2{border-color:#94a3b8}.wcard-row.r3{border-color:#cd7c54}
.wcard-row.rp{border-color:#8BC53F}.wcard-row.rf{border-color:#ef4444}
.wcard-rank{width:26px;font-size:15px;flex-shrink:0}
.wcard-av-sm{width:48px;height:48px;border-radius:9px;background:#2e2e2a;display:flex;
  align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#8BC53F;
  flex-shrink:0;overflow:hidden;position:relative}
.wcard-av-sm img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.wcard-row-info{flex:1;min-width:0}
.wcard-row-name{font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wcard-row-detail{font-size:10px;color:rgba(255,255,255,.3);margin-top:1px}
.wcard-row-pct{font-size:16px;font-weight:900;flex-shrink:0}
.wcard-row.r1 .wcard-row-pct{color:#f59e0b}.wcard-row.r2 .wcard-row-pct{color:#94a3b8}
.wcard-row.r3 .wcard-row-pct{color:#cd7c54}.wcard-row.rp .wcard-row-pct{color:#8BC53F}
.wcard-row.rf .wcard-row-pct{color:#ef4444}
.wcard-scheme{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.wcard-sc-item{background:#232320;border-radius:7px;padding:8px;text-align:center}
.wcard-sc-v{font-size:15px;font-weight:900}
.wcard-sc-l{font-size:9px;color:rgba(255,255,255,.3);margin-top:2px}
.wcard-footer{background:#1a1a18;padding:12px 20px;display:flex;justify-content:space-between;
  align-items:center;border-top:1px solid #2e2e2a}
.wcard-footer-brand{font-size:13px;font-weight:900}
.wcard-footer-brand span{color:#8BC53F}
.wcard-footer-url{font-size:10px;color:rgba(255,255,255,.3)}

/* ── WCARD HEADER ADDITIONS ── */
.wcard-hd-cls{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1;margin-bottom:2px}
.wcard-hd-title{font-size:17px;font-weight:700;color:#8BC53F;font-style:italic;letter-spacing:-.2px}
.wcard-hd-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px}
.wcard-divider{height:1px;background:linear-gradient(90deg,rgba(139,197,63,.4),rgba(139,197,63,.1),transparent);margin:14px 0}

.export-controls{display:flex;justify-content:space-between;align-items:center;padding:0 0 12px;width:100%;max-width:560px;gap:8px}
.export-dl{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border:none;
  border-radius:8px;background:var(--li);color:#0f0f0d;font-family:var(--f);
  font-size:13px;font-weight:800;cursor:pointer;transition:all .14s}
.export-dl:hover{background:var(--l2)}
.export-dl:disabled{opacity:.5;cursor:not-allowed}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">SEHR<span>.</span></div>
  <div class="tb-div"></div>
  <div class="tb-sub">Exam Leaderboard</div>
  <div class="tb-spacer"></div>
  <button class="tb-btn" onclick="shareWA()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.334.101 11.893c0 2.096.549 4.14 1.595 5.945L0 24l6.335-1.652c1.746.943 3.71 1.444 5.71 1.447h.006c6.585 0 11.946-5.336 11.949-11.896 0-3.176-1.24-6.165-3.48-8.45z"/></svg>
    WhatsApp
  </button>
  <button class="tb-btn" onclick="showExport()" style="background:var(--li);border-color:var(--li);color:#0f0f0d">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><polyline points="9 12 12 15 15 12"/><line x1="12" y1="8" x2="12" y2="15"/></svg>
    Export Card
  </button>
</div>

<div class="page">
  <!-- Filters -->
  <div class="filters">
    <div class="fsel-wrap">
      <select class="fsel" id="selClass" onchange="onFilterChange()">
        <option value="9">Class 9</option>
        <option value="10">Class 10</option>
        <option value="11" selected>Class 11</option>
        <option value="12">Class 12</option>
      </select><span class="farr">▾</span>
    </div>
    <div class="fsel-wrap">
      <select class="fsel" id="selMonth" onchange="onFilterChange()">
        <option value="June 2026" selected>June 2026</option>
        <option value="May 2026">May 2026</option>
        <option value="April 2026">April 2026</option>
        <option value="March 2026">March 2026</option>
      </select><span class="farr">▾</span>
    </div>
    <div class="fsel-wrap">
      <select class="fsel" id="selBoard" onchange="onFilterChange()">
        <option value="ALL">All Boards</option>
        <option value="STATE">Kerala State</option>
        <option value="CBSE">CBSE</option>
      </select><span class="farr">▾</span>
    </div>
    <div class="fsel-wrap" id="subjFilterWrap" style="display:none">
      <select class="fsel" id="selSubj" onchange="render()">
        <option value="ALL">All Subjects</option>
      </select><span class="farr">▾</span>
    </div>
    <div class="fsel-wrap">
      <select class="fsel" id="selShow" onchange="render()">
        <option value="pct">Show % Score</option>
        <option value="marks">Show Marks</option>
        <option value="topper_only">Topper % Only</option>
        <option value="none">Hide Scores</option>
      </select><span class="farr">▾</span>
    </div>
  </div>

  <div id="mainOut"></div>
</div>

<!-- Export overlay -->
<div id="exportOverlay" onclick="if(event.target===this)closeExport()">
  <div style="width:100%;max-width:560px">
    <div class="export-controls">
      <button class="export-dl" id="dlBtn" onclick="downloadCard()">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </button>
      <button class="export-close" onclick="closeExport()">✕ Close</button>
    </div>
    <div class="wcard" id="wcard"></div>
  </div>
</div>

<script>









/* ── APIs ── */
var ATT_API = 'https://script.google.com/macros/s/AKfycbxpxedvIrF7AiWQ1cIx-jWfxGkv0r1-Yl2rJtkaSdTdQtfEll9M0Sf6qQrqvB9x0I1_/exec';

/* ── STATIC DATA ── */
/* When you connect to sheets, this gets replaced by an API call.
   Structure: DATA[class][month][board] = [{name, correct, wrong, unanswered, total_q}] */
var DATA = {
  "11": {
    "June 2026": {
      // date: exam date, subjects: [] = all subjects combined, or list specific subjects
      "_meta": { date:"13 June 2026", subjects:[] },
      "STATE": [
        // name must match full_name in students sheet exactly (or use id field for reliable photo lookup)
        {name:"John Tharakan",   id:"johntharakan",  correct:29, wrong:5,  unanswered:1, total_q:35},
        {name:"Ganashyam PV",    id:"ganashyam",     correct:19, wrong:16, unanswered:0, total_q:35},
        {name:"Thasni PS",       id:"thasni",        correct:12, wrong:23, unanswered:0, total_q:35},
      ]
    }
  }
};
// Example of a subject-specific exam:
// "July 2026": {
//   "_meta": { date:"12 July 2026", subjects:["Physics","Chemistry"] },
//   "STATE": [ ... ]
// }

var SCHEME   = {correct:4, wrong:-1, skip:0};
var WA_NUM   = '919539409586';
var PHOTO_MAP = {}; // student_name → photo URL (loaded from ATT_API)

/* ── UTILS ── */
function g(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mn(n){return(n||'??').trim().split(/\s+/).map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}

function calcScore(r){
  var max   = r.total_q * SCHEME.correct;
  var score = r.correct * SCHEME.correct + r.wrong * SCHEME.wrong;
  var pct   = max > 0 ? Math.round(score / max * 10000) / 100 : 0;
  return {score:score, max:max, pct:pct};
}
function pctCol(p){
  if(p>=75) return 'var(--li)';
  if(p>=50) return 'var(--gold)';
  if(p>=35) return '#f97316';
  return 'var(--re)';
}
function rankCls(i){return i===0?'r1':i===1?'r2':i===2?'r3':'rother';}
function rankMedal(i){return i===0?'🥇':i===1?'2nd':i===2?'3rd':'#'+(i+1);}

function apiFetch(url,cb){
  fetch(url).then(function(r){return r.text();})
    .then(function(t){try{cb(JSON.parse(t),null);}catch(e){cb(null,'Parse error');}})
    .catch(function(e){cb(null,e.message);});
}
function apiAtt(payload,cb){
  apiFetch(ATT_API+'?data='+encodeURIComponent(JSON.stringify(payload)),cb);
}

/* ── PHOTO LOADING ── */
function normName(s){
  // Normalize: lowercase, remove dots spaces special chars
  return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
}

function loadPhotos(cls, board, cb){
  var loaded = 0;
  var boards = board==='ALL' ? ['STATE','CBSE'] : [board];
  function onDone(){ loaded++; if(loaded>=boards.length && cb) cb(); }
  
  boards.forEach(function(syl){
    apiAtt({action:'getStudents', class:cls, syllabus:syl}, function(data,err){
      if(!err && data && data.success){
        (data.students||[]).forEach(function(s){
          if(!s.photo || !s.photo.startsWith('http')) return;
          // Map by: login id (col 0), exact full_name, normalized full_name
          if(s.id)        PHOTO_MAP[s.id.trim().toLowerCase()] = s.photo;
          if(s.full_name){
            PHOTO_MAP[s.full_name.trim()] = s.photo;
            PHOTO_MAP[normName(s.full_name)] = s.photo;
            // First name only
            var first = s.full_name.trim().split(/\s+/)[0];
            if(first) PHOTO_MAP[first.toLowerCase()] = s.photo;
          }
        });
      }
      onDone();
    });
  });
}

function getPhoto(r){
  // r can be a string (name) or object with {name, id}
  var name = (typeof r==='object') ? (r.name||'') : (r||'');
  var id   = (typeof r==='object') ? (r.id||'')   : '';
  
  // 1. Try by login id (most reliable)
  if(id && PHOTO_MAP[id.toLowerCase()]) return PHOTO_MAP[id.toLowerCase()];
  
  // 2. Exact name match
  if(name && PHOTO_MAP[name.trim()]) return PHOTO_MAP[name.trim()];
  
  // 3. Normalized name match (removes dots, spaces — handles "P.V." vs "PV")
  var norm = normName(name);
  if(norm && PHOTO_MAP[norm]) return PHOTO_MAP[norm];
  
  // 4. First name match
  var first = name.trim().split(/\s+/)[0].toLowerCase();
  if(first && PHOTO_MAP[first]) return PHOTO_MAP[first];
  
  return null;
}

function avHtml(name, size, id){
  var photo = getPhoto(name);
  var initials = mn(name);
  var inner = photo
    ? '<img src="'+esc(photo)+'" alt="">'

  return '<div class="lb-av" id="'+(id||'')+'" style="width:'+size+'px;height:'+size+'px;font-size:'+(size/3.2|0)+'px">'+inner+'</div>';
}

function imgToCanvas(img, w, h){
  // Draw an img element onto a canvas with object-fit:cover + object-position:center top
  var c = document.createElement('canvas');
  c.width = w; c.height = h;
  var ctx = c.getContext('2d');
  var iw = img.naturalWidth||img.width, ih = img.naturalHeight||img.height;
  if(!iw||!ih){ctx.fillStyle='#2e2e2a';ctx.fillRect(0,0,w,h);return c;}
  // Cover: scale so the image fills the box, anchor to top
  var scale = Math.max(w/iw, h/ih);
  var sw = iw*scale, sh = ih*scale;
  var sx = (w-sw)/2, sy = 0; // center top
  ctx.drawImage(img, sx, sy, sw, sh);
  return c;
}

function prepareImagesForCapture(card, cb){
  // Replace all <img> inside avatar containers with canvas elements
  // so html2canvas can capture them correctly without CORS issues
  var imgs = card.querySelectorAll('.wcard-t-av img, .wcard-av-sm img');
  var total = imgs.length, done = 0;
  if(total===0){cb();return;}
  imgs.forEach(function(img){
    var parent = img.parentElement;
    var w = parent.offsetWidth||80, h = parent.offsetHeight||80;
    function replace(){
      var c = imgToCanvas(img, w, h);
      c.style.cssText = 'position:absolute;inset:0;width:'+w+'px;height:'+h+'px;border-radius:inherit';
      img.style.display='none';
      parent.appendChild(c);
      done++;
      if(done>=total) cb();
    }
    if(img.complete && img.naturalWidth>0){ replace(); }
    else { img.onload=replace; img.onerror=function(){done++;if(done>=total)cb();}; }
  });
}

function downloadCard(){

  var card = g('wcard');
  var cls  = g('selClass').value;
  var month= g('selMonth').value;
  var board= g('selBoard').value;
  var filename = 'SEHR_Class'+cls+'_'+month.replace(/ /g,'_')+(board!=='ALL'?'_'+board:'')+'.png';

  // First: convert images to canvas so html2canvas renders them at full quality
  prepareImagesForCapture(card, function(){
    html2canvas(card, {
      backgroundColor: '#0f0f0d',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      imageTimeout: 0,
      removeContainer: false
    }).then(function(canvas){
      var link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.disabled = false;
      btn.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PNG';
      // Restore images
      card.querySelectorAll('.wcard-t-av canvas, .wcard-av-sm canvas').forEach(function(c){c.remove();});
      card.querySelectorAll('.wcard-t-av img, .wcard-av-sm img').forEach(function(i){i.style.display='';});
    }).catch(function(e){
      btn.disabled = false;
      btn.innerHTML = '⚠ Retry';
      // Restore images on error too
      card.querySelectorAll('.wcard-t-av canvas, .wcard-av-sm canvas').forEach(function(c){c.remove();});
      card.querySelectorAll('.wcard-t-av img, .wcard-av-sm img').forEach(function(i){i.style.display='';});
      console.error(e);
    });
  });
}
