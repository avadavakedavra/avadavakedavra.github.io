name: Build School Directory

on:
  push:
    branches: [main]
    paths:
      - 'school-directory-src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: school-directory-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: school-directory-src

      - name: Build
        run: npm run build
        working-directory: school-directory-src

      - name: Copy output to school-directory/
        run: |
          rm -rf school-directory
          mkdir -p school-directory
          cp -r school-directory-src/out/. school-directory/

      - name: Commit built files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add school-directory/
          git diff --staged --quiet || git commit -m "Build school-directory from source [skip ci]"
          git push
