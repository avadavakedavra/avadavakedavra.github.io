name: Update School Google Ratings

on:
  schedule:
    # Runs every Monday at 3 AM UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-ratings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Google Places ratings
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node school-directory-src/scripts/update-ratings.mjs

      - name: Build school directory
        run: |
          cd school-directory-src
          npm ci
          npm run build
          cd ..
          cp -r school-directory-src/out/. school-directory/

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add school-directory-src/app/data/schools.ts school-directory/
          if git diff --staged --quiet; then
            echo "No rating changes detected."
          else
            git commit -m "chore: update Google ratings $(date +%Y-%m-%d)"
            git push origin main
          fi
