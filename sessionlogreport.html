<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Academic Dashboard — SEHR Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* SEHR Academy palette — exact match to markattendance.html */
  --bg:    #f5f2eb;   /* --cr  cream background */
  --bg2:   #fdfcfa;   /* --wh  white cards */
  --bg3:   #ede9e0;   /* --c2  card hover / section bg */
  --bg4:   #e4dfd4;   /* --c3  subtle border fill */
  --border:#d8d4cb;   /* --ru  standard border */
  --border2:#b0ada4;  /* --pa  focus border */
  --text:  #1a1a18;   /* --ink primary text */
  --text2: #2e2e2b;   /* --ink2 */
  --text3: #7a7970;   /* --mu  muted text */
  --li:    #8BC53F;   /* lime accent */
  --li2:   #72a530;
  --li3:   #5e8a24;
  --li-dim:rgba(139,197,63,.12);
  --li-glow:rgba(139,197,63,.25);
  --blue:  #2563eb;
  --blue-dim:rgba(37,99,235,.1);
  --amber: #d97706;
  --amber-dim:rgba(217,119,6,.1);
  --red:   #dc2626;
  --red-dim:rgba(220,38,38,.08);
  --purple:#7c3aed;
  --purple-dim:rgba(124,58,237,.08);
  --teal:  #0d9488;
  --teal-dim:rgba(13,148,136,.1);
  --f:'Open Sans',sans-serif;
  --fs:'DM Serif Display',serif;
  --r:10px;
  --r2:14px;
  --sidebar:240px;
  --topbar:60px;
  --e1:cubic-bezier(.22,1,.36,1);
}
html{-webkit-font-smoothing:antialiased;height:100%}
body{font-family:var(--f);background:var(--bg);color:var(--text);font-size:14px;font-weight:500;line-height:1.5;height:100%;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes fadeUp {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.35}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
@keyframes barIn  {from{width:0}to{width:var(--w)}}

/* ── TOPBAR ──────────────────────────────────────────────────────── */
.topbar{
  height:var(--topbar);flex-shrink:0;
  background:#1a1a18;
  border-bottom:3px solid var(--li);
  display:flex;align-items:center;
  padding:0 20px 0 0;gap:0;z-index:200;
  position:relative;
}
.topbar::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.topbar::after{content:'';position:absolute;top:-80px;right:-60px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,197,63,.08),transparent 60%);pointer-events:none}
.tb-logo-wrap{
  width:var(--sidebar);flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:0 20px;border-right:1px solid rgba(255,255,255,.08);
  height:100%;position:relative;z-index:1;
}
.tb-logo{font-family:'Open Sans',sans-serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:-1.5px;line-height:1}
.tb-logo .dot{color:var(--li);font-weight:900}
.tb-logo-sub{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.32);margin-top:3px}
.tb-center{flex:1;padding:0 20px;display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.tb-page-title{font-size:15px;font-weight:700;color:#fff}
.tb-page-sub{font-size:11px;color:rgba(255,255,255,.3)}
.tb-spacer{flex:1}
.tb-right{display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.tb-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.1);font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;transition:all .16s;white-space:nowrap;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)}
.tb-btn:hover{background:rgba(255,255,255,.11);color:#fff;border-color:rgba(255,255,255,.18)}
.tb-btn-primary{background:var(--li);border-color:transparent;color:#1a1a18;font-weight:800;box-shadow:0 3px 12px rgba(139,197,63,.3)}
.tb-btn-primary:hover{background:var(--li2);color:#1a1a18}
.tb-btn-wa{background:rgba(37,211,102,.1);border-color:rgba(37,211,102,.22);color:#4ade80}
.tb-btn-wa:hover{background:rgba(37,211,102,.18)}
.tb-btn svg{width:12px;height:12px;flex-shrink:0}
.tb-date-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-size:12px;font-weight:600;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;position:relative;z-index:1}
.tb-date-pill:hover{border-color:rgba(139,197,63,.5);color:#fff}
.tb-date-pill svg{width:13px;height:13px;color:rgba(255,255,255,.3)}

/* ── LAYOUT ──────────────────────────────────────────────────────── */
.app-body{flex:1;display:flex;overflow:hidden;min-height:0}

/* ── SIDEBAR ─────────────────────────────────────────────────────── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--bg2);
  border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sb-section{padding:16px 12px 8px}
.sb-section-label{font-size:9px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--text3);padding:0 8px;margin-bottom:6px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:all .13s;user-select:none;-webkit-user-select:none;border:1px solid transparent}
.sb-item:hover{background:var(--bg3)}
.sb-item.on{background:rgba(139,197,63,.1);border-color:rgba(139,197,63,.25)}
.sb-item-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--bg3)}
.sb-item.on .sb-item-icon{background:var(--li-dim)}
.sb-item-label{font-size:13px;font-weight:600;color:var(--text3)}
.sb-item.on .sb-item-label{color:var(--li3);font-weight:700}
.sb-item-count{margin-left:auto;font-size:10px;font-weight:700;background:var(--bg4);color:var(--text3);padding:2px 7px;border-radius:10px}
.sb-item.on .sb-item-count{background:rgba(139,197,63,.12);color:var(--li3)}
.sb-divider{height:1px;background:var(--border);margin:8px 12px}

/* Class list in sidebar */
.sb-class-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:all .13s;border:1px solid transparent}
.sb-class-item:hover{background:var(--bg3)}
.sb-class-item.on{background:var(--bg4);border-color:var(--border2)}
.sb-class-num{width:28px;height:28px;border-radius:6px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--li3);flex-shrink:0}
.sb-class-item.on .sb-class-num{background:var(--li);color:#1a1a18}
.sb-class-info{flex:1;min-width:0}
.sb-class-name{font-size:12px;font-weight:600;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-class-item.on .sb-class-name{color:var(--text)}
.sb-class-meta{font-size:10px;color:var(--text3);margin-top:1px}
.sb-at-tag{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--bg4);color:var(--text3);padding:1px 5px;border-radius:4px;opacity:.7}
.sb-class-bar{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.sb-class-fill{height:100%;border-radius:2px;background:var(--li);transition:width .6s var(--e1)}

/* ── MAIN CONTENT ────────────────────────────────────────────────── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── FILTER BAR ──────────────────────────────────────────────────── */
.filter-bar{
  padding:10px 20px;
  background:var(--bg2);
  border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;gap:10px;
  flex-wrap:wrap;position:sticky;top:0;z-index:100;
  flex-shrink:0;
}
.fbar-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.fbar-sep{width:1px;height:18px;background:var(--border)}
.fbar-tabs{display:flex;gap:4px}
.fbar-tab{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:var(--bg2);font-family:var(--f);font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .13s}
.fbar-tab:hover{background:var(--bg3);color:var(--text);border-color:var(--li)}
.fbar-tab.on{background:var(--li);border-color:var(--li);color:#1a1a18;font-weight:700}

/* ── PAGE PADDING ────────────────────────────────────────────────── */
.page-pad{padding:20px}
.hidden{display:none!important}

/* ── KPI STRIP ───────────────────────────────────────────────────── */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
@media(max-width:1100px){.kpi-strip{grid-template-columns:repeat(3,1fr)}}
.kpi-card{
  background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);
  padding:16px 18px;position:relative;overflow:hidden;
  animation:fadeUp .4s var(--e1) both;
  transition:all .18s;box-shadow:0 2px 8px rgba(0,0,0,.05);
}
.kpi-card:hover{border-color:var(--li);transform:translateY(-1px);box-shadow:0 4px 16px rgba(139,197,63,.12)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent,var(--li));opacity:.7}
.kpi-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.kpi-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.kpi-trend{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.kpi-val{font-size:28px;font-weight:900;color:var(--text);line-height:1;letter-spacing:-.5px;font-family:var(--fs)}
.kpi-lbl{font-size:11px;color:var(--text3);margin-top:3px;font-weight:700}

/* ── SECTION HEADER ──────────────────────────────────────────────── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:13px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:-.1px}
.sec-title::before{content:'';width:3px;height:16px;background:var(--li);border-radius:2px;flex-shrink:0}
.sec-actions{display:flex;gap:6px}

/* ── TABLE ───────────────────────────────────────────────────────── */
.data-table-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:9px 14px;background:var(--bg3);border-bottom:1.5px solid var(--border);text-align:left;white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:rgba(139,197,63,.04);color:var(--text)}
.data-table td.bold{font-weight:600;color:var(--text)}

/* ── PROGRESS BARS ───────────────────────────────────────────────── */
.pbar-wrap{display:flex;align-items:center;gap:8px}
.pbar{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;min-width:60px}
.pbar-fill{height:100%;border-radius:3px;transition:width .6s var(--e1)}
.pbar-lbl{font-size:11px;font-weight:700;min-width:32px;text-align:right}

/* ── BADGE ───────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
.badge-g{background:var(--li-dim);color:var(--li)}
.badge-b{background:var(--blue-dim);color:var(--blue)}
.badge-a{background:var(--amber-dim);color:var(--amber)}
.badge-r{background:var(--red-dim);color:var(--red)}
.badge-p{background:var(--purple-dim);color:var(--purple)}
.badge-t{background:var(--teal-dim);color:var(--teal)}
.badge-n{background:var(--bg4);color:var(--text3)}

/* ── DAY VIEW ────────────────────────────────────────────────────── */
.day-grid{display:grid;grid-template-columns:1fr 340px;gap:16px;align-items:start}
@media(max-width:1000px){.day-grid{grid-template-columns:1fr}}
.class-block{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;animation:fadeUp .35s var(--e1) both;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.class-block:hover{border-color:rgba(139,197,63,.4);box-shadow:0 4px 16px rgba(139,197,63,.08)}
.cb-header{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1.5px solid var(--border);background:var(--bg3);flex-wrap:wrap}
.cb-num{width:38px;height:38px;border-radius:8px;background:#1a1a18;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--li);flex-shrink:0}
.cb-info{flex:1;min-width:0}
.cb-title{font-size:14px;font-weight:700;color:var(--text)}
.cb-meta{font-size:11px;color:var(--text3);margin-top:2px}
.cb-pills{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.cb-btns{display:flex;gap:5px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.cb-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:6px;font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;transition:all .14s;border:none;white-space:nowrap}
.cb-btn-pdf{background:var(--li);color:#0f1117}
.cb-btn-pdf:hover{background:var(--li2)}
.cb-btn-wa{background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.2)!important;color:#4ade80}
.cb-btn-wa:hover{background:rgba(37,211,102,.18)}
.cb-btn svg{width:11px;height:11px}
.cb-body{padding:0}
.sess-item{border-bottom:1px solid var(--border);padding:12px 16px}
.sess-item:last-child{border-bottom:none}
.sess-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.sess-teacher{font-size:13px;font-weight:700;color:var(--text)}
.sess-time{font-size:11px;color:var(--text3);margin-top:1px}
.sess-det-grid{display:grid;grid-template-columns:82px 1fr;gap:0;border:1.5px solid var(--border);border-radius:7px;overflow:hidden}
.sess-det-k{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:6px 10px;background:var(--bg3);border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.sess-det-v{font-size:12px;color:var(--text2);padding:6px 10px;border-bottom:1px solid var(--border);line-height:1.5}
.sess-det-k:last-of-type,.sess-det-v:last-of-type{border-bottom:none}
.ch-chip{display:inline-block;background:var(--li-dim);color:var(--li);border:1px solid rgba(139,197,63,.2);border-radius:4px;padding:2px 7px;font-size:10px;font-weight:600;margin:2px 2px 2px 0}
.hw-flag{display:inline-flex;align-items:center;gap:4px;background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;margin-top:4px}

/* ── ATTENDANCE PANEL ────────────────────────────────────────────── */
.att-block{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;animation:fadeUp .35s var(--e1) .05s both;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.att-hd{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg3)}
.att-title{font-size:13px;font-weight:700;color:var(--text);flex:1}
.att-board-tabs{display:flex;border-bottom:1px solid var(--border)}
.att-board-tab{padding:8px 16px;border:none;background:transparent;font-family:var(--f);font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .13s}
.att-board-tab.on{color:var(--li);border-bottom-color:var(--li)}
.att-table{width:100%;border-collapse:collapse}
.att-table td{padding:7px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2);vertical-align:middle}
.att-table tr:last-child td{border-bottom:none}
.att-table tr.att-ab td{background:rgba(239,68,68,.04)}
.att-photo{width:28px;height:28px;border-radius:6px;background:#1a1a18;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--li);position:relative;overflow:hidden;flex-shrink:0;vertical-align:middle}
.att-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.att-photo.ab-av{background:var(--red-dim);color:var(--red)}
.att-name{font-weight:700;color:var(--text);margin-left:9px;vertical-align:middle}
.att-table tr.att-ab .att-name{color:var(--red)}
.pct-pill-sm{font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;margin-left:6px;display:inline-flex;vertical-align:middle}

/* ── PROGRESS VIEW ───────────────────────────────────────────────── */
.pg-block{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);overflow:visible;margin-bottom:12px;animation:fadeUp .35s var(--e1) both;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.pg-block:hover{border-color:rgba(139,197,63,.4);box-shadow:0 4px 16px rgba(139,197,63,.08)}
.pg-cls-hd{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;transition:background .13s;user-select:none;-webkit-user-select:none;flex-wrap:wrap;background:var(--bg3)}
.pg-cls-hd:hover{background:var(--bg4)}
.pg-cls-num{width:44px;height:44px;border-radius:9px;background:#1a1a18;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--li);flex-shrink:0}
.pg-cls-info{flex:1;min-width:0}
.pg-cls-title{font-size:15px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pg-stream-badge{font-size:10px;font-weight:700;background:var(--purple-dim);color:var(--purple);padding:2px 8px;border-radius:10px}
.pg-cls-meta{font-size:11px;color:var(--text3);margin-top:2px}
.pg-ring-wrap{flex-shrink:0;text-align:center}
.pg-ring-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:3px}
.pg-expand-icon{font-size:11px;color:var(--text3);flex-shrink:0;transition:transform .2s}
.pg-board-tabs{display:flex;border-bottom:1.5px solid var(--border);background:var(--bg4)}
.pg-board-tab{padding:9px 18px;border:none;background:transparent;font-family:var(--f);font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .13s}
.pg-board-tab.on{color:var(--li);border-bottom-color:var(--li)}
.pg-subj-block{border-bottom:1px solid var(--border)}
.pg-subj-block:last-child{border-bottom:none}
.pg-subj-hd{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;transition:background .12s;user-select:none;-webkit-user-select:none;flex-wrap:wrap}
.pg-subj-hd:hover{background:var(--bg3)}
.pg-subj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pg-subj-name{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:120px}
.pg-subj-stats{display:flex;gap:6px;flex-wrap:wrap}
.pg-subj-stat{font-size:10px;font-weight:600;color:var(--text3);background:var(--bg4);padding:2px 8px;border-radius:8px;white-space:nowrap}
.pg-subj-pct-wrap{display:flex;align-items:center;gap:7px;flex-shrink:0}

.pg-subj-arrow{font-size:10px;color:var(--text3);flex-shrink:0;width:14px;text-align:center}
.pg-subj-body{background:var(--bg2)}
.pg-ch-section-label{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:10px 18px 5px;display:flex;align-items:center;gap:8px}
.pg-ch-count{padding:1px 7px;border-radius:10px;font-size:9px;font-weight:800}
.pg-ch-count-done{background:var(--li-dim);color:var(--li)}
.pg-ch-count-todo{background:var(--bg4);color:var(--text3)}
.pg-ch-list{padding:0 0 4px}
.pg-ch-row{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.pg-ch-row:last-child{border-bottom:none}
.pg-ch-row:hover{background:var(--bg3)}
.pg-ch-done-dot{width:7px;height:7px;border-radius:50%;background:var(--li);flex-shrink:0}
.pg-ch-pending-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--text3);flex-shrink:0}
.pg-ch-name{font-size:13px;font-weight:500;color:var(--text);flex:1}

.pg-ch-pill-date{background:var(--bg4);color:var(--text3)}

.pg-detail-entry:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.pg-detail-meta{font-size:10px;font-weight:600;color:var(--text3);display:block;margin-bottom:2px}

/* ── CHAPTERS TABLE VIEW ─────────────────────────────────────────── */
/* reuses .data-table */

/* ── TEACHERS VIEW ───────────────────────────────────────────────── */
.teacher-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px}
.teacher-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:18px;animation:fadeUp .35s var(--e1) both;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.teacher-card:hover{border-color:rgba(139,197,63,.4);box-shadow:0 4px 16px rgba(139,197,63,.08)}
.teacher-av{width:44px;height:44px;border-radius:10px;background:#1a1a18;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--li);margin-bottom:10px}
.teacher-name{font-size:15px;font-weight:700;color:var(--text)}
.teacher-role{font-size:11px;color:var(--text3);margin-bottom:12px}
.teacher-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border-top:1px solid var(--border);padding-top:12px}
.tstat-v{font-size:20px;font-weight:800;color:var(--li);line-height:1}
.tstat-l{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-top:2px}

/* ── EMPTY / LOADING ─────────────────────────────────────────────── */
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:40px;opacity:.2;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px;color:var(--text3)}
.empty-hint{margin-top:12px;font-size:12px;color:var(--text3);background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:10px 16px;line-height:1.6}
.empty-hint b{color:var(--li3);font-weight:700}
.loading-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px}
.loading-ring{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--li);border-right-color:rgba(139,197,63,.4);animation:spin .7s linear infinite}
.loading-txt{font-size:13px;font-weight:600;color:var(--text3)}
.skel-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:12px}
.skel-line{height:10px;border-radius:5px;background:linear-gradient(90deg,var(--bg3)0%,var(--bg4)50%,var(--bg3)100%);background-size:600px 100%;animation:shimmer 1.4s linear infinite;margin-bottom:8px}
.skel-line.w60{width:60%}.skel-line.w40{width:40%}.skel-line.w80{width:80%}

/* ── DATE PICKER ─────────────────────────────────────────────────── */
.dp-wrap{position:relative}
.dp-drop{position:fixed;top:var(--topbar);right:20px;background:#1a1a18;border:1px solid rgba(255,255,255,.1);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:1000;min-width:230px;overflow:hidden;display:none;animation:fadeUp .18s var(--e1)}
.dp-drop.open{display:block}
.dp-hd{background:rgba(255,255,255,.05);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.07)}
.dp-nav{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:4px 9px;border-radius:5px;font-family:var(--f);font-size:13px;transition:all .13s}
.dp-nav:hover{background:rgba(255,255,255,.1);color:#fff}
.dp-ml{font-size:13px;font-weight:700;color:#fff}
.dp-cal{padding:10px}
.dp-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.dp-dow{text-align:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:2px 0}
.dp-week{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-day{text-align:center;padding:6px 2px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.4);transition:all .12s;position:relative}
.dp-day:hover:not(.emp){background:rgba(255,255,255,.1);color:#fff}
.dp-day.hd{color:#fff;font-weight:700}
.dp-day.hd::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--li)}
.dp-day.sel{background:var(--li)!important;color:#0f1117!important;font-weight:800}
.dp-day.sel::after{background:#0f1117!important}
.dp-day.emp{color:rgba(255,255,255,.1);cursor:default;pointer-events:none}
.dp-day.tdy{box-shadow:0 0 0 1.5px rgba(139,197,63,.4) inset}

/* ── SCROLLABLE RIGHT PANEL (day view) ──────────────────────────── */
.right-panel{display:flex;flex-direction:column;gap:14px;position:sticky;top:0}

/* ── PRINT ───────────────────────────────────────────────────────── */
#printDoc{display:none;position:absolute;left:-9999px;top:0}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:0;size:A4 portrait}
  html,body{background:#fff!important;margin:0!important;padding:0!important;height:auto!important;overflow:visible!important;display:block!important}
  body>*{display:none!important}
  .hwr-print{display:block!important;position:static!important}
  #printDoc{display:block!important;position:static!important;left:auto!important;top:auto!important;width:100%!important;font-family:'Inter',Arial,sans-serif!important}
  #hwPrintDoc{display:block!important;position:static!important;width:100%!important;font-family:'Open Sans',Arial,sans-serif!important}
  #progressPrintDoc{display:block!important;position:static!important;width:100%!important;font-family:'Open Sans',Arial,sans-serif!important}
}

/* ══ CHAPTER VIEW (QuanticApp style) ══ */
.pg-layout{display:grid;grid-template-columns:1fr 280px;gap:16px;align-items:start;overflow:visible}
@media(max-width:1100px){.pg-layout{grid-template-columns:1fr}}

/* Subject selector strip */
.subj-strip{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.subj-pill{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg2);font-family:var(--f);font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .14s}
.subj-pill:hover{border-color:var(--li);color:var(--li3)}
.subj-pill.on{background:var(--li);border-color:var(--li);color:#1a1a18}

/* Class header band */
.pg-cls-band{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#1a1a18;border-radius:var(--r2) var(--r2) 0 0;margin-bottom:0}
.pg-cls-band-num{width:40px;height:40px;border-radius:8px;background:rgba(139,197,63,.15);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--li);flex-shrink:0;line-height:1}
.pg-cls-band-info{flex:1}
.pg-cls-band-title{font-size:15px;font-weight:800;color:#fff}
.pg-cls-band-sub{font-size:11px;color:rgba(255,255,255,.38);margin-top:2px}
.pg-cls-band-ring{flex-shrink:0}

/* Board selector inside class */
.pg-board-sel{display:flex;border-bottom:1.5px solid var(--border);background:var(--bg3);margin-bottom:0}
.pg-board-sel-tab{padding:9px 18px;border:none;background:transparent;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;color:var(--text3);border-bottom:3px solid transparent;margin-bottom:-1.5px;transition:all .13px}
.pg-board-sel-tab:hover{color:var(--text);background:rgba(139,197,63,.04)}
.pg-board-sel-tab.on{color:#1a1a18;background:var(--li);border-bottom-color:var(--li);border-radius:6px 6px 0 0;font-weight:800}

/* Chapter list — QuanticApp rows */
.ch-list-wrap{background:var(--bg2);border:1.5px solid var(--border);border-radius:0 0 var(--r2) var(--r2);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.ch-list-hdr{padding:9px 18px;background:var(--bg3);border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:8px}
.ch-list-hdr-txt{font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.ch-list-hdr-count{font-size:9px;font-weight:800;padding:1px 7px;border-radius:10px}

/* Individual chapter row */
.ch-row{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
.ch-row:last-child{border-bottom:none}
.ch-row-main{display:flex;align-items:center;gap:12px;padding:13px 18px}
.ch-row:hover .ch-row-main{background:var(--bg3)}
.ch-row-expand{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:5px;background:var(--bg4);flex-shrink:0;font-size:10px;color:var(--text3);transition:all .14s}
.ch-row.open .ch-row-expand{background:var(--li-dim);color:var(--li3);transform:rotate(90deg)}
.ch-row-name{font-size:13px;font-weight:700;color:var(--text);flex:1;min-width:0}
.ch-row-stats{display:flex;align-items:center;gap:16px;flex-shrink:0}
.ch-row-stat{font-size:11px;color:var(--text3);white-space:nowrap;text-align:right}
.ch-row-stat span{font-weight:700;color:var(--text2)}
.ch-row-pct{font-size:16px;font-weight:900;min-width:44px;text-align:right}
.ch-row-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;white-space:nowrap}
.badge-good{background:rgba(139,197,63,.12);color:var(--li3);border:1px solid rgba(139,197,63,.25)}
.badge-avg{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(217,119,6,.2)}
.badge-low{background:var(--red-dim);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.badge-none{background:var(--bg4);color:var(--text3);border:1px solid var(--border)}
.ch-row-bar-wrap{width:90px;flex-shrink:0}
.ch-row-bar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.ch-row-bar-fill{height:100%;border-radius:3px;transition:width .5s var(--e1)}

/* Pending chapter rows */
.ch-row-pending .ch-row-name{color:var(--text3);font-weight:500;font-style:italic}
.ch-row-pending .ch-row-expand{opacity:.4;pointer-events:none}
.ch-row-pending{cursor:default}
.ch-row-pending:hover .ch-row-main{background:transparent}
.ch-pending-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid var(--text3);flex-shrink:0}
.ch-done-dot{width:7px;height:7px;border-radius:50%;background:var(--li);flex-shrink:0}

/* Chapter detail panel */
.ch-detail-panel{background:var(--bg3);border-top:1px solid var(--border);padding:14px 18px 16px 52px;display:none}
.ch-detail-panel.open{display:block}
.ch-detail-panel.open{display:block;animation:fadeUp .18s var(--e1)}
.ch-detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:14px}
.ch-detail-stat{background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px}
.ch-detail-stat-v{font-size:18px;font-weight:800;color:var(--text);line-height:1}
.ch-detail-stat-l{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:3px}
.ch-detail-dates{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.ch-detail-section-lbl{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;margin-top:10px}
.ch-detail-entry{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:8px 12px;margin-bottom:6px}
.ch-detail-entry:last-child{margin-bottom:0}
.ch-detail-meta{font-size:10px;font-weight:700;color:var(--text3);margin-bottom:3px}
.ch-detail-text{font-size:12px;color:var(--text2);line-height:1.5}
.ch-detail-remark{color:var(--amber)}

/* Right panel — subject overview */
.pg-side-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.pg-side-hdr{padding:11px 14px;background:var(--bg3);border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pg-side-title{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.pg-side-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.pg-side-row:last-child{border-bottom:none}
.pg-side-row:hover{background:var(--bg3)}
.pg-side-ch{font-size:12px;font-weight:600;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pg-side-pct{font-size:12px;font-weight:800;min-width:38px;text-align:right}

/* ── SEARCH ── */
.tb-search-wrap{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:0 12px;width:280px;flex-shrink:0;transition:all .15s;position:relative;z-index:1}
.tb-search-wrap:focus-within{border-color:rgba(139,197,63,.5);background:rgba(255,255,255,.1)}
.tb-search-wrap svg{color:rgba(255,255,255,.3);flex-shrink:0}
.tb-search{flex:1;background:transparent;border:none;outline:none;font-family:var(--f);font-size:13px;font-weight:500;color:#fff;padding:8px 0}
.tb-search::placeholder{color:rgba(255,255,255,.3)}
.tb-search-clear{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:12px;padding:2px 4px;transition:color .13px;flex-shrink:0}
.tb-search-clear:hover{color:#fff}
.search-active .class-block,.search-active .ch-row,.search-active .data-table tr{opacity:.3;transition:opacity .15s}
.search-match{opacity:1!important}
.search-highlight{background:rgba(139,197,63,.25);border-radius:2px;padding:0 1px}

/* ── KPI SPARKLINE / TREND ── */
.kpi-trend-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.kpi-spark{display:flex;align-items:flex-end;gap:2px;height:24px}
.kpi-spark-bar{width:4px;border-radius:2px;background:currentColor;opacity:.25;transition:opacity .15s;flex-shrink:0}
.kpi-spark-bar.cur{opacity:.9}
.kpi-trend-badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap}
.trend-up{background:rgba(139,197,63,.12);color:var(--li3)}
.trend-dn{background:var(--red-dim);color:var(--red)}
.trend-eq{background:var(--bg4);color:var(--text3)}

/* ── HOMEWORK VIEW ── */
.hw-summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.hw-summary-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.hw-summary-card:hover{border-color:rgba(139,197,63,.3)}
.hw-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hw-summary-v{font-size:24px;font-weight:900;color:var(--text);line-height:1;font-family:var(--fs)}
.hw-summary-l{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-top:2px}

.hw-group{margin-bottom:20px}
.hw-group-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hw-group-title{font-size:14px;font-weight:800;color:var(--text)}
.hw-group-count{font-size:11px;font-weight:700;background:var(--bg3);border:1px solid var(--border);color:var(--text3);padding:2px 9px;border-radius:20px}
.hw-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;animation:fadeUp .3s var(--e1) both;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:all .15s;position:relative;overflow:hidden}
.hw-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--li)}
.hw-card:hover{border-color:rgba(139,197,63,.3);transform:translateX(2px)}
.hw-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.hw-card-subject{font-size:14px;font-weight:800;color:var(--text)}
.hw-card-date{font-size:11px;font-weight:600;color:var(--text3);white-space:nowrap}
.hw-card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.hw-text{font-size:13px;color:var(--text2);line-height:1.55;padding:10px 12px;background:var(--bg3);border-radius:7px;border-left:3px solid var(--li)}
.hw-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:11px;color:var(--text3)}
.hw-meta-teacher{font-weight:700;color:var(--text2)}
.hw-overdue{border-color:var(--amber)!important}
.hw-overdue::before{background:var(--amber)!important}
.hw-overdue-tag{font-size:9px;font-weight:800;background:var(--amber-dim);color:var(--amber);padding:2px 7px;border-radius:8px;border:1px solid rgba(217,119,6,.2)}
/* Archived (>7 days) */
.hw-card-archived{opacity:.45;filter:grayscale(.4)}
.hw-card-archived:hover{opacity:.75;filter:none}
.hw-card-archived .hw-card::before{background:var(--text3)!important}
.hw-archived-banner{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:700;color:var(--text3);margin-bottom:10px;cursor:pointer;transition:background .13s;user-select:none}
.hw-archived-banner:hover{background:var(--bg4);color:var(--text2)}
.hw-archived-banner svg{width:14px;height:14px;flex-shrink:0;transition:transform .2s}
.hw-archived-banner.open svg{transform:rotate(90deg)}
.hw-archived-wrap{display:none}
.hw-archived-wrap.open{display:block}
.hw-card-archived .hw-actions{display:none}

/* ── PAGE NUMBERS (print) ── */
@media print{
  .pr-page-num{position:running(pagenum)}
  @page{
    @bottom-right{content:"Page " counter(page) " of " counter(pages);font-size:8px;color:#b0ada4;font-family:'Open Sans',Arial,sans-serif}
    @bottom-left{content:"SEHR Academy · Academic Report";font-size:8px;color:#b0ada4;font-family:'Open Sans',Arial,sans-serif}
  }
}

/* ── HOMEWORK WA ACTIONS ── */
.hw-actions{display:flex;align-items:center;gap:7px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.hw-wa-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;border:1.5px solid rgba(37,211,102,.25);background:rgba(37,211,102,.07);color:#16a34a;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;transition:all .14s;text-decoration:none;white-space:nowrap}
.hw-wa-btn:hover{background:rgba(37,211,102,.14);border-color:rgba(37,211,102,.4);transform:translateY(-1px)}
.hw-wa-btn:active{transform:none}
.hw-wa-btn svg{width:13px;height:13px;flex-shrink:0;fill:currentColor}
.hw-copy-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text3);font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;transition:all .14s;white-space:nowrap}
.hw-copy-btn:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}
.hw-copy-btn.copied{border-color:var(--li);color:var(--li3);background:var(--li-dim)}
.hw-copy-btn svg{width:13px;height:13px;flex-shrink:0}
.hw-group-actions{display:flex;align-items:center;gap:7px;margin-left:auto;flex-wrap:wrap}
.hw-group-wa{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1.5px solid rgba(37,211,102,.25);background:rgba(37,211,102,.07);color:#16a34a;font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;transition:all .14s}
.hw-group-wa:hover{background:rgba(37,211,102,.14);border-color:rgba(37,211,102,.4)}
.hw-group-wa svg{width:12px;height:12px;fill:currentColor;flex-shrink:0}


/* ── MOBILE HEADER FIX ── */
@media(max-width:768px){
  .topbar{padding:0 10px 0 0;gap:0}
  .tb-logo-wrap{padding:0 12px;width:auto;flex-shrink:0;border-right:none}
  .tb-center{display:none}
  .tb-search-wrap{display:none}
  .tb-spacer{display:none}
  .tb-period-badge{display:none}
  .tb-btn svg{width:14px;height:14px}
  .tb-btn{padding:7px 10px;gap:0}
  .tb-btn .btn-lbl{display:none}
}
/* Mobile search bar — shown below topbar */
.mob-search-bar{
  display:none;padding:8px 12px;
  background:var(--bg2);border-bottom:1.5px solid var(--border);
  position:sticky;top:var(--topbar);z-index:99;
}
.mob-search-bar .tb-search-wrap{display:flex;width:100%}
@media(max-width:768px){.mob-search-bar{display:block}}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  /* Hide sidebar on mobile — replaced by bottom drawer */
  .sidebar{display:none}
  .app-body{flex-direction:column}
  .main{width:100%;min-width:0}
  /* Topbar compact */
  .tb-logo-wrap{width:auto;border-right:none;padding:0 14px}
  .tb-logo-sub{display:none}
  .tb-search-wrap{width:140px}
  .tb-btn span,.tb-btn-label{display:none}
  .tb-btn{padding:7px 9px}
  .tb-page-title{font-size:13px}
  .tb-page-sub{display:none}
  /* Mobile bottom nav */
  .mobile-nav{display:flex!important}
  /* Page padding tighter */
  .page-pad{padding:12px}
  /* KPI strip 2 cols */
  .kpi-strip{grid-template-columns:repeat(2,1fr);gap:8px}
  /* Day grid single col */
  .day-grid{grid-template-columns:1fr}
  /* Overview grid single col */
  #overviewGrid{grid-template-columns:1fr!important}
  /* HW summary 2 cols */
  .hw-summary-strip{grid-template-columns:repeat(2,1fr);gap:8px}
  /* Tables scroll */
  .data-table-wrap{overflow-x:auto}
  /* Progress layout */
  .pg-layout{grid-template-columns:1fr}
  /* Chapter row wrap */
  .ch-row-stats{display:none}
  .ch-row-bar-wrap{width:60px}
  /* Topbar height */
  :root{--topbar:52px}
  /* Filter bar scroll */
  .filter-bar{overflow-x:auto;flex-wrap:nowrap;padding:8px 12px;gap:8px}
  .filter-bar::-webkit-scrollbar{height:0}
  /* HW group header wrap */
  .hw-group-hd{flex-wrap:wrap;gap:7px}
  .hw-group-actions{margin-left:0;width:100%}
  /* Session blocks */
  .cb-header{gap:7px}
  .cb-btns{flex-wrap:wrap}
}
@media(max-width:480px){
  .kpi-val{font-size:22px}
  .tb-search-wrap{width:110px}
  .hw-summary-strip{grid-template-columns:1fr 1fr}
}

/* Mobile bottom nav */
.mobile-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:400;
  background:var(--bg2);border-top:1.5px solid var(--border);
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  gap:0;
}
.mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 2px;cursor:pointer;border:none;background:transparent;font-family:var(--f);font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;transition:color .13s;border-radius:7px}
.mob-nav-item.on{color:var(--li3)}
.mob-nav-item .mob-icon{font-size:18px;line-height:1}
@media(max-width:768px){
  .main{padding-bottom:70px}
}

/* ── VISUAL ENHANCEMENTS ── */
/* Period indicator pill in topbar */
.tb-period-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;background:rgba(139,197,63,.1);border:1px solid rgba(139,197,63,.2);font-size:10px;font-weight:700;color:var(--li3);letter-spacing:.04em;flex-shrink:0}
/* KPI hover lift */
.kpi-card{cursor:default}
/* Sidebar active glow */
.sb-item.on{box-shadow:0 0 0 1px rgba(139,197,63,.15) inset}
/* Section titles with accent */
.sec-title::before{animation:pulse 3s ease infinite}
/* Chapter row hover — left accent bar grows */
.ch-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:var(--li);transition:width .15s;border-radius:0 2px 2px 0}
.ch-row{position:relative}
.ch-row:hover::before{width:3px}
/* Board card selected glow */
.pg-board-card.on{box-shadow:0 0 0 1px rgba(139,197,63,.25) inset,0 4px 16px rgba(139,197,63,.08)}
/* Homework card entry animation stagger */
.hw-card{transition:all .15s}
/* Filter bar period active style */
.sb-item.on .sb-item-icon{font-weight:900;color:var(--li3)}

/* ── PREMIUM BOARD SELECTOR ── */
.pg-board-cards{display:flex;gap:10px;padding:16px 18px;background:var(--bg3);border-bottom:1.5px solid var(--border);flex-wrap:wrap}
.pg-board-card{flex:1;min-width:120px;padding:12px 16px;border-radius:10px;border:2px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .16s;position:relative;overflow:hidden;display:flex;align-items:center;gap:10px}
.pg-board-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--li);opacity:0;transition:opacity .16s}
.pg-board-card:hover{border-color:rgba(139,197,63,.3)}
.pg-board-card.on{border-color:rgba(139,197,63,.5);background:rgba(139,197,63,.06);box-shadow:0 0 0 1px rgba(139,197,63,.25) inset,0 4px 16px rgba(139,197,63,.08)}
.pg-board-card.on::before{opacity:1}
.pg-board-card-ic{width:36px;height:36px;border-radius:8px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:background .16s}
.pg-board-card.on .pg-board-card-ic{background:rgba(139,197,63,.15)}
.pg-board-card-info{flex:1;min-width:0}
.pg-board-card-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.2}
.pg-board-card.on .pg-board-card-name{color:var(--li3)}
.pg-board-card-meta{font-size:10px;color:var(--text3);margin-top:2px}
.pg-board-card-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.pg-board-card.on .pg-board-card-check{background:var(--li);border-color:var(--li)}
.pg-board-card-check svg{width:9px;height:9px;color:transparent;transition:color .12s}
.pg-board-card.on .pg-board-card-check svg{color:#1a1a18}

/* ── PREMIUM SUBJECT DROPDOWN ── */
.subj-dropdown-wrap{position:relative;margin-bottom:14px;overflow:visible}
.subj-dropdown-btn{width:100%;display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .16s;user-select:none;-webkit-user-select:none}
.subj-dropdown-btn:hover{border-color:rgba(139,197,63,.4)}
.subj-dropdown-btn.open{border-color:var(--li);background:rgba(139,197,63,.04);border-radius:10px 10px 0 0}
.subj-dropdown-ic{width:34px;height:34px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.subj-dropdown-label{flex:1;min-width:0}
.subj-dropdown-name{font-size:14px;font-weight:800;color:var(--text)}
.subj-dropdown-meta{font-size:10px;color:var(--text3);margin-top:1px}
.subj-dropdown-arrow{color:var(--text3);font-size:12px;transition:transform .18s;flex-shrink:0}
.subj-dropdown-btn.open .subj-dropdown-arrow{transform:rotate(180deg)}
.subj-dropdown-menu{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:2px solid var(--li);border-top:none;border-radius:0 0 10px 10px;z-index:200;overflow:hidden;display:none;box-shadow:0 16px 40px rgba(0,0,0,.25)}
.subj-dropdown-menu.open{display:block}
.subj-dropdown-opt{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid var(--border)}
.subj-dropdown-opt:last-child{border-bottom:none}
.subj-dropdown-opt:hover{background:var(--bg3)}
.subj-dropdown-opt.sel{background:rgba(139,197,63,.07)}
.subj-dropdown-opt-ic{width:30px;height:30px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.subj-dropdown-opt.sel .subj-dropdown-opt-ic{background:rgba(139,197,63,.15)}
.subj-dropdown-opt-name{font-size:13px;font-weight:700;color:var(--text2);flex:1}
.subj-dropdown-opt.sel .subj-dropdown-opt-name{color:var(--li3)}
.subj-dropdown-opt-stat{font-size:10px;font-weight:700;color:var(--text3);white-space:nowrap}
.subj-dropdown-opt-check{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .14s}
.subj-dropdown-opt.sel .subj-dropdown-opt-check{background:var(--li);border-color:var(--li)}
.subj-dropdown-opt-check svg{width:8px;height:8px;color:transparent;transition:color .12s}
.subj-dropdown-opt.sel .subj-dropdown-opt-check svg{color:#1a1a18}

/* ══ VISUAL ENHANCEMENTS ══ */

/* KPI cards — gradient top line + hover lift */
.kpi-card::before{background:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent) 60%,transparent))}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08),0 0 0 1px rgba(139,197,63,.1)}
.kpi-val{font-family:'DM Serif Display',serif}

/* Sidebar — active item gradient */
.sb-item.on{background:linear-gradient(90deg,rgba(139,197,63,.12),rgba(139,197,63,.04))}
.sb-class-item.on{background:linear-gradient(90deg,rgba(139,197,63,.1),rgba(139,197,63,.03))}

/* Day view class blocks — left accent border */
.class-block{border-left:3px solid transparent;transition:all .18s}
.class-block:hover{border-left-color:var(--li)}

/* Chapter rows — animated left bar */
.ch-row{position:relative;overflow:hidden}
.ch-row::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--li);transform:scaleY(0);transition:transform .18s var(--e1);transform-origin:center}
.ch-row:hover::after{transform:scaleY(1)}

/* Attendance photos — ring on present */
.att-table tr:not(.att-ab) .att-photo{box-shadow:0 0 0 2px var(--li)}

/* Homework cards — gradient shimmer on hover */
.hw-card{transition:all .16s}
.hw-card:hover{transform:translateX(3px);border-color:rgba(139,197,63,.35)}
.hw-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(139,197,63,.03),transparent 60%);pointer-events:none}

/* HW text block — styled quote */
.hw-text{border-left:3px solid var(--li);background:linear-gradient(90deg,rgba(139,197,63,.05),transparent)}

/* Progress ring — drop shadow */
.pg-cls-band svg circle:last-of-type{filter:drop-shadow(0 0 4px rgba(139,197,63,.4))}

/* Board cards — premium gradient border on hover */
.pg-board-card{transition:all .18s var(--e1)}
.pg-board-card:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.pg-board-card.on{transform:none}

/* Subject dropdown — backdrop blur on menu */
.subj-dropdown-menu{backdrop-filter:blur(8px)}

/* Overview table rows — left accent on hover */
.data-table tbody tr{position:relative;transition:background .1s}
.data-table tbody tr:hover{background:rgba(139,197,63,.04)!important}

/* Filter bar — sticky with backdrop */
.filter-bar{backdrop-filter:blur(12px);background:rgba(253,252,250,.9)!important}

/* Section titles — weight */
.sec-title{font-size:14px}

/* Topbar glow line */

var MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];

var DAYS_S   = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DAYS_L   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* ══ UTILS ══ */
function g(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mn(n){return (n||'?').trim().split(/\s+/).map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}
function pad(n){return String(n).padStart(2,'0');}
function todayYMD(){return NOW.getFullYear()+'-'+pad(NOW.getMonth()+1)+'-'+pad(NOW.getDate());}
function toMins(t){if(!t)return 0;var p=t.split(':');return +p[0]*60+(+p[1]||0);}
function hrsFmt(m){var h=Math.floor(m/60),mn=m%60;return h?h+'h'+(mn?mn+'m':''):mn+'m';}
function fmtLong(d){if(!d)return '';var p=d.split('-');var dt=new Date(+p[0],+p[1]-1,+p[2]);return DAYS_L[dt.getDay()]+', '+parseInt(p[2])+' '+MONTHS[+p[1]-1]+' '+p[0];}

function attDateToYMD(d){return sessDateToYMD(d);}
function boardToSyl(b){if(b==='Kerala State')return 'STATE';if(b==='CBSE')return 'CBSE';return b;}
function sylLabel(s){if(s==='STATE')return 'Kerala State';return s;}
function pctColor(pct){return pct>=75?'var(--li)':pct>=50?'var(--amber)':'var(--red)';}
function pctBg(pct){return pct>=75?'var(--li-dim)':pct>=50?'var(--amber-dim)':'var(--red-dim)';}
function pctPill(studentId){
  var a=ATT_PCT[studentId];if(!a||!a.sessions)return '';
  var pct=a.pct;
  return '<span class="pct-pill-sm" style="background:'+pctBg(pct)+';color:'+pctColor(pct)+'">'+pct+'%</span>';
}

/* ══ API ══ */
function apiFetch(url,cb){fetch(url).then(function(r){return r.text();}).then(function(t){try{cb(JSON.parse(t),null);}catch(e){cb(null,'Parse: '+t.slice(0,80));}}).catch(function(e){cb(null,e.message);});}
function apiSess(p,cb){var url=SESSION_API+'?'+Object.keys(p).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(p[k]);}).join('&');apiFetch(url,cb);}
function apiAtt(payload,cb){var url=ATT_API+'?data='+encodeURIComponent(JSON.stringify(payload));apiFetch(url,cb);}

/* ══ INIT ══ */
function init(){
  g('loadEl').style.display='flex';
  var sessOk=false,attOk=false;
  apiSess({action:'getAllLogs',appkey:SESS_PASS},function(data,err){
    if(!err&&data&&data.success)SESSIONS=data.logs||[];
    sessOk=true; if(attOk)finishInit();
  });
  apiAtt({action:'getAttendance'},function(data,err){
    if(!err&&data&&data.success)ATTENDANCE=data.records||[];
    attOk=true; if(sessOk)finishInit();
  });
  setTimeout(function(){if(!sessOk||!attOk){g('loadEl').style.display='none';finishInit();}},7000);
}

function finishInit(){
  g('loadEl').style.display='none';
  ATTENDANCE.forEach(function(r){if(r.photo&&r.photo.startsWith('http'))PHOTO_MAP[r.student_id]=r.photo;});
  ATT_PCT={};
  ATTENDANCE.forEach(function(r){if(!ATT_PCT[r.student_id])ATT_PCT[r.student_id]={sessions:0,present:0};ATT_PCT[r.student_id].sessions++;if(r.status==='Present')ATT_PCT[r.student_id].present++;});
  Object.keys(ATT_PCT).forEach(function(id){var a=ATT_PCT[id];a.pct=a.sessions?Math.round(a.present/a.sessions*100):0;});
  var dset={};SESSIONS.forEach(function(r){var d=sessDateToYMD(r.date);if(d)dset[d]=true;});
  AVAIL=Object.keys(dset).sort().reverse();
  var cset={};SESSIONS.forEach(function(r){if(r.class)cset[r.class]=true;});
  ALL_CLS=Object.keys(cset).sort(function(a,b){return +a-+b;});
  var td=todayYMD();
  CUR_DATE=AVAIL.indexOf(td)>-1?td:(AVAIL[0]||td);
  var p=CUR_DATE.split('-');CAL_Y=+p[0];CAL_M=+p[1]-1;
  updateDPDisp();renderDP();
  buildSbClasses();
  var totalSess=SESSIONS.length,totalAtt=ATTENDANCE.length;
  g('tbPageSub').textContent=totalSess+' sessions · '+totalAtt+' attendance records';
  setView('overview',g('nav-overview'));
}

/* ══ SIDEBAR CLASSES ══ */
function buildSbClasses(){
  var el=g('sbClasses');el.innerHTML='';

  // ALL
  var allItem=document.createElement('div');
  allItem.className='sb-class-item on';allItem.id='sb-cls-ALL';
  allItem.innerHTML='<div class="sb-class-num" style="font-size:9px;letter-spacing:.08em">ALL</div>'+
    '<div class="sb-class-info"><div class="sb-class-name">All Classes</div>'+
    '<div class="sb-class-meta sb-all-time">'+SESSIONS.length+' sessions</div></div>';
  allItem.onclick=function(){setClsFilt('ALL',allItem);};
  el.appendChild(allItem);

  ALL_CLS.forEach(function(cls){
    var clsSess=SESSIONS.filter(function(r){return r.class===cls;});
    var boards=Array.from(new Set(clsSess.map(function(r){return r.board;}))).sort();
    var splitByBoard = cls==='9'||cls==='10';

    if(splitByBoard && boards.length>1){
      // Separate entry per board for Class 9 & 10
      boards.forEach(function(board){
        var filtKey=cls+'|'+board;
        var bSess=clsSess.filter(function(r){return r.board===board;});
        var bChaps=new Set();bSess.forEach(function(r){(r.chapters||'').split(' | ').filter(Boolean).forEach(function(c){bChaps.add(c);});});
        var shortBoard=board==='Kerala State'?'State':board;
        var item=document.createElement('div');
        item.className='sb-class-item';item.id='sb-cls-'+cls+'_'+shortBoard;
        item.innerHTML=
          '<div class="sb-class-num" style="font-size:11px">'+esc(cls)+'</div>'+
          '<div class="sb-class-info">'+
            '<div class="sb-class-name">Class '+esc(cls)+' <span style="font-size:10px;font-weight:600;color:var(--text3)">'+esc(shortBoard)+'</span></div>'+
            '<div class="sb-class-meta sb-all-time">'+bSess.length+' · '+bChaps.size+' ch <span class="sb-at-tag">all time</span></div>'+
          '</div>';
        (function(fk,it){item.onclick=function(){setClsFilt(fk,it);};})(filtKey,item);
        el.appendChild(item);
      });
    } else {
      // Single entry for Class 11, 12 (or 9/10 if only one board)
      var clsChaps=new Set();clsSess.forEach(function(r){(r.chapters||'').split(' | ').filter(Boolean).forEach(function(c){clsChaps.add(c);});});
      var item=document.createElement('div');
      item.className='sb-class-item';item.id='sb-cls-'+cls;
      item.innerHTML=
        '<div class="sb-class-num">'+esc(cls)+'</div>'+
        '<div class="sb-class-info">'+
          '<div class="sb-class-name">Class '+esc(cls)+'</div>'+
          '<div class="sb-class-meta sb-all-time">'+clsSess.length+' · '+clsChaps.size+' ch <span class="sb-at-tag">all time</span></div>'+
        '</div>';
      (function(c,it){item.onclick=function(){setClsFilt(c,it);};})(cls,item);
      el.appendChild(item);
    }
  });
}

function setClsFilt(cls,el){
  CUR_CLS=cls;
  document.querySelectorAll('.sb-class-item').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  renderAll();
}

/* ══ FILTERED DATA ══ */
function parseCurCls(){
  // CUR_CLS is either 'ALL', '9', '10', '11', '12', or '9|CBSE', '10|Kerala State' etc.
  if(CUR_CLS==='ALL') return {cls:null,board:null};
  var parts=CUR_CLS.split('|');
  return {cls:parts[0], board:parts[1]||null};
}
function getSessions(){
  var fc=parseCurCls();
  return SESSIONS.filter(function(r){
    if(fc.cls && r.class!==fc.cls) return false;
    if(fc.board && r.board!==fc.board) return false;
    var d=sessDateToYMD(r.date);
    if(CUR_PERIOD==='day')  return d===CUR_DATE;
    if(CUR_PERIOD==='week') {var cd=new Date(CUR_DATE),from=new Date(cd);from.setDate(cd.getDate()-6);var rd=new Date(d);return rd>=from&&rd<=cd;}
    if(CUR_PERIOD==='month'){var p=CUR_DATE.split('-');return d.startsWith(p[0]+'-'+p[1]);}
    return true;
  });
}
function getAtt(cls){return ATTENDANCE.filter(function(r){return attDateToYMD(r.date)===CUR_DATE&&r.class===cls;});}

/* ══ RENDER ALL ══ */
function renderAll(){
  var data=getSessions();
  if(CUR_VIEW==='overview')  renderOverview(data);
  else if(CUR_VIEW==='day')  renderDay(data);
  else if(CUR_VIEW==='progress')  renderProgress(data);
  else if(CUR_VIEW==='chapters')  renderChapters(data);
  else if(CUR_VIEW==='teachers')  renderTeachers(data);
  else if(CUR_VIEW==='homework')   renderHomework();
  buildPrintDoc(data,'ALL','','ALL');
}

/* ══ OVERVIEW ══ */
function renderOverview(data){
  var mins=data.reduce(function(a,r){return a+(+r.duration_mins||0);},0);
  var chapSet={};data.forEach(function(r){(r.chapters||'').split(' | ').filter(Boolean).forEach(function(c){chapSet[c]=true;});});
  var hw=data.filter(function(r){return r.homework&&r.homework.trim();}).length;
  var teachers=Array.from(new Set(data.map(function(r){return r.teacher_id;}))).size;
  var attDay=ATTENDANCE.filter(function(r){return attDateToYMD(r.date)===CUR_DATE;});
  var attP=attDay.filter(function(r){return r.status==='Present';}).length;
  var attPct=attDay.length?Math.round(attP/attDay.length*100):null;

  g('kpiStrip').innerHTML=
    kpiCard('📚',data.length,'Sessions','var(--li)','var(--li-dim)','sessions')+
    kpiCard('⏱',hrsFmt(mins),'Teaching Time','var(--blue)','var(--blue-dim)','mins')+
    kpiCard('📖',Object.keys(chapSet).length,'Chapters Covered','var(--purple)','var(--purple-dim)','chapters')+
    kpiCard('👨‍🏫',teachers,'Active Teachers','var(--teal)','var(--teal-dim)','')+
    kpiCard('📝',hw,'With Homework','var(--amber)','var(--amber-dim)','hw')+
    (attDay.length?kpiCard('👥',attPct!==null?attPct+'%':'—','Attendance','var(--li)','var(--li-dim)',''):'');

  // Class breakdown table
  // Group by class + board (separate CBSE/State for 9 & 10)
  var byGroup={};
  data.forEach(function(r){
    var cls=r.class, board=r.board||'';
    // For 9 & 10 separate by board; for 11 & 12 group together
    var key=(cls==='9'||cls==='10')?(cls+'|'+board):cls;
    if(!byGroup[key])byGroup[key]={class:cls,board:(cls==='9'||cls==='10')?board:'',sessions:0,mins:0,chapters:new Set()};
    var c=byGroup[key];c.sessions++;c.mins+=(+r.duration_mins||0);
    (r.chapters||'').split(' | ').filter(Boolean).forEach(function(ch){c.chapters.add(ch);});
  });
  var maxMins=Math.max.apply(null,Object.values(byGroup).map(function(c){return c.mins;}))||1;

  // Average attendance % per class (all-time from ATT_PCT)
  function avgAttPct(cls, board){
    var students=Object.keys(ATT_PCT).filter(function(id){
      // filter att records for this class+board
      var recs=ATTENDANCE.filter(function(r){return r.class===cls&&(!board||boardToSyl(board)===r.syllabus);});
      return recs.some(function(r){return r.student_id===id;});
    });
    if(!students.length) return null;
    var total=students.reduce(function(a,id){return a+(ATT_PCT[id]?ATT_PCT[id].pct:0);},0);
    return Math.round(total/students.length);
  }

  var rows=Object.keys(byGroup).sort(function(a,b){
    var pa=a.split('|'), pb=b.split('|');
    if(pa[0]!==pb[0])return +pa[0]-+pb[0];
    return (pa[1]||'').localeCompare(pb[1]||'');
  }).map(function(key){
    var c=byGroup[key];var pct=Math.round(c.mins/maxMins*100);
    var avgPct=avgAttPct(c.class, c.board);
    var avgStr=avgPct!==null?'<span style="font-weight:800;color:'+pctColor(avgPct)+'">'+ avgPct+'%</span>':'—';
    var clsLabel='Class '+c.class+(c.board?' <span style="font-size:9px;font-weight:700;opacity:.7">'+c.board+'</span>':''  );
    return '<tr>'+
      '<td><span class="badge badge-g">'+clsLabel+'</span></td>'+
      '<td class="bold">'+c.sessions+'</td>'+
      '<td><div class="pbar-wrap"><div class="pbar"><div class="pbar-fill" style="width:'+pct+'%;background:var(--li)"></div></div><span class="pbar-lbl" style="color:var(--li)">'+hrsFmt(c.mins)+'</span></div></td>'+
      '<td>'+c.chapters.size+'</td>'+
      '<td>'+avgStr+'</td>'+
      '</tr>';
  }).join('');

  g('overviewGrid').innerHTML=
    '<div>'+
    '<div class="sec-hdr"><div class="sec-title">Class Breakdown</div></div>'+
    '<div class="data-table-wrap"><table class="data-table">'+
    '<thead><tr><th>Class</th><th>Sessions</th><th>Teaching Time</th><th>Chapters</th><th>Avg Att.</th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>'+
    '</div>'+
    '<div>'+
    '<div class="sec-hdr"><div class="sec-title">Recent Sessions</div></div>'+
    '<div class="data-table-wrap"><table class="data-table">'+
    '<thead><tr><th>Teacher</th><th>Class</th><th>Subject</th><th>Duration</th></tr></thead>'+
    '<tbody>'+
    data.slice(0,10).map(function(r){
      return '<tr>'+
        '<td class="bold">'+esc(r.teacher_name)+'</td>'+
        '<td><span class="badge badge-b">Cls '+esc(r.class)+'</span></td>'+
        '<td>'+esc(r.subject)+'</td>'+
        '<td style="color:var(--li);font-weight:700">'+hrsFmt(+r.duration_mins||0)+'</td>'+
        '</tr>';
    }).join('')+
    '</tbody></table></div>'+
    '</div>';
}

function getWeeklyData(field){
  // Returns array of 7 daily values (Sun→Sat of current week)
  var vals=[];
  for(var i=6;i>=0;i--){
    var d=new Date(CUR_DATE);d.setDate(d.getDate()-i);
    var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    var daySess=SESSIONS.filter(function(r){return sessDateToYMD(r.date)===ds;});
    if(field==='sessions') vals.push(daySess.length);
    else if(field==='mins') vals.push(daySess.reduce(function(a,r){return a+(+r.duration_mins||0);},0));
    else if(field==='chapters'){var cs=new Set();daySess.forEach(function(r){(r.chapters||'').split(' | ').filter(Boolean).forEach(function(c){cs.add(c);});});vals.push(cs.size);}
    else if(field==='hw') vals.push(daySess.filter(function(r){return r.homework&&r.homework.trim();}).length);
    else vals.push(0);
  }
  return vals;
}
function sparkHtml(vals, accent){
  if(!vals||!vals.length)return '';
  var max=Math.max.apply(null,vals)||1;
  return '<div class="kpi-spark">'+vals.map(function(v,i){
    var h=Math.max(3,Math.round((v/max)*24));
    return '<div class="kpi-spark-bar'+(i===vals.length-1?' cur':'')+'" style="height:'+h+'px;color:'+accent+'"></div>';
  }).join('')+'</div>';
}
function trendBadge(vals){
  if(vals.length<2)return '';
  var today=vals[vals.length-1],yesterday=vals[vals.length-2];
  if(today>yesterday)return '<span class="kpi-trend-badge trend-up">↑ '+today+'</span>';
  if(today<yesterday)return '<span class="kpi-trend-badge trend-dn">↓ '+today+'</span>';
  return '<span class="kpi-trend-badge trend-eq">= '+today+'</span>';
}
function kpiCard(ic,v,l,accent,bg,sparkField){
  var vals=sparkField?getWeeklyData(sparkField):[];
  return '<div class="kpi-card" style="--accent:'+accent+'">'+
    '<div class="kpi-top">'+
      '<div class="kpi-icon" style="background:'+bg+'">'+ic+'</div>'+
      (vals.length?trendBadge(vals):'')+
    '</div>'+
    '<div class="kpi-val">'+esc(String(v))+'</div>'+
    '<div class="kpi-lbl">'+l+'</div>'+
    (vals.length?'<div class="kpi-trend-row">'+sparkHtml(vals,accent)+'</div>':'')+
    '</div>';
} // simple trend indicator

        '</div>'+
        '<div class="sess-det-grid">'+
          sdet('Subject',esc(r.subject))+

          (r.remarks&&r.remarks.trim()?sdet('Remarks',esc(r.remarks)):'')+
        '</div>'+
      '</div>';
    });
    leftHtml+='</div></div>';
  });

  // Right panel: attendance per class
  Object.keys(byClass).sort().forEach(function(key){
    var cls=byClass[key];
    var _safeKey=key.replace(/[^a-zA-Z0-9]/g,'_');  // safe for use in HTML IDs
    var attRows=getAtt(cls.class);
    if(!attRows.length){
      rightHtml+='<div class="att-block"><div class="att-hd"><div class="att-title">Class '+esc(cls.class)+' · Attendance</div></div><div style="padding:16px;font-size:12px;color:var(--text3);font-style:italic">No attendance data for this date.</div></div>';

    }
    var ap=attRows.filter(function(r){return r.status==='Present';}).length;
    var aa=attRows.length-ap;
    var syls=Array.from(new Set(attRows.map(function(r){return r.syllabus;}))).sort(function(a,b){return a==='STATE'?-1:b==='STATE'?1:a.localeCompare(b);});

      '<div class="att-title">Class '+esc(cls.class)+' Attendance</div>'+

      '<span class="badge badge-r">'+aa+' A</span>'+
      '<span class="badge badge-n" style="margin-left:auto">'+Math.round(ap/attRows.length*100)+'%</span>'+
      '</div>';

      rightHtml+='<div class="att-board-tabs">';
      syls.forEach(function(s,si){rightHtml+='<button class="att-board-tab'+(si===0?' on':'')+'" onclick="switchAttBoard(this,\'att-syl-'+_safeKey+'-'+si+'\')">'+esc(sylLabel(s))+'</button>';});
      rightHtml+='</div>';
    }
    syls.forEach(function(syl,si){
      var sr=attRows.filter(function(r){return r.syllabus===syl;});
      var sp=sr.filter(function(r){return r.status==='Present';}).length;
      rightHtml+='<div id="att-syl-'+_safeKey+'-'+si+'"'+(si>0&&syls.length>1?' style="display:none"':'')+'>';

      rightHtml+='<table class="att-table">';
      sr.forEach(function(r){
        var ab=r.status==='Absent';
        var ph=PHOTO_MAP[r.student_id]||r.photo||'';
        var av='<div class="att-photo'+(ab?' ab-av':'')+'">'+(ph?'<img src="'+ph+'" alt="">':'')+mn(r.full_name)+'</div>';
        rightHtml+='<tr class="'+(ab?'att-ab':'')+'"><td>'+av+'<span class="att-name">'+esc(r.full_name)+'</span>'+pctPill(r.student_id)+'</td>'+

      });
      rightHtml+='</table></div>';
    });
    rightHtml+='</div>';

  el.innerHTML='<div class="day-grid"><div>'+leftHtml+'</div><div class="right-panel">'+rightHtml+'</div></div>';

function switchAttBoard(btn,panelId){

/* ══ PROGRESS VIEW ══ */
function loadMasterChapters(cb){
  if(CHAPTERS_LOADED){cb();return;}
  var done=false;
  function finish(data,source){
    if(done)return; done=true;
    var count=0;
    if(data&&data.chapters&&data.chapters.length){
      data.chapters.forEach(function(r){
        var key=r.class+'|'+r.syllabus+'|'+r.subject;
        if(!MASTER_CHAPTERS[key])MASTER_CHAPTERS[key]=[];
        MASTER_CHAPTERS[key].push(r.chapter);
        count++;
      });
    }
    CHAPTERS_LOADED=true;
    cb();
  }
  // Timeout fallback
  setTimeout(function(){finish({chapters:[]});},8000);
  try{
    apiSess({action:'getChaptersList',appkey:SESS_PASS},function(data,err){
      finish((!err&&data&&data.success)?data:{chapters:[]});
    });
  }catch(e){finish({chapters:[]});}
}
function renderProgress(data){
  var el=g('vProgress');
  el.innerHTML='<div class="loading-overlay"><div class="loading-ring"></div><div class="loading-txt">Loading chapter data…</div></div>';
  // Progress always shows ALL sessions for the selected class/board
  // (period filter would hide subjects not taught in that window)
  var fc=parseCurCls();
  var progData=SESSIONS.filter(function(r){
    if(fc.cls&&r.class!==fc.cls)return false;
    if(fc.board&&r.board!==fc.board)return false;
    return true;
  });
  loadMasterChapters(function(){buildProgressView(progData,el);});
}
function buildProgressView(data,el){
  console.log('BPV called, data.length=',data?data.length:0);
  if(!data||!data.length){el.innerHTML=noDataMsg();return;}

  // ── Build tree: class → board → subject → chapters ──────────────
  var tree={};
  data.forEach(function(r){
    var cls=r.class,board=r.board||'',subj=r.subject||'',date=sessDateToYMD(r.date);
    if(!tree[cls])tree[cls]={stream:r.stream||'',boards:{}};
    if(!tree[cls].boards[board])tree[cls].boards[board]={subjects:{}};
    if(!tree[cls].boards[board].subjects[subj])tree[cls].boards[board].subjects[subj]={sessions:[],chapterMap:{}};
    var sd=tree[cls].boards[board].subjects[subj];
    sd.sessions.push(r);
    (r.chapters||'').split(' | ').filter(Boolean).forEach(function(ch){
      if(!sd.chapterMap[ch])sd.chapterMap[ch]={count:0,mins:0,dates:[],remarks:[],topics:[],teachers:new Set()};
      var cd=sd.chapterMap[ch];cd.count++;cd.mins+=(+r.duration_mins||0);
      if(date&&cd.dates.indexOf(date)===-1)cd.dates.push(date);
      if(r.topics&&r.topics.trim())cd.topics.push({date:date,text:r.topics.trim(),teacher:r.teacher_name});
      if(r.remarks&&r.remarks.trim())cd.remarks.push({date:date,text:r.remarks.trim(),teacher:r.teacher_name});
      cd.teachers.add(r.teacher_name);
    });
  });

  var html='';

  Object.keys(printTree).sort(function(a,b){return+a-+b;}).forEach(function(cls){
    var clsData=tree[cls];
    var totalSess=data.filter(function(r){return r.class===cls;}).length;
    var totalMins=data.filter(function(r){return r.class===cls;}).reduce(function(a,r){return a+(+r.duration_mins||0);},0);
    var totalMaster=0,totalCovered=0;
    Object.keys(clsData.boards).forEach(function(b){
      Object.keys(clsData.boards[b].subjects).forEach(function(s){
        var mk=cls+'|'+b+'|'+s;
        var master=MASTER_CHAPTERS[mk]||[];
        totalMaster+=master.length;
        totalCovered+=Object.keys(clsData.boards[b].subjects[s].chapterMap).length;

    });
    var overallPct=totalMaster>0?Math.min(100,Math.round(totalCovered/totalMaster*100)):null;

    // ── Class header band ─────────────────────────────────────────
    var rc=overallPct===null?'var(--text3)':overallPct>=75?'var(--li)':overallPct>=40?'var(--amber)':'var(--red)';
    html+='<div class="pg-block">';
    html+='<div class="pg-cls-band">';
    html+='<div class="pg-cls-band-num">'+esc(cls)+'</div>';
    html+='<div class="pg-cls-band-info">';
    html+='<div class="pg-cls-band-title">Class '+esc(cls)+(clsData.stream?' · '+esc(clsData.stream):'')+'</div>';
    html+='<div class="pg-cls-band-sub">'+totalSess+' sessions · '+hrsFmt(totalMins)+(overallPct!==null?' · '+overallPct+'% covered':'')+'</div>';
    html+='</div>';
    // Ring

      var R=22,circ=2*Math.PI*R,dash=circ*(overallPct/100),gap=circ-dash;

        '<circle cx="30" cy="30" r="'+R+'" fill="none" stroke="'+rc+'" stroke-width="5"'+
        ' stroke-dasharray="'+dash.toFixed(1)+' '+gap.toFixed(1)+'"'+
        ' stroke-dashoffset="'+(circ/4).toFixed(1)+'" stroke-linecap="round"/>'+
        '<text x="30" y="35" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">'+overallPct+'%</text>'+
        '</svg></div>';

    html+='</div>'; // end pg-cls-band

    // ── Board cards ─────────────────────────────────────────────────

      html+='</div></div>';

      // Subject panels

        var master=MASTER_CHAPTERS[mk]||[];
        var coveredChs=Object.keys(sd.chapterMap);
        var notCovered=master.filter(function(c){return!sd.chapterMap[c];});
        var covPct=master.length>0?Math.min(100,Math.round(coveredChs.length/master.length*100)):null;

      // RIGHT: subject overview sidebar

function switchSubject(groupId,selIdx){
  // Pills — find via direct ID (no querySelectorAll subtree issues)
  var si=0;
  while(true){
    var pill=g('subjpill-'+groupId+'-'+si);
    if(!pill)break;

  }

function switchPgBoard(bodyId,btn,panelId){

  body.querySelectorAll('.pg-board-tab,.pg-board-sel-tab,.pg-board-card').forEach(function(b){b.classList.remove('on');});
  // Hide only panels that belong to this bodyId (prefix match, scoped to this block)
  var prefix='pgpanel-'+bodyId+'-';

function hlSearch(str){
  if(!SEARCH_TERM||!str) return esc(str||'');
  var escaped = SEARCH_TERM.replace(/[-\/\\^$*+?.()|[\]{}]/g,'\\$&');
  var re = new RegExp('('+escaped+')','gi');
  return esc(str).replace(re, '<span class="search-highlight">$1</span>');
}
// Filter sessions by search term
function searchFilter(sessions){
  if(!SEARCH_TERM) return sessions;
  var t=SEARCH_TERM;
  return sessions.filter(function(r){
    return (r.teacher_name||'').toLowerCase().indexOf(t)>-1 ||
           (r.subject||'').toLowerCase().indexOf(t)>-1 ||
           (r.chapters||'').toLowerCase().indexOf(t)>-1 ||
           (r.topics||'').toLowerCase().indexOf(t)>-1 ||
           (r.board||'').toLowerCase().indexOf(t)>-1 ||
           (r.class||'').toLowerCase().indexOf(t)>-1;
  });
}

/* ══ HOMEWORK TRACKER ══ */
function renderHomework(){
  var el=g('vHomework');
  el.innerHTML='<div class="loading-overlay"><div class="loading-ring"></div><div class="loading-txt">Loading homework records…</div></div>';

  // Load from HomeworkTracking sheet + session log homework assignments
  var fc=parseCurCls();
  var p={action:'getHomeworkTracking',appkey:SESS_PASS};
  if(fc.cls) p.class=fc.cls;

  // Run both in parallel: get tracking records + session homework list
  var trackDone=false, sessDone=false;
  var TRACK_RECS=[], SESS_HW=[];

  function tryRender(){
    if(!trackDone||!sessDone) return;
    buildHWReport(el, TRACK_RECS, SESS_HW, fc);
  }

  apiSess(p, function(data,err){
    if(!err&&data&&data.success) TRACK_RECS=data.records||[];
    trackDone=true; tryRender();
  });

  // Also get all session homework for the full assignment list
  var sp={action:'getAllLogs',appkey:SESS_PASS};
  apiSess(sp, function(data,err){
    if(!err&&data&&data.success){
      SESS_HW=(data.logs||[]).filter(function(r){
        return r.homework&&r.homework.trim();
      });
      if(fc.cls)   SESS_HW=SESS_HW.filter(function(r){return r.class===fc.cls;});
      if(fc.board) SESS_HW=SESS_HW.filter(function(r){return r.board===fc.board;});
    }
    sessDone=true; tryRender();
  });
}

function buildHWReport(el, tracks, sessHw, fc){
  // Build a key for each unique homework assignment from session logs
  // Key: class|board|subject|hw_date
  var assignMap={};
  sessHw.forEach(function(r){
    var date=sessDateToYMD(r.date);
    var key=r.class+'|'+r.board+'|'+r.subject+'|'+date;
    if(!assignMap[key]) assignMap[key]={
      key:key,class:r.class,board:r.board,stream:r.stream||'',
      subject:r.subject,teacher:r.teacher_name,
      hw_date:date,homework:r.homework,
      chapters:(r.chapters||'').split(' | ').filter(Boolean)
    };
  });

  // Group tracking records by hw_date+class+subject
  var trackMap={};
  tracks.forEach(function(r){
    var k=r.class+'|'+(r.syllabus==='STATE'?'Kerala State':r.syllabus)+'|'+r.subject+'|'+r.hw_date;
    if(!trackMap[k]) trackMap[k]=[];
    trackMap[k].push(r);
  });

  var assignments=Object.values(assignMap).sort(function(a,b){
    return b.hw_date.localeCompare(a.hw_date);
  });

  if(!assignments.length){
    el.innerHTML=noDataMsg();
    return;
  }

  // Summary strip
  var totalAssign=assignments.length;
  var totalTracked=Object.keys(trackMap).length;
  var totalNd=tracks.length;
  var classSet=new Set(assignments.map(function(a){return a.class;}));

  var html=
    '<div class="hw-summary-strip" style="margin-bottom:16px">'+
    hwSumCard('📋',totalAssign,'Assignments','rgba(139,197,63,.1)')+
    hwSumCard('✅',totalTracked,'Marked','rgba(79,142,247,.1)')+
    hwSumCard('❌',totalNd,'Not Submitted','rgba(220,38,38,.08)')+
    hwSumCard('🎓',classSet.size,'Classes','rgba(167,139,250,.1)')+
    '</div>';

  // View tabs: All / Not Submitted / Submitted
  html+='<div class="hwr-tabs">'+
    '<button class="hwr-tab on" onclick="setHWTab(\"all\",this)">All Assignments</button>'+
    '<button class="hwr-tab" onclick="setHWTab(\"nd\",this)">Not Submitted</button>'+
    '<button class="hwr-tab" onclick="setHWTab(\"done\",this)">Submitted</button>'+
    '</div>';

  html+='<div id="hwTabContent">';
  html+=buildHWTabContent(assignments, trackMap, 'all');
  html+='</div>';

  el.innerHTML=html;
  // Store for tab switching
  el._assignments=assignments;
  el._trackMap=trackMap;
}

    var dateLabel=daysAgo===0?'Today':daysAgo===1?'Yesterday':fmtShort(a.hw_date);

    '</div>';

      '<div style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:4px">Homework</div>'+
      '<div style="font-size:13px;color:var(--text);line-height:1.55;padding:8px 12px;background:var(--bg3);border-radius:6px;border-left:3px solid var(--li)">'+esc(a.homework)+'</div>'+
      (a.chapters.length?'<div style="margin-top:6px;font-size:10px;color:var(--text3)">📖 '+esc(a.chapters.join(', '))+'</div>':'')+
    '</div>';

        '<th>Student</th><th>Status</th><th>Class</th><th>Syllabus</th><th>Marked On</th>'+

function setHWTab(tab,btn){
  document.querySelectorAll('.hwr-tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  var hwEl=g('vHomework');
  if(!hwEl||!hwEl._assignments) return;
  g('hwTabContent').innerHTML=buildHWTabContent(hwEl._assignments,hwEl._trackMap,tab);
  // Re-store data
  hwEl._assignments.forEach(function(a){
    var sk=a.key.replace(/[^a-zA-Z0-9]/g,'_');
    var el2=g('hwg-'+sk);
    if(el2) el2._data={assignment:a,ndRecs:hwEl._trackMap[a.key]||[]};
  });
}
