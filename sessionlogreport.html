<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Academic Dashboard — SEHR Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a18;--ink2:#2e2e2b;--ink3:#4a4a46;
  --cr:#f5f2eb;--c2:#ede9e0;--c3:#e4dfd4;
  --wh:#fdfcfa;--mu:#7a7970;--pa:#b0ada4;--ru:#d8d4cb;
  --li:#8BC53F;--l2:#72a530;--l3:#5e8a24;
  --lb:#f0f7e3;--lm:#c8e48e;
  --re:#dc2626;--rb:#fef2f2;--rm:#fca5a5;
  --am:#d97706;--ab:#fffbeb;
  --bl:#2563eb;--bb:#eff6ff;--bm:#bfdbfe;
  --pu:#7c3aed;--pb:#f5f3ff;--pm:#ddd6fe;
  --f:'Open Sans',sans-serif;
  --e1:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--cr);color:var(--ink);font-size:14px;line-height:1.5;min-height:100vh}

@keyframes fIn    {from{opacity:0}to{opacity:1}}
@keyframes fUp    {from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.35}}
@keyframes cardIn {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}

/* ── TOPBAR ── */
.topbar{background:var(--ink);padding:0 28px;overflow:hidden;position:sticky;top:0;z-index:300;border-bottom:3px solid var(--li)}
.topbar::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.topbar::after{content:'';position:absolute;top:-80px;right:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,197,63,.1),transparent 60%);pointer-events:none}
.tb-inner{padding:16px 0 12px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative;z-index:1;flex-wrap:wrap}
.tb-kicker{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.tb-kr{width:22px;height:2px;background:var(--li)}
.tb-kt{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--li);opacity:.85}
.tb-h{font-size:clamp(18px,2.5vw,26px);font-weight:800;letter-spacing:-1px;color:#fff;line-height:1;margin-bottom:2px}
.tb-h i{font-style:italic;font-weight:300;color:var(--li)}
.tb-sub{font-size:11px;color:rgba(255,255,255,.3)}
.tb-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.btn-tb{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:6px;border:none;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-tb.pdf{background:var(--li);color:var(--ink);box-shadow:0 3px 12px rgba(139,197,63,.3)}
.btn-tb.pdf:hover{background:var(--l2)}
.btn-tb.wa{background:rgba(37,211,102,.1);color:#128c3e;border:1.5px solid rgba(37,211,102,.25)!important}
.btn-tb.wa:hover{background:rgba(37,211,102,.2)}
.btn-tb svg{width:13px;height:13px;flex-shrink:0}

/* ── CONTROLS ── */
.controls{background:var(--wh);border-bottom:1.5px solid var(--c3);padding:12px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:68px;z-index:200}
.ctrl-sep{width:1px;height:22px;background:var(--ru);flex-shrink:0}
.ctrl-lbl{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);flex-shrink:0}

/* Date picker */
.dp-wrap{position:relative}
.dp-disp{display:flex;align-items:center;gap:7px;padding:7px 12px;border:1.5px solid var(--ru);border-radius:7px;background:var(--cr);cursor:pointer;font-family:var(--f);font-size:13px;font-weight:700;color:var(--ink);transition:all .16s;user-select:none;min-width:150px}
.dp-disp:hover{border-color:var(--lm)}
.dp-disp.open{border-color:var(--li);box-shadow:0 0 0 3px rgba(139,197,63,.1)}
.dp-arrow{color:var(--pa);font-size:10px;transition:transform .2s;margin-left:auto}
.dp-disp.open .dp-arrow{transform:rotate(180deg)}
.dp-drop{position:absolute;top:calc(100%+5px);left:0;background:var(--wh);border:1.5px solid var(--c3);border-radius:10px;box-shadow:0 16px 40px rgba(0,0,0,.14);z-index:500;min-width:216px;overflow:hidden;display:none;animation:fIn .16s var(--e1)}
.dp-drop.open{display:block}
.dp-hd{background:var(--ink);padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.dp-nav{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:4px 8px;border-radius:4px;font-family:var(--f);font-size:13px;transition:color .14s}
.dp-nav:hover{color:#fff}
.dp-ml{font-size:13px;font-weight:700;color:#fff}
.dp-cal{padding:9px}
.dp-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.dp-dow{text-align:center;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--pa);padding:2px 0}
.dp-week{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-day{text-align:center;padding:5px 2px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;color:var(--mu);transition:all .13s;position:relative}
.dp-day:hover:not(.emp):not(.othr){background:var(--lb);color:var(--l3)}
.dp-day.hd{color:var(--ink);font-weight:800}
.dp-day.hd::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--li)}
.dp-day.sel{background:var(--li)!important;color:var(--ink)!important;font-weight:800}
.dp-day.sel::after{background:var(--ink)!important}
.dp-day.emp,.dp-day.othr{color:var(--ru);cursor:default;pointer-events:none}
.dp-day.tdy{box-shadow:0 0 0 1.5px var(--lm) inset}

/* filter tabs */
.ftabs{display:flex;gap:5px;flex-wrap:wrap}
.ftab{padding:6px 13px;border-radius:6px;border:1.5px solid var(--ru);background:var(--cr);font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;color:var(--mu);transition:all .14s}
.ftab:hover{border-color:var(--lm);color:var(--l3)}
.ftab.on{background:var(--ink);border-color:var(--ink);color:#fff}

/* view tabs */
.view-tabs{display:flex;gap:0;border-bottom:1.5px solid var(--c3);margin-bottom:20px}
.vtab{padding:10px 18px;border:none;background:transparent;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;color:var(--mu);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all .14s}
.vtab.on{color:var(--l2);border-bottom-color:var(--li)}

/* ── MAIN ── */
.main{padding:22px 28px 80px;max-width:1300px}
@media(max-width:700px){.main{padding:14px 14px 60px}.controls{padding:10px 14px}.topbar{padding:0 14px}}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
@media(max-width:900px){.kpi-strip{grid-template-columns:repeat(3,1fr)}}
@media(max-width:520px){.kpi-strip{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--wh);border:1px solid var(--c3);border-radius:9px;padding:14px 16px;display:flex;align-items:center;gap:11px;animation:cardIn .4s var(--e1)}
.kpi-ic{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.kpi-val{font-size:24px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.5px}
.kpi-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-top:2px}

/* class block — main container */
.cls-block{background:var(--wh);border:1.5px solid var(--c3);border-radius:12px;overflow:hidden;margin-bottom:16px;animation:cardIn .35s var(--e1)}
.cls-hd{padding:14px 18px;display:flex;align-items:flex-start;gap:12px;border-bottom:1px solid var(--c3);flex-wrap:wrap;background:var(--cr)}
.cls-num{font-size:32px;font-weight:900;color:var(--ink);line-height:1;flex-shrink:0}
.cls-info{flex:1;min-width:0}
.cls-name{font-size:14px;font-weight:800;color:var(--ink)}
.cls-meta{font-size:11px;color:var(--mu);margin-top:2px}
.cls-pills{display:flex;gap:6px;align-items:center;flex-wrap:wrap;flex:1;min-width:0}
.stat-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.sp-g{background:rgba(34,197,94,.1);color:#16a34a;border:1px solid rgba(34,197,94,.2)}
.sp-r{background:var(--rb);color:var(--re);border:1px solid var(--rm)}
.sp-b{background:var(--bb);color:var(--bl);border:1px solid var(--bm)}
.sp-a{background:var(--ab);color:var(--am);border:1px solid rgba(217,119,6,.2)}
.cls-btns{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:auto}
.btn-cls{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:6px;font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-cls-pdf{background:var(--li);color:var(--ink);box-shadow:0 2px 8px rgba(139,197,63,.25)}
.btn-cls-pdf:hover{background:var(--l2)}
.btn-cls-wa{background:rgba(37,211,102,.1);color:#128c3e;border:1.5px solid rgba(37,211,102,.25)!important}
.btn-cls-wa:hover{background:rgba(37,211,102,.2)}
.btn-cls svg{width:12px;height:12px;flex-shrink:0}

.cls-body{padding:0}

/* session panel inside class block */
.sess-panel{border-bottom:1px solid var(--c3)}
.sess-panel:first-child{border-top:none}
.sess-panel:last-child{border-bottom:none}
.sess-hd{padding:11px 18px;display:flex;align-items:center;gap:10px;background:var(--wh);border-bottom:1px solid var(--c2)}
.sess-teacher{font-size:13px;font-weight:800;color:var(--ink)}
.sess-time{font-size:11px;color:var(--mu);margin-top:1px}
.sess-badges{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.badge{display:inline-flex;padding:3px 8px;border-radius:9px;font-size:10px;font-weight:700}
.badge-g{background:var(--lb);color:var(--l3)}
.badge-b{background:var(--bb);color:var(--bl)}
.badge-a{background:var(--ab);color:var(--am)}
.badge-p{background:var(--pb);color:var(--pu)}
.badge-n{background:var(--c2);color:var(--mu)}
.sess-body{padding:12px 18px}
.srow{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--c2)}
.srow:last-child{border-bottom:none}
.sk{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);min-width:86px;flex-shrink:0;padding-top:2px}
.sv{font-size:13px;color:var(--ink);line-height:1.5;flex:1}
.sv.dim{color:var(--mu)}
.ch-chip{display:inline-block;background:var(--lb);color:var(--l3);border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600;margin:2px 2px 2px 0}
.hw-flag{display:inline-flex;align-items:center;gap:4px;background:rgba(217,119,6,.1);color:var(--am);border:1px solid rgba(217,119,6,.2);border-radius:5px;padding:3px 8px;font-size:11px;font-weight:700;margin-top:4px}

/* attendance grid inside class block */
.att-panel{padding:14px 18px;border-top:2px solid var(--c3);background:var(--cr)}
.att-panel-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.att-panel-title::after{content:'';flex:1;height:1px;background:var(--c3)}
.att-board-lbl{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin:8px 0 6px}
.att-board-st{background:var(--lb);color:var(--l3);border:1px solid rgba(139,197,63,.25)}
.att-board-cb{background:var(--bb);color:var(--bl);border:1px solid var(--bm)}
.stu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px;margin-bottom:10px}
.sc{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1.5px solid var(--c3);background:var(--wh);position:relative;overflow:hidden;animation:cardIn .3s var(--e1) both}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:rgba(34,197,94,.5);border-radius:3px 0 0 3px}
.sc.ab{border-color:var(--rm);background:var(--rb)}
.sc.ab::before{background:var(--re)}
.sc-photo{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1.5px solid var(--ru)}
.sc-mono{width:40px;height:40px;border-radius:8px;background:var(--ink2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--li);flex-shrink:0}
.sc.ab .sc-mono{background:var(--re);color:#fff}
.sc-name{font-size:12px;font-weight:600;color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc.ab .sc-name{color:var(--re)}
.sc-badge{flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:10px}
.sc-badge.p{background:rgba(34,197,94,.1);color:#16a34a}
.sc-badge.a{background:var(--rb);color:var(--re);border:1px solid rgba(220,38,38,.2)}
.att-no-data{font-size:12px;color:var(--pa);font-style:italic;padding:8px 0}

/* progress/chapters/teachers views */
.sec-title{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--c3)}
.cprog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.cprog-card{background:var(--wh);border:1.5px solid var(--c3);border-radius:10px;padding:16px;animation:cardIn .35s var(--e1)}
.cprog-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.cprog-num{font-size:28px;font-weight:900;color:var(--ink);line-height:1}
.cprog-info{flex:1}
.cprog-name{font-size:13px;font-weight:700}
.cprog-meta{font-size:11px;color:var(--mu);margin-top:1px}
.cprog-hrs{font-size:22px;font-weight:900;color:var(--l2);line-height:1}
.cprog-hrslbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu)}
.subj-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.subj-row:last-child{margin-bottom:0}
.subj-name{font-size:12px;font-weight:600;min-width:110px;flex-shrink:0}
.subj-bar-bg{flex:1;background:var(--c3);border-radius:3px;height:6px;overflow:hidden}
.subj-bar{height:100%;border-radius:3px;background:var(--li);transition:width .5s var(--e1)}
.subj-stat{font-size:11px;font-weight:700;color:var(--mu);min-width:48px;text-align:right;flex-shrink:0}
.cprog-subjects{border-top:1px solid var(--c3);padding-top:12px;margin-top:4px}

.chap-wrap{background:var(--wh);border:1.5px solid var(--c3);border-radius:10px;overflow:hidden;overflow-x:auto}
.chap-table{width:100%;border-collapse:collapse}
.chap-table th{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);padding:8px 12px;background:var(--cr);border-bottom:1.5px solid var(--c3);text-align:left}
.chap-table td{padding:8px 12px;border-bottom:1px solid var(--c2);font-size:13px;color:var(--ink2);vertical-align:middle}
.chap-table tr:last-child td{border-bottom:none}
.chap-table tr:hover td{background:var(--cr)}
.cov-bar{width:70px;background:var(--c3);border-radius:3px;height:5px;display:inline-block;overflow:hidden;vertical-align:middle}
.cov-fill{height:100%;border-radius:3px;background:var(--li);display:block}

.tsum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.tsum-card{background:var(--wh);border:1.5px solid var(--c3);border-radius:10px;padding:14px 16px;animation:cardIn .35s var(--e1)}
.tsum-name{font-size:14px;font-weight:800;margin-bottom:2px}
.tsum-role{font-size:11px;color:var(--mu);margin-bottom:10px}
.tsum-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;border-top:1px solid var(--c3);padding-top:10px}
.tstat-v{font-size:18px;font-weight:800;color:var(--l2);line-height:1}
.tstat-l{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-top:2px}

/* empty / loading */
.empty{text-align:center;padding:48px 20px;color:var(--mu)}
.empty-ico{font-size:36px;opacity:.25;margin-bottom:10px}
.empty-txt{font-size:15px;font-weight:700;color:var(--pa)}
.empty-sub{font-size:12px;margin-top:4px}
.loading-wrap{display:flex;align-items:center;gap:10px;padding:32px;color:var(--mu);font-size:13px;font-weight:600}
.lspin{width:18px;height:18px;border:2px solid var(--c3);border-top-color:var(--li);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.hidden{display:none!important}

/* ── PRINT ── */
#printDoc{display:none;position:absolute;left:-9999px;top:0}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:0;size:A4 portrait}
  html,body{background:#fff!important;margin:0!important;padding:0!important;height:auto!important}
  body>*{display:none!important}
  #printDoc{display:block!important;position:static!important;left:auto!important;top:auto!important;width:100%!important;font-family:'Open Sans',Arial,sans-serif!important}
}


/* ══ PRINT DOC — Invoice Style ══ */
.pr-doc{font-family:'Open Sans',Arial,sans-serif;color:#1a1a18;background:#fff;font-size:12px;line-height:1.5}
/* Top accent bar */
.pr-top-bar{height:6px;background:#8BC53F;width:100%}
/* Header */
.pr-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 36px 18px;border-bottom:1px solid #d8d4cb}
.pr-logo{font-size:22px;font-weight:900;letter-spacing:-.4px;color:#1a1a18;line-height:1}
.pr-logo span{color:#8BC53F}
.pr-logo-sub{font-size:10px;color:#7a7970;margin-top:4px;font-weight:400}
.pr-hdr-r{text-align:right}
.pr-hdr-doc{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#1a1a18}
.pr-hdr-date{font-size:10px;color:#7a7970;margin-top:3px}
/* Date hero band */
.pr-date-band{background:#1a1a18;padding:16px 36px;display:flex;align-items:center;justify-content:space-between}
.pr-date-big{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1}
.pr-date-big span{color:#8BC53F}
.pr-date-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
.pr-date-right{text-align:right}
.pr-date-tag{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px}
.pr-stat-row{display:flex;gap:16px;justify-content:flex-end}
.pr-stat{text-align:center}
.pr-stat-v{font-size:16px;font-weight:900;color:#8BC53F;line-height:1}
.pr-stat-l{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:2px}
/* Section rule */
.pr-sec-rule{display:flex;align-items:center;gap:8px;padding:14px 36px 8px}
.pr-sec-rule-line{width:16px;height:2px;background:#8BC53F;flex-shrink:0}
.pr-sec-rule-txt{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#72a530}
/* Class header */
.pr-cls-hdr{display:flex;align-items:center;gap:12px;padding:12px 36px;background:#f5f2eb;border-top:1px solid #d8d4cb;border-bottom:1px solid #d8d4cb}
.pr-cls-badge{width:40px;height:40px;border-radius:8px;background:#1a1a18;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#8BC53F;flex-shrink:0;line-height:1}
.pr-cls-title{font-size:14px;font-weight:800;color:#1a1a18}
.pr-cls-meta{font-size:10px;color:#7a7970;margin-top:1px}
.pr-cls-pills{margin-left:auto;display:flex;gap:6px}
.pr-cls-pill{font-size:9px;font-weight:800;padding:3px 9px;border-radius:10px}
.pr-cls-pill-g{background:rgba(34,197,94,.1);color:#16a34a}
.pr-cls-pill-r{background:#fef2f2;color:#dc2626}
/* Session block */
.pr-sessions{padding:0 36px}

.pr-badges{display:flex;gap:4px;flex-wrap:wrap}
.pr-badge{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700}
.pr-badge-b{background:#eff6ff;color:#2563eb}
.pr-badge-a{background:#fffbeb;color:#d97706}
.pr-badge-g{background:#f0f7e3;color:#5e8a24}

/* Session detail rows */

.pr-det-row{display:contents}
.pr-det-k{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#b0ada4;padding:5px 10px;background:#f5f2eb;border-bottom:1px solid #e4dfd4;border-right:1px solid #e4dfd4}
.pr-det-v{font-size:10px;color:#1a1a18;padding:5px 10px;border-bottom:1px solid #e4dfd4;line-height:1.4}
.pr-det-row:last-child .pr-det-k,.pr-det-row:last-child .pr-det-v{border-bottom:none}
.pr-chapter-chip{display:inline-block;background:#f0f7e3;color:#5e8a24;border:1px solid rgba(139,197,63,.25);border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700;margin:1px 2px 1px 0}
.pr-hw-flag{display:inline-block;background:#fffbeb;color:#d97706;border:1px solid rgba(217,119,6,.2);border-radius:3px;padding:1px 6px;font-size:8px;font-weight:700;margin-top:3px}
/* Attendance section */
.pr-att-wrap{padding:0 36px 16px}
.pr-att-board-row{display:flex;align-items:center;gap:8px;margin:10px 0 5px}
.pr-att-board-lbl{font-size:8px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:3px}

/* Attendance table */
.pr-att-tbl{width:100%;border-collapse:collapse;border:1px solid #e4dfd4;border-radius:5px;overflow:hidden;table-layout:fixed}
.pr-att-tbl th{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#b0ada4;padding:5px 10px;background:#f5f2eb;border-bottom:1px solid #d8d4cb;text-align:left}
.pr-att-tbl td{padding:4px 10px;border-bottom:1px solid #ede9e0;font-size:10px;vertical-align:middle;line-height:1.2}
.pr-att-tbl tr:last-child td{border-bottom:none}
.pr-att-tbl-p{background:#fff}

.pr-att-tbl th:nth-child(1),.pr-att-tbl td:nth-child(1){width:34px}
.pr-att-tbl th:nth-child(3),.pr-att-tbl td:nth-child(3){width:65px;text-align:right}
.pr-av{width:26px;height:26px;border-radius:5px;background:#1a1a18;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#8BC53F;position:relative;overflow:hidden;vertical-align:middle;flex-shrink:0}
.pr-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.pr-att-badge{display:inline-flex;padding:1px 6px;border-radius:8px;font-size:8px;font-weight:700}
.pr-att-badge-p{background:rgba(34,197,94,.1);color:#16a34a}
.pr-att-badge-a{background:#fef2f2;color:#dc2626;border:1px solid rgba(220,38,38,.18)}
/* Separator between topics and attendance */
.pr-section-divider{margin:4px 36px 0;height:1px;background:linear-gradient(90deg,#8BC53F,#c8e48e,transparent)}
/* Footer */
.pr-footer-band{border-top:1px solid #d8d4cb;padding:10px 36px;display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.pr-footer-brand{font-size:12px;font-weight:900;color:#1a1a18}

/* Spacer */
.pr-spacer{height:16px}
</style>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-inner">
    <div>
      <div class="tb-kicker"><div class="tb-kr"></div><span class="tb-kt">SEHR Academy · Admin</span></div>
      <div class="tb-h">Academic <i>Dashboard</i></div>
      <div class="tb-sub" id="tbSub">Loading…</div>
    </div>
    <div class="tb-r">
      <button class="btn-tb pdf" onclick="doPrintAll()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print All
      </button>
      <button class="btn-tb wa" onclick="sendWAAll()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="13" height="13"><path d="M20.52 3.449C18.24 1.245 15.24 0 12.045 0 5.463 0 .104 5.334.101 11.893c0 2.096.549 4.14 1.595 5.945L0 24l6.335-1.652c1.746.943 3.71 1.444 5.71 1.447h.006c6.585 0 11.946-5.336 11.949-11.896 0-3.176-1.24-6.165-3.48-8.45z"/></svg>
        WhatsApp
      </button>
    </div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="dp-wrap" id="dpWrap">
    <div class="dp-disp" id="dpDisp" onclick="toggleDP()">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" width="13" height="13"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="dpTxt">Select date</span>
      <span class="dp-arrow">▾</span>
    </div>
    <div class="dp-drop" id="dpDrop">
      <div class="dp-hd">
        <button class="dp-nav" onclick="dpPrev()">‹</button>
        <span class="dp-ml" id="dpML"></span>
        <button class="dp-nav" onclick="dpNext()">›</button>
      </div>
      <div class="dp-cal" id="dpCal"></div>
    </div>
  </div>
  <div class="ctrl-sep"></div>
  <span class="ctrl-lbl">Class</span>
  <div class="ftabs" id="clsTabs">
    <button class="ftab on" onclick="setFilt('cls','ALL',this)">All</button>
  </div>
  <div class="ctrl-sep"></div>
  <div class="ftabs" id="periodTabs">
    <button class="ftab on" id="ptDay"   onclick="setPeriod('day',this)">Day</button>
    <button class="ftab"    id="ptWeek"  onclick="setPeriod('week',this)">Week</button>
    <button class="ftab"    id="ptMonth" onclick="setPeriod('month',this)">Month</button>
    <button class="ftab"    id="ptAll"   onclick="setPeriod('all',this)">All Time</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="loading-wrap" id="loadEl"><div class="lspin"></div><span id="loadTxt">Connecting…</span></div>

  <div class="kpi-strip hidden" id="kpiStrip"></div>

  <div class="view-tabs hidden" id="viewTabs">
    <button class="vtab on" onclick="setView('day',this)">📅 Day View</button>
    <button class="vtab"    onclick="setView('progress',this)">📊 Progress</button>
    <button class="vtab"    onclick="setView('chapters',this)">📖 Chapters</button>
    <button class="vtab"    onclick="setView('teachers',this)">👨‍🏫 Teachers</button>
  </div>

  <div id="vDay"></div>
  <div id="vProgress" class="hidden"></div>
  <div id="vChapters" class="hidden"></div>
  <div id="vTeachers" class="hidden"></div>
</div>

<div id="printDoc"></div>

<script>
var SESSION_API = 'https://script.google.com/macros/s/AKfycbx-qC_S-wZnjvBW9LZGTU4Y36ZHMTVlgS__DIAl1ZZ404beOfAyJwwtGsv352UbiyOR/exec';
var ATT_API     = 'https://script.google.com/macros/s/AKfycbxpxedvIrF7AiWQ1cIx-jWfxGkv0r1-Yl2rJtkaSdTdQtfEll9M0Sf6qQrqvB9x0I1_/exec';
var SESS_PASS   = 'sehr2026';
var WA_NUM      = '919539409586';
var MONTHS      = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_S    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DAYS_S      = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DAYS_L      = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

/* STATE */
var SESSIONS    = [];  // session log records
var PHOTO_MAP   = {};  // student_id → photo url
var ATT_PCT     = {};  // student_id → {pct, sessions, present}
var ATTENDANCE  = [];  // attendance records
var AVAIL       = [];  // dates with session data
var ATT_DATES   = [];  // dates with attendance data
var ALL_CLS     = [];
var CUR_DATE    = '';
var CUR_CLS     = 'ALL';
var CUR_PERIOD  = 'day';
var CUR_VIEW    = 'day';
var CAL_Y, CAL_M;
var NOW = new Date();

/* UTILS */
function g(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mn(n){return (n||'?').trim().split(/\s+/).map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}
function fmtLong(d){if(!d)return '';var p=d.split('-');var dt=new Date(+p[0],+p[1]-1,+p[2]);return DAYS_L[dt.getDay()]+', '+parseInt(p[2])+' '+MONTHS[+p[1]-1]+' '+p[0];}
function fmtShort(d){if(!d)return '';var p=d.split('-');return parseInt(p[2])+' '+MONTHS_S[+p[1]-1]+' '+p[0];}
function todayYMD(){return NOW.getFullYear()+'-'+pad(NOW.getMonth()+1)+'-'+pad(NOW.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function toMins(t){if(!t)return 0;var p=t.split(':');return +p[0]*60+(+p[1]||0);}
function hrsFmt(m){var h=Math.floor(m/60),mn=m%60;return h?h+'h'+(mn?mn+'m':''):mn+'m';}
// attendance date is stored as DD/MM/YYYY
function pctPill(studentId){
  var a=ATT_PCT[studentId];
  if(!a||!a.sessions) return '';
  var pct=a.pct;
  var col=pct>=75?'#16a34a':pct>=50?'#d97706':'#dc2626';
  var bg =pct>=75?'rgba(34,197,94,.1)':pct>=50?'rgba(217,119,6,.1)':'rgba(220,38,38,.08)';
  var bdr=pct>=75?'rgba(34,197,94,.2)':pct>=50?'rgba(217,119,6,.22)':'rgba(220,38,38,.2)';
  return '<span style="flex-shrink:0;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;background:'+bg+';color:'+col+';border:1px solid '+bdr+'">'+pct+'%</span>';
}
function attDateToYMD(d){if(!d)return '';if(d.indexOf('/')>-1){var p=d.split('/');return p[2]+'-'+p[1]+'-'+p[0];}return d;}
// session date is also DD/MM/YYYY
function sessDateToYMD(d){return attDateToYMD(d);}

/* API */
function apiFetch(url, cb){
  fetch(url).then(function(r){return r.text();}).then(function(t){
    try{cb(JSON.parse(t),null);}catch(e){cb(null,'Parse: '+t.slice(0,80));}
  }).catch(function(e){cb(null,e.message);});
}
function apiSess(p, cb){
  var url=SESSION_API+'?'+Object.keys(p).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(p[k]);}).join('&');
  apiFetch(url,cb);
}
function apiAtt(payload, cb){
  var url=ATT_API+'?data='+encodeURIComponent(JSON.stringify(payload));
  apiFetch(url,cb);
}

/* INIT — load both APIs in parallel */
function init(){
  g('loadEl').style.display='flex';
  g('loadTxt').textContent='Loading sessions…';
  var sessLoaded=false, attLoaded=false;

  apiSess({action:'getAllLogs',appkey:SESS_PASS},function(data,err){
    if(!err && data && data.success) SESSIONS=data.logs||[];
    sessLoaded=true;
    if(attLoaded) finishInit();
  });

  apiAtt({action:'getAttendance'},function(data,err){
    if(!err && data && data.success) ATTENDANCE=data.records||[];
    attLoaded=true;
    if(sessLoaded) finishInit();
  });

  // Fallback if one fails — proceed after 6s
  setTimeout(function(){
    if(!sessLoaded||!attLoaded){g('loadEl').style.display='none';finishInit();}
  },6000);
}

function finishInit(){
  g('loadEl').style.display='none';

  // Build photo map from all attendance records
  ATTENDANCE.forEach(function(r){
    if(r.photo && r.photo.startsWith('http')) PHOTO_MAP[r.student_id] = r.photo;
  });

  // Build overall attendance % per student (all-time)
  ATT_PCT = {};
  ATTENDANCE.forEach(function(r){
    if(!ATT_PCT[r.student_id]) ATT_PCT[r.student_id]={sessions:0,present:0};
    ATT_PCT[r.student_id].sessions++;
    if(r.status==='Present') ATT_PCT[r.student_id].present++;
  });
  Object.keys(ATT_PCT).forEach(function(id){
    var a=ATT_PCT[id];
    a.pct=a.sessions?Math.round(a.present/a.sessions*100):0;
  });

  // Build available session dates
  var dset={};
  SESSIONS.forEach(function(r){var d=sessDateToYMD(r.date);if(d)dset[d]=true;});
  AVAIL=Object.keys(dset).sort().reverse();

  // Attendance dates
  var aset={};
  ATTENDANCE.forEach(function(r){var d=attDateToYMD(r.date);if(d)aset[d]=true;});
  ATT_DATES=Object.keys(aset);

  // Classes from sessions
  var cset={};
  SESSIONS.forEach(function(r){if(r.class)cset[r.class]=true;});
  ALL_CLS=Object.keys(cset).sort();
  buildClsTabs();

  var td=todayYMD();
  CUR_DATE=AVAIL.indexOf(td)>-1?td:(AVAIL[0]||td);
  var p=CUR_DATE.split('-');
  CAL_Y=+p[0];CAL_M=+p[1]-1;
  updateDPDisp();renderDP();

  g('tbSub').textContent=SESSIONS.length+' sessions · '+ATTENDANCE.length+' attendance records';
  g('kpiStrip').classList.remove('hidden');
  g('viewTabs').classList.remove('hidden');
  renderAll();
}

/* FILTERS */
function buildClsTabs(){
  var tabs=g('clsTabs');
  tabs.innerHTML='<button class="ftab on" onclick="setFilt(\'cls\',\'ALL\',this)">All</button>';
  ALL_CLS.forEach(function(c){
    var b=document.createElement('button');
    b.className='ftab';b.textContent='Class '+c;
    b.onclick=function(){setFilt('cls',c,b);};
    tabs.appendChild(b);
  });
}
function setFilt(t,v,btn){
  if(t==='cls')CUR_CLS=v;
  g('clsTabs').querySelectorAll('.ftab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderAll();
}
function setPeriod(p,btn){
  CUR_PERIOD=p;
  g('periodTabs').querySelectorAll('.ftab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  renderAll();
}
function setView(v,btn){
  CUR_VIEW=v;
  document.querySelectorAll('.vtab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  ['vDay','vProgress','vChapters','vTeachers'].forEach(function(id){g(id).classList.add('hidden');});
  var vId='v'+v.charAt(0).toUpperCase()+v.slice(1);
  g(vId).classList.remove('hidden');
}

/* FILTERED SESSIONS */
function getSessions(){
  return SESSIONS.filter(function(r){
    if(CUR_CLS!=='ALL'&&r.class!==CUR_CLS)return false;
    var d=sessDateToYMD(r.date);
    if(CUR_PERIOD==='day')  return d===CUR_DATE;
    if(CUR_PERIOD==='week'){var cd=new Date(CUR_DATE),from=new Date(cd);from.setDate(cd.getDate()-6);var rd=new Date(d);return rd>=from&&rd<=cd;}
    if(CUR_PERIOD==='month'){var p=CUR_DATE.split('-');return d.startsWith(p[0]+'-'+p[1]);}
    return true;
  });
}

/* GET ATTENDANCE FOR A DATE+CLASS */
function getAtt(cls){
  return ATTENDANCE.filter(function(r){
    return attDateToYMD(r.date)===CUR_DATE && r.class===cls;
  });
}

/* RENDER ALL */
function renderAll(){
  var data=getSessions();
  renderKPI(data);
  if(CUR_VIEW==='day')          renderDay(data);
  else if(CUR_VIEW==='progress')renderProgress(data);
  else if(CUR_VIEW==='chapters')renderChapters(data);
  else if(CUR_VIEW==='teachers')renderTeachers(data);
  buildPrintDoc(data,'ALL');
}

/* KPI */
function renderKPI(data){
  var mins=data.reduce(function(a,r){return a+(+r.duration_mins||0);},0);
  var chapSet={};data.forEach(function(r){(r.chapters||'').split(' | ').filter(Boolean).forEach(function(c){chapSet[c]=true;});});
  var hw=data.filter(function(r){return r.homework&&r.homework.trim();}).length;
  var teachers=new Set(data.map(function(r){return r.teacher_id;})).size;
  g('kpiStrip').innerHTML=
    kpi('📚',data.length,'Sessions','rgba(139,197,63,.1)')+
    kpi('⏱',hrsFmt(mins),'Teaching Time','rgba(37,99,235,.08)')+
    kpi('📖',Object.keys(chapSet).length,'Chapters','rgba(124,58,237,.08)')+
    kpi('👨‍🏫',teachers,'Teachers','rgba(217,119,6,.08)')+
    kpi('📝',hw,'With Homework','rgba(220,38,38,.07)');
}
function kpi(ic,v,l,bg){
  return '<div class="kpi"><div class="kpi-ic" style="background:'+bg+'">'+ic+'</div>'+
    '<div><div class="kpi-val">'+esc(String(v))+'</div><div class="kpi-lbl">'+l+'</div></div></div>';
}

/* ── DAY VIEW ── */
function renderDay(data){
  var el=g('vDay');
  var dayData=SESSIONS.filter(function(r){
    return sessDateToYMD(r.date)===CUR_DATE&&(CUR_CLS==='ALL'||r.class===CUR_CLS);
  });

  if(!dayData.length){
    el.innerHTML='<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">No sessions on '+fmtShort(CUR_DATE)+'</div><div class="empty-sub">No sessions logged for this date.</div></div>';
    return;
  }

  // Group by class
  var byClass={};
  dayData.forEach(function(r){
    var key=r.class+(r.stream?'|'+r.stream:'');
    if(!byClass[key])byClass[key]={class:r.class,stream:r.stream||'',label:'Class '+r.class+(r.stream?' · '+r.stream:''),sessions:[]};
    byClass[key].sessions.push(r);
  });

  var html='';
  Object.keys(byClass).sort().forEach(function(key){
    var cls=byClass[key];
    var sessions=cls.sessions;
    var totalMins=sessions.reduce(function(a,r){return a+(+r.duration_mins||0);},0);
    var chapSet={};sessions.forEach(function(r){(r.chapters||'').split(' | ').filter(Boolean).forEach(function(c){chapSet[c]=true;});});
    var hwCount=sessions.filter(function(r){return r.homework&&r.homework.trim();}).length;

    // Attendance for this class on this date
    var attRows=getAtt(cls.class);
    var attPresent=attRows.filter(function(r){return r.status==='Present';}).length;
    var attAbsent=attRows.length-attPresent;
    var attPct=attRows.length?Math.round(attPresent/attRows.length*100):0;
    var clsBoards=[...new Set(sessions.map(function(r){return r.board;}))].join(' · ');

    html+='<div class="cls-block" id="cb-'+key.replace(/[^a-z0-9]/gi,'_')+'">';
    // Header with per-class PDF + WA buttons
    html+='<div class="cls-hd">'+
      '<div class="cls-num">'+esc(cls.class)+'</div>'+
      '<div class="cls-info">'+
        '<div class="cls-name">'+esc(cls.label)+'</div>'+
        '<div class="cls-meta">'+sessions.length+' session'+(sessions.length>1?'s':'')+' · '+hrsFmt(totalMins)+' · '+Object.keys(chapSet).length+' chapters</div>'+
      '</div>'+
      '<div class="cls-pills">'+
        '<span class="stat-pill sp-b">'+hrsFmt(totalMins)+'</span>'+
        (attRows.length?'<span class="stat-pill sp-g">'+attPresent+' Present</span><span class="stat-pill sp-r">'+attAbsent+' Absent</span>'+
        '<span class="stat-pill sp-b">'+attPct+'%</span>':'')+
        (hwCount?'<span class="stat-pill sp-a">📝 HW</span>':'')+
      '</div>'+
      '<div class="cls-btns">'+
        '<button class="btn-cls btn-cls-pdf" onclick="printClass(\''+esc(cls.class)+'\',\''+esc(cls.stream)+'\')">'+
          '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>'+

/* ── PROGRESS VIEW ── */
function renderProgress(data){
  var el=g('vProgress');
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-ico">📊</div><div class="empty-txt">No data</div></div>';return;}
  var byClass={};
  data.forEach(function(r){
    var key=r.class+(r.stream?'|'+r.stream:'');
    if(!byClass[key])byClass[key]={class:r.class,stream:r.stream||'',sessions:0,mins:0,subjects:{}};
    var c=byClass[key];c.sessions++;c.mins+=(+r.duration_mins||0);
    if(!c.subjects[r.subject])c.subjects[r.subject]={sessions:0,mins:0,chapters:new Set()};
    c.subjects[r.subject].sessions++;c.subjects[r.subject].mins+=(+r.duration_mins||0);
    (r.chapters||'').split(' | ').filter(Boolean).forEach(function(ch){c.subjects[r.subject].chapters.add(ch);});
  });
  var html='<div class="sec-title">Class Progress</div><div class="cprog-grid">';
  Object.keys(byClass).sort().forEach(function(key){
    var c=byClass[key];
    var maxM=Math.max.apply(null,Object.values(c.subjects).map(function(s){return s.mins;}));
    html+='<div class="cprog-card">'+
      '<div class="cprog-head"><div class="cprog-num">'+esc(c.class)+'</div>'+
      '<div class="cprog-info"><div class="cprog-name">Class '+esc(c.class)+(c.stream?' · '+esc(c.stream):'')+'</div><div class="cprog-meta">'+c.sessions+' sessions</div></div>'+
      '<div style="text-align:right"><div class="cprog-hrs">'+hrsFmt(c.mins)+'</div><div class="cprog-hrslbl">Total</div></div></div>'+
      '<div class="cprog-subjects">'+
      Object.keys(c.subjects).sort().map(function(subj){
        var s=c.subjects[subj];var pct=maxM>0?Math.round(s.mins/maxM*100):0;
        return '<div class="subj-row"><div class="subj-name">'+esc(subj)+'</div>'+
          '<div class="subj-bar-bg"><div class="subj-bar" style="width:'+pct+'%"></div></div>'+
          '<div class="subj-stat">'+hrsFmt(s.mins)+'<br><small>'+s.chapters.size+' ch</small></div></div>';
      }).join('')+
      '</div></div>';
  });
  el.innerHTML=html+'</div>';
}

/* ── CHAPTERS VIEW ── */
function renderChapters(data){
  var el=g('vChapters');
  if(!data.length){el.innerHTML='<div class="empty"><div class="empty-ico">📖</div><div class="empty-txt">No data</div></div>';return;}
  var map={};
  data.forEach(function(r){
    (r.chapters||'').split(' | ').filter(Boolean).forEach(function(ch){
      var k=r.class+'||'+r.subject+'||'+ch;
      if(!map[k])map[k]={class:r.class,stream:r.stream||'',subject:r.subject,chapter:ch,count:0,mins:0};
      map[k].count++;map[k].mins+=(+r.duration_mins||0);
    });
  });
  var rows=Object.values(map).sort(function(a,b){return +a.class-+b.class||a.subject.localeCompare(b.subject)||b.count-a.count;});
  var maxC=Math.max.apply(null,rows.map(function(r){return r.count;}));
  el.innerHTML='<div class="sec-title">Chapter Coverage</div>'+
    '<div class="chap-wrap"><table class="chap-table">'+
    '<thead><tr><th>Class</th><th>Subject</th><th>Chapter</th><th>Sessions</th><th>Time</th><th>Frequency</th></tr></thead><tbody>'+
    rows.map(function(r){
      var pct=maxC>0?Math.round(r.count/maxC*100):0;
      return '<tr><td><span class="badge badge-g">'+esc(r.class)+(r.stream?' '+esc(r.stream):'')+'</span></td>'+
        '<td style="font-weight:600">'+esc(r.subject)+'</td><td>'+esc(r.chapter)+'</td>'+
        '<td style="font-weight:700;color:var(--l2)">'+r.count+'</td><td>'+hrsFmt(r.mins)+'</td>'+
        '<td><span class="cov-bar"><span class="cov-fill" style="width:'+pct+'%"></span></span></td></tr>';
    }).join('')+
    '</tbody></table></div>';
}

/* ══ PRINT / PDF ══ */
function buildPrintDoc(sessions, filterCls, filterStream){
  var dayData = sessions.filter(function(r){
    var d=sessDateToYMD(r.date);
    if(d!==CUR_DATE)return false;
    if(filterCls!=='ALL'&&r.class!==filterCls)return false;
    if(filterStream&&filterStream!==''&&r.stream!==filterStream)return false;
    return true;
  });

  var issued=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  var totalMins=dayData.reduce(function(a,r){return a+(+r.duration_mins||0);},0);
  var chapSet={};dayData.forEach(function(r){(r.chapters||'').split(' | ').filter(Boolean).forEach(function(c){chapSet[c]=true;});});
  var hwCount=dayData.filter(function(r){return r.homework&&r.homework.trim();}).length;
  var attScope=ATTENDANCE.filter(function(r){
    if(attDateToYMD(r.date)!==CUR_DATE)return false;
    if(filterCls!=='ALL'&&r.class!==filterCls)return false;
    return true;
  });
  var attP=attScope.filter(function(r){return r.status==='Present';}).length;
  var teachers=[...new Set(dayData.map(function(r){return r.teacher_name;}))].join(', ');
  var clsLabel=filterCls==='ALL'?'All Classes':('Class '+filterCls+(filterStream?' · '+filterStream:''));
  var byClass={};
  dayData.forEach(function(r){
    var key=r.class+(r.stream?'|'+r.stream:'');
    if(!byClass[key])byClass[key]={class:r.class,stream:r.stream||'',sessions:[]};
    byClass[key].sessions.push(r);
  });

  // ── Premium invoice-style HTML ──
  var html='<div class="pr-doc">';

  // Top bar
  html+='<div class="pr-top-bar"></div>';

  // Header
  html+='<div class="pr-hdr">'+
    '<div>'+
      '<div class="pr-logo"><span>SEHR</span> ACADEMY</div>'+
      '<div class="pr-logo-sub">Vadanappally, Thrissur, Kerala &nbsp;·&nbsp; sehracademy.com</div>'+
    '</div>'+
    '<div class="pr-hdr-r">'+
      '<div class="pr-hdr-doc">Daily Academic Report</div>'+
      '<div class="pr-hdr-date">'+esc(clsLabel)+' &nbsp;·&nbsp; Generated '+issued+'</div>'+
    '</div>'+
  '</div>';

  // Date hero band with stats

    '<div>'+
      '<div class="pr-date-big"><span>'+fmtLong(CUR_DATE).split(',')[0]+'</span> '+fmtLong(CUR_DATE).split(', ').slice(1).join(', ')+'</div>'+
      '<div class="pr-date-sub">'+esc(clsLabel)+(teachers?' &nbsp;·&nbsp; '+esc(teachers):'')+'</div>'+
    '</div>'+
    '<div class="pr-date-right">'+
      '<div class="pr-date-tag">Today&#39;s Summary</div>'+
      '<div class="pr-stat-row">'+
        '<div class="pr-stat"><div class="pr-stat-v">'+dayData.length+'</div><div class="pr-stat-l">Sessions</div></div>'+
        '<div class="pr-stat"><div class="pr-stat-v">'+hrsFmt(totalMins)+'</div><div class="pr-stat-l">Taught</div></div>'+
        '<div class="pr-stat"><div class="pr-stat-v">'+Object.keys(chapSet).length+'</div><div class="pr-stat-l">Chapters</div></div>'+
        (attScope.length?'<div class="pr-stat"><div class="pr-stat-v">'+Math.round(attP/attScope.length*100)+'%</div><div class="pr-stat-l">Attendance</div></div>':'')+
      '</div>'+
    '</div>'+
  '</div>';

  if(!Object.keys(byClass).length){
    html+='<div style="padding:40px 36px;text-align:center;color:#7a7970;font-size:13px">No sessions logged for '+esc(clsLabel)+' on this date.</div>';
  }

  // ── SECTION 1: WHAT WAS TAUGHT ──
  html+='<div class="pr-sec-rule"><div class="pr-sec-rule-line"></div><div class="pr-sec-rule-txt">📚 What Was Taught</div></div>';

    var clsBrds=[...new Set(sessions.map(function(r){return r.board;}))].join(' · ');
    var attRows=ATTENDANCE.filter(function(r){return attDateToYMD(r.date)===CUR_DATE&&r.class===cls.class;});
    var ap=attRows.filter(function(r){return r.status==='Present';}).length;
    var aa=attRows.length-ap;

    // Class header
    html+='<div class="pr-cls-hdr">'+
      '<div class="pr-cls-badge">'+esc(cls.class)+'</div>'+
      '<div>'+
        '<div class="pr-cls-title">Class '+esc(cls.class)+(cls.stream?' &nbsp;·&nbsp; '+esc(cls.stream):'')+'</div>'+
        '<div class="pr-cls-meta">'+sessions.length+' session'+(sessions.length>1?'s':'')+' &nbsp;·&nbsp; '+hrsFmt(clsMins)+(clsBrds?' &nbsp;·&nbsp; '+esc(clsBrds):'')+'</div>'+
      '</div>'+
      '<div class="pr-cls-pills">'+

    '</div>';

    // Sessions

          (r.remarks&&r.remarks.trim()?prdet('Remarks',esc(r.remarks)):'')+
        '</div>'+
      '</div>';
    });
    html+='</div>';
  });

  // ── SECTION 2: ATTENDANCE ──
  html+='<div class="pr-section-divider"></div>';
  html+='<div class="pr-sec-rule" style="margin-top:14px"><div class="pr-sec-rule-line"></div><div class="pr-sec-rule-txt">👥 Attendance</div></div>';

  Object.keys(byClass).sort().forEach(function(key){
    var cls=byClass[key];
    var attRows=ATTENDANCE.filter(function(r){return attDateToYMD(r.date)===CUR_DATE&&r.class===cls.class;});
    if(!attRows.length){
      html+='<div style="padding:8px 36px;font-size:11px;color:#b0ada4;font-style:italic">No attendance data for Class '+esc(cls.class)+' on this date.</div>';

      var sp=sr.filter(function(r){return r.status==='Present';}).length;

/* WhatsApp — per class */
function sendWAClass(cls, stream){
  var dayData=SESSIONS.filter(function(r){
    return sessDateToYMD(r.date)===CUR_DATE&&r.class===cls&&(!stream||r.stream===stream);
  });
  var attRows=ATTENDANCE.filter(function(r){return attDateToYMD(r.date)===CUR_DATE&&r.class===cls;});
  var label='Class '+cls+(stream?' · '+stream:'');
  var lines=['*SEHR Academy · '+label+'*','📅 '+fmtLong(CUR_DATE),''];
  if(dayData.length){
    var totalMins=dayData.reduce(function(a,r){return a+(+r.duration_mins||0);},0);
    lines.push('*Sessions: '+dayData.length+' · '+hrsFmt(totalMins)+'*');
    dayData.forEach(function(r){
      var chaps=(r.chapters||'').split(' | ').filter(Boolean);
      lines.push('');
      lines.push('👨‍🏫 '+r.teacher_name+' · '+r.subject+' ('+r.board+')');
      lines.push('🕐 '+r.start_time+' – '+r.end_time+' · '+r.mode);
      if(chaps.length)lines.push('📖 '+chaps.join(', '));
      if(r.topics)lines.push('💡 '+r.topics.substring(0,150)+(r.topics.length>150?'…':''));
      if(r.homework&&r.homework.trim())lines.push('📝 HW: '+r.homework.substring(0,120));
    });
  }
  if(attRows.length){
    var ap=attRows.filter(function(r){return r.status==='Present';}).length;
    var aa=attRows.length-ap;
    var abList=attRows.filter(function(r){return r.status==='Absent';});
    lines.push('');lines.push('*Attendance*');
    lines.push('✅ Present: '+ap+' | ❌ Absent: '+aa+' | 📊 '+Math.round(ap/attRows.length*100)+'%');
    if(abList.length){lines.push('Absent: '+abList.map(function(r){return r.full_name;}).join(', '));}
  }
  lines.push('');lines.push('_SEHR Academy_');
  window.open('https://wa.me/'+WA_NUM+'?text='+encodeURIComponent(lines.join('\n')),'_blank');
}

/* WhatsApp — all */
function sendWAAll(){
  var dayData=SESSIONS.filter(function(r){return sessDateToYMD(r.date)===CUR_DATE;});
  var attDay=ATTENDANCE.filter(function(r){return attDateToYMD(r.date)===CUR_DATE;});
  var totalMins=dayData.reduce(function(a,r){return a+(+r.duration_mins||0);},0);
  var chapSet={};dayData.forEach(function(r){(r.chapters||'').split(' | ').filter(Boolean).forEach(function(c){chapSet[c]=true;});});
  var lines=['*SEHR Academy · Daily Report*','📅 '+fmtLong(CUR_DATE),''];
  lines.push('*Summary*');
  lines.push('📚 Sessions: '+dayData.length);
  lines.push('⏱ Teaching: '+hrsFmt(totalMins));
  lines.push('📖 Chapters: '+Object.keys(chapSet).length);
  if(attDay.length){
    var ap=attDay.filter(function(r){return r.status==='Present';}).length;
    lines.push('👥 Attendance: '+ap+'/'+attDay.length+' ('+Math.round(ap/attDay.length*100)+'%)');
  }
  var byClass={};
  dayData.forEach(function(r){var k=r.class+(r.stream?'|'+r.stream:'');if(!byClass[k])byClass[k]=[];byClass[k].push(r);});
  Object.keys(byClass).sort().forEach(function(key){
    var sessions=byClass[key];var r0=sessions[0];
    var label='Class '+r0.class+(r0.stream?' '+r0.stream:'');
    lines.push('');lines.push('*'+label+'*');
    sessions.forEach(function(r){
      var chaps=(r.chapters||'').split(' | ').filter(Boolean);
      lines.push('• '+r.teacher_name+' · '+r.subject+' · '+r.start_time+'-'+r.end_time);
      if(chaps.length)lines.push('  📖 '+chaps.join(', '));
      if(r.homework&&r.homework.trim())lines.push('  📝 HW assigned');
    });
    var att=ATTENDANCE.filter(function(r){return attDateToYMD(r.date)===CUR_DATE&&r.class===r0.class;});
    if(att.length){var ap2=att.filter(function(r){return r.status==='Present';}).length;lines.push('  👥 '+ap2+'/'+att.length+' present');}
  });
  lines.push('');lines.push('_SEHR Academy_');
  window.open('https://wa.me/'+WA_NUM+'?text='+encodeURIComponent(lines.join('\n')),'_blank');
}

/* DATE PICKER */
function toggleDP(){var drop=g('dpDrop'),disp=g('dpDisp'),open=drop.classList.toggle('open');disp.classList.toggle('open',open);if(open)renderDP();}
function dpPrev(){CAL_M--;if(CAL_M<0){CAL_M=11;CAL_Y--;}renderDP();}
function dpNext(){CAL_M++;if(CAL_M>11){CAL_M=0;CAL_Y++;}renderDP();}
function renderDP(){
  g('dpML').textContent=MONTHS[CAL_M]+' '+CAL_Y;
  var first=new Date(CAL_Y,CAL_M,1).getDay(),dim=new Date(CAL_Y,CAL_M+1,0).getDate(),td=todayYMD();
  var html='<div class="dp-dows">'+DAYS_S.map(function(d){return '<div class="dp-dow">'+d+'</div>';}).join('')+'</div>';
  var cells=[];
  for(var i=0;i<first;i++)cells.push({emp:true});
  for(var d=1;d<=dim;d++){var ds=CAL_Y+'-'+pad(CAL_M+1)+'-'+pad(d);cells.push({d:d,ds:ds,hd:AVAIL.indexOf(ds)>-1,td:ds===td,sel:ds===CUR_DATE});}
  while(cells.length%7)cells.push({emp:true});
  for(var w=0;w<cells.length;w+=7){
    html+='<div class="dp-week">';
    for(var wd=0;wd<7;wd++){var c=cells[w+wd];if(c.emp){html+='<div class="dp-day emp"></div>';continue;}var cl='dp-day'+(c.hd?' hd':'')+(c.td?' tdy':'')+(c.sel?' sel':'');html+='<div class="'+cl+'" onclick="selectDate(\''+c.ds+'\')">'+c.d+'</div>';}
    html+='</div>';
  }
  g('dpCal').innerHTML=html;
}
function selectDate(d){CUR_DATE=d;updateDPDisp();renderDP();g('dpDrop').classList.remove('open');g('dpDisp').classList.remove('open');renderAll();}
function updateDPDisp(){g('dpTxt').textContent=CUR_DATE?fmtShort(CUR_DATE):'Select date';}
document.addEventListener('click',function(e){if(!g('dpWrap').contains(e.target)){g('dpDrop').classList.remove('open');g('dpDisp').classList.remove('open');}});

init();
</script>
