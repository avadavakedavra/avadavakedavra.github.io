/* ── HW GROUP COPY ── */
function copyHWGroup(safeKey,btn){
  var d=getHWGroupData(safeKey);
  if(!d) return;
  var a=d.assignment, ndRecs=d.ndRecs;
  var lines=[];
  lines.push('📋 SEHR Academy — Homework Report');
  lines.push('');
  lines.push('📚 '+a.subject+' · Class '+a.class+(a.stream?' '+a.stream:'')+' · '+a.board);
  lines.push('👨‍🏫 '+a.teacher);
  lines.push('📅 Given: '+fmtLong(a.hw_date));
  if(a.chapters.length) lines.push('📖 Chapters: '+a.chapters.join(', '));
  lines.push('');
  lines.push('📝 Homework:');
  lines.push(a.homework);
  lines.push('');
  if(ndRecs.length){
    lines.push('❌ NOT SUBMITTED ('+ndRecs.length+'):');
    ndRecs.forEach(function(r,i){lines.push('  '+(i+1)+'. '+r.student_name+' ('+r.syllabus+')');});
  } else {
    lines.push('✅ All students submitted this homework.');
  }
  lines.push('');
  lines.push('— SEHR Academy');
  if(navigator.clipboard){
    navigator.clipboard.writeText(lines.join('\n')).then(function(){
      btn.classList.add('copied');
      btn.innerHTML='<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" width="11" height="11"><polyline points="20 6 9 17 4 12"/></svg>Copied!';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.innerHTML='<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" width="11" height="11"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copy';
      },2200);
    });
  }
}

/* ══ SUBJECT DROPDOWN ══ */
function toggleSubjDD(ddId){
  var btn=g(ddId+'-btn'), menu=g(ddId+'-menu');
  if(!btn||!menu)return;
  var open=menu.classList.toggle('open');
  btn.classList.toggle('open',open);
}
function pickSubjDD(ddId, selIdx, subjName, subjIcon, sessCount){
  // Update button display
  var ic=g(ddId+'-ic'), name=g(ddId+'-name'), meta=g(ddId+'-meta');
  var btn=g(ddId+'-btn'), menu=g(ddId+'-menu');
  if(ic) ic.textContent=subjIcon;
  if(name) name.textContent=subjName;
  if(meta) meta.textContent=sessCount+' sessions';
  // Close dropdown
  if(menu) menu.classList.remove('open');
  if(btn)  btn.classList.remove('open');
  // Mark selected option
  if(menu){
    menu.querySelectorAll('.subj-dropdown-opt').forEach(function(o,i){
      o.classList.toggle('sel',i===selIdx);
    });
  }
  // Switch the subject panel
  // ddId format: sdd-bodyId-bi  → groupId = bodyId+'-'+bi
  var parts=ddId.split('-');
  parts.shift(); // remove 'sdd'
  var groupId=parts.join('-');
  switchSubject(groupId, selIdx);
}
// Close dropdown when clicking outside
document.addEventListener('click',function(e){
  if(!e.target.closest('.subj-dropdown-wrap')){
    document.querySelectorAll('.subj-dropdown-menu.open').forEach(function(m){
      m.classList.remove('open');
      var btn=m.previousElementSibling;
      if(btn) btn.classList.remove('open');
    });
  }
});


/* ══ PRINT PROGRESS ══ */
function printProgress(){
  var el=g('vProgress');
  if(!el||!window._progressTree){
    alert('No progress data loaded. Open the Progress view first.');return;
  }
  var tree=window._progressTree;
  var selCls=g('pgPrintClsSel')?g('pgPrintClsSel').value:'ALL';
  var fc=parseCurCls();
  var issued=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  // Filter tree if specific class selected
  var printTree={};
  Object.keys(tree).forEach(function(cls){
    if(selCls==='ALL'||cls===selCls) printTree[cls]=tree[cls];
  });
  if(!Object.keys(printTree).length){alert('No data for selected class.');return;}
  var html='<div class="pgpr-doc">';
  html+='<div class="pgpr-top-bar"></div>';
  html+='<div class="pgpr-hdr">'+
    '<div><div class="pgpr-logo"><span>SEHR</span> ACADEMY</div>'+
    '<div class="pgpr-hdr-sub">Vadanappally, Thrissur, Kerala · sehracademy.com</div></div>'+
    '<div class="pgpr-title-r">'+
      '<div class="pgpr-title-main">Syllabus Progress Report</div>'+
      '<div class="pgpr-title-sub">Generated: '+issued+(fc.cls?' · Class '+fc.cls+(fc.board?' '+fc.board:''):'')+'</div>'+
    '</div>'+
  '</div>';

  Object.keys(printTree).sort(function(a,b){return+a-+b;}).forEach(function(cls){
    var clsData=tree[cls];
    // Overall coverage
    var totalMaster=0,totalCovered=0;
    Object.keys(clsData.boards).forEach(function(b){
      Object.keys(clsData.boards[b].subjects).forEach(function(s){
        var mk=cls+'|'+b+'|'+s;
        var master=MASTER_CHAPTERS[mk]||[];
        totalMaster+=master.length;
        totalCovered+=Object.keys(clsData.boards[b].subjects[s].chapterMap).length;
      });
    });
    var overallPct=totalMaster>0?Math.min(100,Math.round(totalCovered/totalMaster*100)):null;
    var totalSess=0,totalMins=0;
    Object.keys(clsData.boards).forEach(function(b){
      Object.keys(clsData.boards[b].subjects).forEach(function(s){
        clsData.boards[b].subjects[s].sessions.forEach(function(r){totalSess++;totalMins+=(+r.duration_mins||0);});
      });
    });

    html+='<div class="pgpr-cls-block">';
    html+='<div class="pgpr-cls-hdr">';
    html+='<div class="pgpr-cls-num">'+esc(cls)+'</div>';
    html+='<div class="pgpr-cls-info">';
    html+='<div class="pgpr-cls-title">Class '+esc(cls)+(clsData.stream?' · '+esc(clsData.stream):'')+'</div>';
    html+='<div class="pgpr-cls-meta">'+totalSess+' sessions · '+hrsFmt(totalMins)+(overallPct!==null?' · '+overallPct+'% covered':'')+'</div>';
    html+='</div>';
    if(overallPct!==null){
      var R=16,circ=2*Math.PI*R,dash=circ*(overallPct/100),gap=circ-dash;
      var rc=overallPct>=75?'#8BC53F':overallPct>=40?'#d97706':'#dc2626';
      html+='<svg width="44" height="44" viewBox="0 0 44 44" class="pgpr-cls-ring">'+
        '<circle cx="22" cy="22" r="'+R+'" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="4"/>'+
        '<circle cx="22" cy="22" r="'+R+'" fill="none" stroke="'+rc+'" stroke-width="4"'+
        ' stroke-dasharray="'+dash.toFixed(1)+' '+gap.toFixed(1)+'"'+
        ' stroke-dashoffset="'+(circ/4).toFixed(1)+'" stroke-linecap="round"/>'+
        '<text x="22" y="26" text-anchor="middle" font-size="9" font-weight="800" fill="#fff">'+overallPct+'%</text>'+
        '</svg>';
    }
    html+='</div>';

    Object.keys(clsData.boards).sort().forEach(function(board){
      html+='<div class="pgpr-board-label"><span>'+(board==='Kerala State'?'🏛️':'🎓')+'</span> '+esc(board)+'</div>';
      Object.keys(clsData.boards[board].subjects).sort().forEach(function(subj){
        var sd=clsData.boards[board].subjects[subj];
        var mk=cls+'|'+board+'|'+subj;
        var master=MASTER_CHAPTERS[mk]||[];
        var covered=Object.keys(sd.chapterMap);
        var pct=master.length>0?Math.min(100,Math.round(covered.length/master.length*100)):null;
        var subjMins=sd.sessions.reduce(function(a,r){return a+(+r.duration_mins||0);},0);
        var dotCol=pct===null?'#b0ada4':pct>=75?'#8BC53F':pct>=40?'#d97706':'#dc2626';
        var barCol=dotCol;

        html+='<div class="pgpr-subj-row">';
        html+='<div class="pgpr-subj-dot" style="background:'+dotCol+'"></div>';
        html+='<div class="pgpr-subj-name">'+esc(subj)+'</div>';
        if(pct!==null){
          html+='<div class="pgpr-subj-bar-wrap">'+
            '<div class="pgpr-subj-bar"><div class="pgpr-subj-bar-fill" style="width:'+pct+'%;background:'+barCol+'"></div></div>'+
            '<div class="pgpr-subj-pct" style="color:'+barCol+'">'+pct+'%</div>'+
          '</div>';
        }
        html+='<div class="pgpr-subj-stats">'+sd.sessions.length+' sess · '+hrsFmt(subjMins)+'</div>';
        html+='</div>';

        // Covered chapters
        var notCovered=master.filter(function(c){return!sd.chapterMap[c];});
        if(covered.length||notCovered.length){
          html+='<div class="pgpr-ch-block">';
          if(covered.length){
            html+='<div class="pgpr-ch-label">Covered ('+covered.length+')</div>';
            // Sort by most recent first
            covered.slice().sort(function(a,b){
              var da=sd.chapterMap[a].dates.slice().sort().pop()||'';
              var db=sd.chapterMap[b].dates.slice().sort().pop()||'';
              return db.localeCompare(da);
            }).forEach(function(ch){
              var cd=sd.chapterMap[ch];
              var lastDate=cd.dates.slice().sort().pop()||'';
              var teachers=Array.from(cd.teachers).join(', ');
              html+='<div class="pgpr-ch-item" style="flex-direction:column;align-items:flex-start;padding:5px 0;border-bottom:1px solid #ede9e0;gap:0">';
              // Chapter header row
              html+='<div style="display:flex;align-items:center;gap:6px;width:100%">'+
                '<div class="pgpr-ch-dot-done"></div>'+
                '<div class="pgpr-ch-name" style="font-weight:700">'+esc(ch)+'</div>'+
                '<div class="pgpr-ch-sess" style="margin-left:auto">'+cd.count+' sess · '+hrsFmt(cd.mins)+(lastDate?' · '+fmtShort(lastDate):'')+'</div>'+
              '</div>';
              // Teacher
              if(teachers) html+='<div style="padding-left:14px;font-size:8px;color:#7a7970;margin-top:1px">👨‍🏫 '+esc(teachers)+'</div>';
              // Session entries: topics + dates
              if(cd.topics.length){
                cd.topics.forEach(function(t){
                  html+='<div style="display:flex;gap:6px;padding-left:14px;margin-top:3px;padding-top:3px;border-top:1px dashed #e4dfd4">'+
                    '<div style="font-size:8px;color:#b0ada4;white-space:nowrap;flex-shrink:0">'+fmtShort(t.date)+' · '+esc(t.teacher)+'</div>'+
                    '<div style="font-size:9px;color:#2e2e2b;line-height:1.4;flex:1">'+esc(t.text)+'</div>'+
                  '</div>';
                });
              } else {
                // Just show dates if no topics
                if(cd.dates.length){
                  html+='<div style="padding-left:14px;font-size:8px;color:#b0ada4;margin-top:2px">📅 '+cd.dates.slice().sort().join(' · ')+'</div>';
                }
              }
              // Remarks
              if(cd.remarks.length){
                cd.remarks.forEach(function(rk){
                  html+='<div style="display:flex;gap:6px;padding-left:14px;margin-top:2px">'+
                    '<div style="font-size:8px;color:#d97706;white-space:nowrap;flex-shrink:0">📝 '+fmtShort(rk.date)+'</div>'+
                    '<div style="font-size:9px;color:#d97706;font-style:italic;flex:1;line-height:1.4">'+esc(rk.text)+'</div>'+
                  '</div>';
                });
              }
              html+='</div>';
            });
          }
          if(notCovered.length){
            html+='<div class="pgpr-ch-label" style="margin-top:5px">Pending ('+notCovered.length+')</div>';
            notCovered.forEach(function(ch){
              html+='<div class="pgpr-ch-item">'+
                '<div class="pgpr-ch-dot-todo"></div>'+
                '<div class="pgpr-ch-name pgpr-ch-name-dim">'+esc(ch)+'</div>'+
              '</div>';
            });
          }
          html+='</div>';
        }
      });
    });
    html+='</div>'; // pgpr-cls-block
  });

  html+='<div style="height:12px"></div>';
  html+='<div class="pgpr-footer"><div>SEHR Academy · Syllabus Progress Report · '+issued+'</div><div>sehracademy.com · +91 95394 09586</div></div>';
  html+='<div class="pgpr-bot-bar"></div>';
  html+='</div>';

  // Clear other print docs, set this one
  g('printDoc').innerHTML='';
  g('hwPrintDoc').innerHTML='';
  g('progressPrintDoc').innerHTML=html;
  setTimeout(function(){window.print();},80);
}

/* ══ DATE PICKER ══ */
function toggleDP(){var drop=g('dpDrop'),disp=g('dpDisp'),open=drop.classList.toggle('open');disp.style.borderColor=open?'var(--li)':'';if(open)renderDP();}
function dpPrev(){CAL_M--;if(CAL_M<0){CAL_M=11;CAL_Y--;}renderDP();}
function dpNext(){CAL_M++;if(CAL_M>11){CAL_M=0;CAL_Y++;}renderDP();}
function renderDP(){
  g('dpML').textContent=MONTHS[CAL_M]+' '+CAL_Y;
  var first=new Date(CAL_Y,CAL_M,1).getDay(),dim=new Date(CAL_Y,CAL_M+1,0).getDate(),td=todayYMD();
  var html='<div class="dp-dows">'+DAYS_S.map(function(d){return '<div class="dp-dow">'+d+'</div>';}).join('')+'</div>';
  var cells=[];
  for(var i=0;i<first;i++)cells.push({emp:true});
  for(var d=1;d<=dim;d++){var ds=CAL_Y+'-'+pad(CAL_M+1)+'-'+pad(d);cells.push({d:d,ds:ds,hd:AVAIL.indexOf(ds)>-1,td:ds===td,sel:ds===CUR_DATE});}
  while(cells.length%7)cells.push({emp:true});
  for(var w=0;w<cells.length;w+=7){html+='<div class="dp-week">';for(var wd=0;wd<7;wd++){var c=cells[w+wd];if(c.emp){html+='<div class="dp-day emp"></div>';continue;}var cl='dp-day'+(c.hd?' hd':'')+(c.td?' tdy':'')+(c.sel?' sel':'');html+='<div class="'+cl+'" onclick="selectDate(\''+c.ds+'\')">'+c.d+'</div>';}html+='</div>';}
  g('dpCal').innerHTML=html;
}
function selectDate(d){CUR_DATE=d;updateDPDisp();renderDP();g('dpDrop').classList.remove('open');g('dpDisp').style.borderColor='';renderAll();}
function updateDPDisp(){g('dpTxt').textContent=CUR_DATE?fmtShort(CUR_DATE):'Today';}
document.addEventListener('click',function(e){if(!g('dpWrap').contains(e.target)){g('dpDrop').classList.remove('open');g('dpDisp').style.borderColor='';}});

init();











</script>
