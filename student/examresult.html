<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exam Leaderboard — SEHR Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#0f0f0d;--bg2:#1a1a18;--bg3:#232320;--bg4:#2e2e2a;
  --card:#1e1e1b;--border:#2e2e2a;--border2:#3a3a36;
  --text:#fff;--text2:#e0ddd6;--text3:#9a9790;--text4:#5a5a56;
  --li:#8BC53F;--l2:#72a530;--li-dim:rgba(139,197,63,.1);
  --gold:#f59e0b;--silver:#94a3b8;--bronze:#cd7c54;
  --re:#ef4444;
  --f:'Open Sans',sans-serif;--e1:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{
  font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;
  background-image:
    linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);
  background-size:48px 48px;
}
body::before{content:'';position:fixed;top:-100px;right:-80px;width:600px;height:600px;
  border-radius:50%;background:radial-gradient(circle,rgba(139,197,63,.07),transparent 65%);
  pointer-events:none;z-index:0}

@keyframes fUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop {0%{transform:scale(0);opacity:0}65%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOPBAR */
.topbar{height:56px;background:#1a1a18;border-bottom:2px solid #8BC53F;
  display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:200}
.tb-logo{font-size:22px;font-weight:900;letter-spacing:-1px}
.tb-logo span{color:#8BC53F}
.tb-div{width:1px;height:16px;background:#3a3a36}
.tb-sub{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#5a5a56}
.tb-spacer{flex:1}
.tb-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;
  border:1px solid #3a3a36;background:#232320;color:#9a9790;
  font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;transition:all .13s}
.tb-btn:hover{border-color:#8BC53F;color:#8BC53F}
.tb-btn.li{background:#8BC53F;border-color:#8BC53F;color:#0f0f0d}
.tb-btn.li:hover{background:#72a530}
.tb-btn svg{width:13px;height:13px;flex-shrink:0}

/* PAGE */
.page{max-width:680px;margin:0 auto;padding:24px 16px 80px;position:relative;z-index:1}

/* FILTERS */
.filters{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.fsel-wrap{position:relative}
.fsel{appearance:none;-webkit-appearance:none;background:var(--card);border:1px solid var(--border2);
  border-radius:10px;color:var(--text2);font-family:var(--f);font-size:13px;font-weight:600;
  padding:9px 34px 9px 13px;cursor:pointer;outline:none;transition:border .14s}
.fsel:focus{border-color:var(--li)}
.farr{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text4);font-size:11px;pointer-events:none}
#subjFilterWrap{display:none}

/* EXAM HEADER */
.exam-hd{
  background:var(--bg2);border:1px solid var(--border2);border-radius:14px;
  padding:22px 22px 20px;margin-bottom:20px;position:relative;overflow:hidden;
  animation:fUp .4s var(--e1);
}
.exam-hd::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--li),rgba(139,197,63,.3),transparent)}
.exam-eyebrow{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  color:var(--li);margin-bottom:8px;display:flex;align-items:center;gap:7px}
.exam-eyebrow::before{content:'';width:3px;height:14px;background:var(--li);border-radius:2px;flex-shrink:0}
.exam-class{font-size:36px;font-weight:900;color:var(--text);letter-spacing:-1px;line-height:1}
.exam-month{font-size:18px;font-weight:700;color:var(--li);font-style:italic;letter-spacing:-.3px;margin-top:3px}
.exam-sub{font-size:12px;color:var(--text3);margin-top:6px}

/* CLASS TOPPER */
.topper-card{
  background:linear-gradient(135deg,rgba(245,158,11,.07),rgba(245,158,11,.02));
  border:1px solid rgba(245,158,11,.25);border-radius:14px;
  padding:20px 22px;margin-bottom:20px;position:relative;overflow:hidden;
  animation:fUp .4s .05s var(--e1) both;
}
.topper-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),rgba(245,158,11,.3),transparent)}
.topper-glow{position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.08),transparent 70%);pointer-events:none}
.topper-badge{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.topper-badge::before{content:'';width:3px;height:14px;background:var(--gold);border-radius:2px;flex-shrink:0}
.topper-badge-crown{font-size:16px;animation:pop .5s .3s var(--e1) both;display:inline-block}
.topper-body{display:flex;align-items:center;gap:20px}
.topper-av{
  width:120px;height:120px;border-radius:50%;flex-shrink:0;
  border:3px solid var(--gold);
  background:rgba(245,158,11,.08);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:900;color:var(--gold);
  overflow:hidden;position:relative;
  box-shadow:0 0 0 2px rgba(245,158,11,.15),0 8px 24px rgba(245,158,11,.2);
}
.topper-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.topper-info{flex:1;min-width:0}
.topper-name{font-size:26px;font-weight:900;color:var(--text);letter-spacing:-.6px;line-height:1.1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topper-meta{font-size:13px;color:var(--text3);margin-top:4px}
.topper-score{text-align:right;flex-shrink:0}
.topper-pct{font-size:44px;font-weight:900;color:var(--gold);line-height:1;letter-spacing:-2px}
.topper-marks{font-size:12px;color:rgba(245,158,11,.45);margin-top:2px;font-weight:600}

/* SECTION */
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-title{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text4);display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';width:3px;height:14px;background:var(--li);border-radius:2px}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-cnt{font-size:11px;color:var(--text4);background:var(--bg3);border:1px solid var(--border);padding:2px 9px;border-radius:20px}

/* LB ROWS */
.lb-row{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;margin-bottom:8px;
  position:relative;overflow:hidden;transition:border-color .13s;
  animation:fUp .3s var(--e1) both;
}
.lb-row:hover{border-color:var(--border2)}
.lb-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px}
.lb-row.r1{border-color:rgba(245,158,11,.2);background:rgba(245,158,11,.03)}.lb-row.r1::before{background:var(--gold)}
.lb-row.r2{border-color:rgba(148,163,184,.15)}.lb-row.r2::before{background:var(--silver)}
.lb-row.r3{border-color:rgba(205,124,84,.15)}.lb-row.r3::before{background:var(--bronze)}
.lb-row.pass::before{background:var(--li)}
.lb-row.fail::before{background:var(--re)}

.lb-rank{width:38px;text-align:center;flex-shrink:0;font-weight:900;line-height:1}
.lb-rank-1{font-size:18px;color:var(--gold)}
.lb-rank-2{font-size:17px;color:var(--silver)}
.lb-rank-3{font-size:17px;color:var(--bronze)}
.lb-rank-num{font-size:12px;color:var(--text4)}

.lb-av{
  width:64px;height:64px;border-radius:12px;flex-shrink:0;overflow:hidden;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:18px;color:var(--li);position:relative;
}
.lb-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}

.lb-info{flex:1;min-width:0}
.lb-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.2px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-sub{font-size:11px;color:var(--text4);margin-top:3px}

.lb-right{text-align:right;flex-shrink:0}
.lb-pct{font-size:22px;font-weight:900;line-height:1;letter-spacing:-.4px}
.lb-marks{font-size:11px;color:var(--text4);margin-top:2px}
.lb-bar{width:70px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;margin:5px 0 0 auto}
.lb-bar-fill{height:100%;border-radius:2px;transition:width .6s var(--e1)}

/* EXPORT OVERLAY */
#exportOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:999;align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;backdrop-filter:blur(8px)}
#exportOverlay.on{display:flex}
.exp-wrap{width:100%;max-width:540px}
.exp-controls{display:flex;justify-content:space-between;align-items:center;
  padding-bottom:14px;gap:8px;position:sticky;top:0;z-index:10}
.exp-dl{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border:none;
  border-radius:9px;background:#8BC53F;color:#0f0f0d;font-family:var(--f);
  font-size:13px;font-weight:800;cursor:pointer;transition:background .13s}
.exp-dl:hover{background:#72a530}
.exp-dl:disabled{opacity:.5;cursor:not-allowed}
.exp-close{background:#2e2e2a;border:1px solid #3a3a36;color:#fff;padding:9px 16px;
  border-radius:9px;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;
  transition:all .13s}
.exp-close:hover{border-color:#8BC53F;color:#8BC53F}

/* EXPORT CARD */
.wcard{
  width:100%;background:#0f0f0d;border-radius:16px;overflow:hidden;
  font-family:'Open Sans',sans-serif;color:#fff;
  box-shadow:0 24px 64px rgba(0,0,0,.8);
}
.wc-top{background:#1a1a18;border-bottom:2px solid #8BC53F;
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.wc-logo{font-size:20px;font-weight:900;letter-spacing:-1px;color:#fff}
.wc-logo span{color:#8BC53F}
.wc-divider{width:1px;height:18px;background:rgba(255,255,255,.15);margin:0 12px}
.wc-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.wc-date{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;
  background:rgba(139,197,63,.1);border:1px solid rgba(139,197,63,.2);
  font-size:10px;font-weight:700;color:#8BC53F}
.wc-date::before{content:'';width:5px;height:5px;border-radius:50%;background:#8BC53F;flex-shrink:0}

.wc-hero{
  background:linear-gradient(135deg,#1a1a18,#1e1e1b);
  padding:22px 22px 18px;position:relative;overflow:hidden;border-bottom:1px solid #2e2e2a;
}
.wc-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;
  border-radius:50%;background:radial-gradient(circle,rgba(139,197,63,.07),transparent 70%);pointer-events:none}
.wc-eyebrow{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  color:#8BC53F;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.wc-eyebrow::before{content:'';width:3px;height:12px;background:#8BC53F;border-radius:2px;flex-shrink:0}
.wc-class{font-size:36px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
.wc-month{font-size:17px;font-weight:700;color:#8BC53F;font-style:italic;letter-spacing:-.2px;margin-top:2px}
.wc-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:5px}
.wc-board{display:inline-flex;align-items:center;padding:3px 10px;border-radius:5px;
  font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-top:8px}
.wc-board.state{background:rgba(139,197,63,.1);color:#8BC53F;border:1px solid rgba(139,197,63,.2)}
.wc-board.cbse{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.wc-board.all{background:rgba(255,255,255,.06);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1)}

.wc-topper{
  background:linear-gradient(135deg,rgba(245,158,11,.07),rgba(245,158,11,.02));
  border-bottom:1px solid rgba(245,158,11,.12);
  padding:18px 22px;display:flex;align-items:center;gap:16px;
  position:relative;overflow:hidden;
}
.wc-topper::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#f59e0b,rgba(245,158,11,.2),transparent)}
.wc-t-glow{position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(245,158,11,.08),transparent 70%);pointer-events:none}
.wc-t-av{
  width:72px;height:72px;border-radius:50%;
  border:2px solid rgba(245,158,11,.5);background:rgba(245,158,11,.08);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:#f59e0b;
  flex-shrink:0;overflow:hidden;position:relative;
  box-shadow:0 0 0 3px rgba(245,158,11,.1),0 4px 16px rgba(245,158,11,.15);
}
.wc-t-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.wc-t-info{flex:1;min-width:0}
.wc-t-badge{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  color:#f59e0b;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.wc-t-badge::before{content:'👑';font-size:11px}
.wc-t-name{font-size:19px;font-weight:900;letter-spacing:-.4px;color:#fff;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-t-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:3px}
.wc-t-pct{font-size:34px;font-weight:900;color:#f59e0b;line-height:1;letter-spacing:-1px;flex-shrink:0}
.wc-t-pct-sub{font-size:10px;color:rgba(245,158,11,.4);text-align:right;margin-top:2px;font-weight:600}

.wc-rows{padding:8px 0 4px}
.wc-row{display:flex;align-items:center;gap:12px;padding:10px 22px;
  border-bottom:1px solid rgba(255,255,255,.04)}
.wc-row:last-child{border-bottom:none}
.wc-rrank{width:34px;text-align:center;flex-shrink:0;font-weight:900;font-size:15px;line-height:1}
.wc-rrank.r2{color:#94a3b8}.wc-rrank.r3{color:#cd7c54}.wc-rrank.rn{font-size:11px;color:rgba(255,255,255,.3)}
.wc-rav{
  width:44px;height:44px;border-radius:9px;background:#2e2e2a;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#8BC53F;
  flex-shrink:0;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,.08);
}
.wc-rav img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.wc-rinfo{flex:1;min-width:0}
.wc-rname{font-size:13px;font-weight:800;color:#e0ddd6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wc-rsub{font-size:10px;color:rgba(255,255,255,.3);margin-top:2px}
.wc-rpct{font-size:17px;font-weight:900;flex-shrink:0}
.wc-rpct.r2{color:#94a3b8}.wc-rpct.r3{color:#cd7c54}
.wc-rpct.rp{color:#8BC53F}.wc-rpct.rf{color:#ef4444}

.wc-footer{background:#1a1a18;border-top:1px solid #2e2e2a;padding:12px 22px;
  display:flex;align-items:center;justify-content:space-between}
.wc-foot-brand{font-size:13px;font-weight:900;color:#fff;letter-spacing:-.3px}
.wc-foot-brand span{color:#8BC53F}
.wc-foot-url{font-size:10px;color:rgba(255,255,255,.25);font-weight:600}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:36px;opacity:.2;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:800;color:var(--text3)}
.empty-sub{font-size:13px;color:var(--text4);margin-top:6px}

/* PDF PRINT OVERLAY */
#pdfOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:998;align-items:flex-start;justify-content:center;
  padding:20px;overflow-y:auto;backdrop-filter:blur(8px)}
#pdfOverlay.on{display:flex}
.pdf-wrap{width:100%;max-width:600px}
.pdf-controls{display:flex;justify-content:space-between;align-items:center;
  padding-bottom:14px;gap:8px;position:sticky;top:0;z-index:10}
.pdf-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border:none;
  border-radius:9px;background:#ef4444;color:#fff;font-family:var(--f);
  font-size:13px;font-weight:800;cursor:pointer;transition:background .13s}
.pdf-btn:hover{background:#dc2626}

/* PDF CARD — light print style */
.pcard{
  background:#fff;border-radius:12px;overflow:hidden;
  font-family:'Open Sans',sans-serif;color:#111;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
}
.pc-top{background:#0f0f0d;border-bottom:3px solid #8BC53F;
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.pc-logo{font-size:20px;font-weight:900;letter-spacing:-1px;color:#fff}
.pc-logo span{color:#8BC53F}
.pc-divider{width:1px;height:16px;background:rgba(255,255,255,.2);margin:0 12px}
.pc-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.pc-date-pill{padding:4px 12px;border-radius:20px;background:rgba(139,197,63,.15);
  border:1px solid rgba(139,197,63,.3);font-size:10px;font-weight:700;color:#8BC53F}

.pc-hero{background:#f8f8f6;border-bottom:1px solid #e8e8e4;padding:20px 22px 16px}
.pc-eyebrow{font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;
  color:#8BC53F;margin-bottom:6px}
.pc-class{font-size:32px;font-weight:900;color:#111;letter-spacing:-1px;line-height:1}
.pc-month{font-size:16px;font-weight:700;color:#6b7280;font-style:italic;margin-top:2px}
.pc-sub{font-size:11px;color:#9ca3af;margin-top:5px}
.pc-board-badge{display:inline-flex;padding:3px 10px;border-radius:5px;
  font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-top:8px;
  background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}

.pc-table{width:100%;padding:16px 0 8px}
.pc-row{display:flex;align-items:center;gap:12px;
  padding:10px 22px;border-bottom:1px solid #f3f4f6}
.pc-row:last-child{border-bottom:none}
.pc-rank{width:36px;text-align:center;flex-shrink:0;font-weight:900;font-size:14px;line-height:1}
.pc-rank.gold{color:#d97706}.pc-rank.silver{color:#6b7280}.pc-rank.bronze{color:#9a5a2a}
.pc-rank.other{font-size:11px;color:#9ca3af}
.pc-av{width:40px;height:40px;border-radius:8px;background:#f3f4f6;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;
  color:#6b7280;flex-shrink:0;overflow:hidden;position:relative;border:1px solid #e5e7eb}
.pc-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.pc-info{flex:1;min-width:0}
.pc-name{font-size:13px;font-weight:800;color:#111;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-board{font-size:10px;color:#9ca3af;margin-top:1px}
.pc-score{text-align:right;flex-shrink:0}
.pc-pct{font-size:16px;font-weight:900;color:#111}
.pc-pct.gold{color:#d97706}.pc-pct.silver{color:#6b7280}.pc-pct.bronze{color:#9a5a2a}
.pc-marks{font-size:10px;color:#9ca3af;margin-top:1px}

<script>


/* ── SHEETS CONNECTION ───────────────────────────────────────────
   Reads from ExamResults tab in the attendance sheet.
   Falls back to static DATA if API fails or tab missing.
*/
var USE_SHEETS = true; // set false to use only static DATA

function examApiFetch(payload, cb){
  if(!EXAM_API || EXAM_API.indexOf('PASTE_') >= 0){ cb(null,'not configured'); return; }
  var url = EXAM_API + '?data=' + encodeURIComponent(JSON.stringify(payload));
  fetch(url).then(function(r){return r.text();})
    .then(function(t){try{cb(JSON.parse(t),null);}catch(e){cb(null,'parse error');}})
    .catch(function(e){cb(null,e.message);});
}

function loadFromSheets(cls, month, board, cb){
  if(!USE_SHEETS){cb(null);return;}
  examApiFetch({action:'getExamResults', class:cls, month:month}, function(data, err){
    if(err||!data||!data.success||!data.results||!data.results.length){
      cb(null); return; // fall back to static DATA
    }
    // Replace DATA entirely with sheet results (don't merge — avoids duplicates)
    var key = month;
    if(!DATA[cls]) DATA[cls]={};
    var meta = data.meta||{};
    // Build fresh entry, wiping any hardcoded data for this class+month
    var fresh = {'_meta':{date:meta.date||'', subjects:meta.subjects||[]}};
    data.results.forEach(function(r){
      var b = r.board||'STATE';
      if(!fresh[b]) fresh[b]=[];
      fresh[b].push({
        name:r.student_name, id:r.student_id,
        correct:Number(r.correct||0), wrong:Number(r.wrong||0),
        unanswered:Number(r.unanswered||0), total_q:Number(r.total_q||35)
      });
    });
    DATA[cls][key] = fresh;
    cb(data);
  });
}

var ATT_API  = 'https://script.google.com/macros/s/AKfycbxpxedvIrF7AiWQ1cIx-jWfxGkv0r1-Yl2rJtkaSdTdQtfEll9M0Sf6qQrqvB9x0I1_/exec';
var EXAM_API = 'https://script.google.com/macros/s/AKfycbzqU1DrfEgKwSLi4sUL6J5rGQXXw0AP9mmzDcYjOxuO0xU3uWUgi_GXI9vHA8JXGCBy/exec'; // ← replace after deploying exam-results-script.gs

var DATA={
  "11":{
    "June 2026":{
      "_meta":{date:"13 June 2026",subjects:[]},
      "STATE":[
        {name:"John Tharakan",   id:"johntharakan", correct:29,wrong:5, unanswered:1,total_q:35},
        {name:"Ganashyam PV",    id:"ganashyam",    correct:19,wrong:16,unanswered:0,total_q:35},
        {name:"Thasni PS",       id:"thasni",       correct:12,wrong:23,unanswered:0,total_q:35}
      ]
    }
  }
};
var SCHEME={correct:4,wrong:-1};
var PHOTO_MAP={};

function g(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mn(n){return(n||'??').trim().split(/\s+/).map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);}
function normN(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');}

function calcScore(r){
  var max=r.total_q*SCHEME.correct;
  var score=r.correct*SCHEME.correct+r.wrong*SCHEME.wrong;
  var pct=max>0?Math.round(score/max*10000)/100:0;
  return {score:score,max:max,pct:pct};
}
function pctCol(p){
  if(p>=75)return'var(--li)';if(p>=50)return'var(--gold)';if(p>=35)return'#f97316';return'var(--re)';
}
function getPhoto(r){
  var name=typeof r==='object'?(r.name||''):(r||'');
  var id=typeof r==='object'?(r.id||''):'';
  if(id&&PHOTO_MAP[id.toLowerCase()])return PHOTO_MAP[id.toLowerCase()];
  if(name&&PHOTO_MAP[name.trim()])return PHOTO_MAP[name.trim()];
  var norm=normN(name);
  if(norm&&PHOTO_MAP[norm])return PHOTO_MAP[norm];
  var first=name.trim().split(/\s+/)[0].toLowerCase();
  if(first&&PHOTO_MAP[first])return PHOTO_MAP[first];
  return null;
}

function apiFetch(url,cb){
  fetch(url).then(function(r){return r.text();})
    .then(function(t){try{cb(JSON.parse(t),null);}catch(e){cb(null,'parse');}})
    .catch(function(e){cb(null,e.message);});
}
function apiAtt(pay,cb){
  apiFetch(ATT_API+'?data='+encodeURIComponent(JSON.stringify(pay)),cb);
}

function loadPhotos(cls,board,cb){
  var boards=board==='ALL'?['STATE','CBSE']:[board];
  var done=0;
  boards.forEach(function(syl){
    apiAtt({action:'getStudents',class:cls,syllabus:syl},function(data,err){
      if(!err&&data&&data.success){
        (data.students||[]).forEach(function(s){
          if(!s.photo||!s.photo.startsWith('http'))return;
          if(s.id)PHOTO_MAP[s.id.trim().toLowerCase()]=s.photo;
          if(s.full_name){
            PHOTO_MAP[s.full_name.trim()]=s.photo;
            PHOTO_MAP[normN(s.full_name)]=s.photo;
            var f=s.full_name.trim().split(/\s+/)[0];
            if(f)PHOTO_MAP[f.toLowerCase()]=s.photo;
          }
        });
      }
      done++;if(done>=boards.length&&cb)cb();
    });
  });
}

function getMeta(cls,month){
  var d=DATA[cls]&&DATA[cls][month];
  return(d&&d['_meta'])||{date:'',subjects:[]};
}
function updateSubjFilter(){
  var cls=g('selClass').value,month=g('selMonth').value;
  var meta=getMeta(cls,month);
  var wrap=g('subjFilterWrap'),sel=g('selSubj');
  if(meta.subjects&&meta.subjects.length>0){
    var opts='<option value="ALL">All Subjects</option>';
    meta.subjects.forEach(function(s){opts+='<option value="'+esc(s)+'">'+esc(s)+'</option>';});
    sel.innerHTML=opts;wrap.style.display='block';
  } else {
    sel.innerHTML='<option value="ALL">All Subjects</option>';wrap.style.display='none';
  }
}
function onFCh(){
  var cls=g('selClass').value,month=g('selMonth').value,board=g('selBoard').value;
  updateSubjFilter();
  loadFromSheets(cls,month,board,function(){
    loadPhotos(cls,board,function(){render();});
  });
}

function getList(cls,month,board){
  var clsData=DATA[cls]&&DATA[cls][month];
  if(!clsData)return null;
  var list=[];
  if(board==='ALL'){
    Object.keys(clsData).filter(function(k){return k!=='_meta';})
      .forEach(function(b){(clsData[b]||[]).forEach(function(r){list.push(Object.assign({},r,{board:b}));});});
  } else {
    (clsData[board]||[]).forEach(function(r){list.push(Object.assign({},r,{board:board}));});
  }
  var scored=list.map(function(r){return Object.assign({},r,calcScore(r));});
  scored.sort(function(a,b){return b.pct-a.pct||(a.wrong-b.wrong);});
  return scored;
}

function rankEl(i){
  if(i===0)return '<div class="lb-rank lb-rank-1">1<span style="font-size:.6em;font-weight:700">st</span></div>';
  if(i===1)return '<div class="lb-rank lb-rank-2">2<span style="font-size:.6em;font-weight:700">nd</span></div>';
  if(i===2)return '<div class="lb-rank lb-rank-3">3<span style="font-size:.6em;font-weight:700">rd</span></div>';
  return '<div class="lb-rank lb-rank-num">#'+(i+1)+'</div>';
}
function rowCls(i,pct){
  return i===0?'r1':i===1?'r2':i===2?'r3':pct>=35?'pass':'fail';
}
function lbPctCol(i,pct){
  return i===0?'var(--gold)':i===1?'var(--silver)':i===2?'var(--bronze)':pctCol(pct);
}

function render(){
  var cls=g('selClass').value,month=g('selMonth').value;
  var board=g('selBoard').value,show=g('selShow').value;
  var meta=getMeta(cls,month);
  var scored=getList(cls,month,board);
  if(!scored||!scored.length){
    g('mainOut').innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No results yet</div><div class="empty-sub">Results for Class '+esc(cls)+' · '+esc(month)+' will appear here.</div></div>';
    return;
  }
  var boardLabel=board==='ALL'?'':(board==='STATE'?' · Kerala State':' · CBSE');
  var html='';

  /* Exam header */
  html+='<div class="exam-hd">'
    +'<div class="exam-eyebrow">Monthly Examination Results</div>'
    +'<div class="exam-class">Class '+esc(cls)+'</div>'
    +'<div class="exam-month">'+esc(month)+'</div>'
    +'<div class="exam-sub">'+esc(meta.date||month)+esc(boardLabel)+'</div>'
    +'</div>';

  /* Topper card */
  var t=scored[0];var tp=getPhoto(t);
  html+='<div class="topper-card">'
    +'<div class="topper-glow"></div>'
    +'<div class="topper-badge"><span class="topper-badge-crown">👑</span>1st · Class Topper</div>'
    +'<div class="topper-body">'
    +'<div class="topper-av" id="topAv">'+(tp?'<img src="'+esc(tp)+'" alt="">':mn(t.name))+'</div>'
    +'<div class="topper-info">'
    +'<div class="topper-name">'+esc(t.name)+'</div>'
    +'<div class="topper-meta">'+esc(t.board==='STATE'?'Kerala State':t.board)+'</div>'
    +'</div>'
    +(show!=='none'
      ? '<div class="topper-score">'
        +'<div class="topper-pct">'+(show==='pct'||show==='topper_only'?t.pct+'%':t.score+'/'+t.max)+'</div>'
        +'<div class="topper-marks">'+t.score+' / '+t.max+'</div>'
        +'</div>'
      : '')
    +'</div></div>';

  /* Full rankings */
  html+='<div class="sec-hd"><div class="sec-title">Full Rankings</div>'
    +'<div class="sec-line"></div><span class="sec-cnt">'+scored.length+'</span></div>';

  scored.forEach(function(r,i){
    var col=lbPctCol(i,r.pct);
    var ph=getPhoto(r);
    var barW=Math.max(0,r.score/r.max*100);
    var boardSub=board==='ALL'?'<div class="lb-sub">'+esc(r.board==='STATE'?'Kerala State':r.board)+'</div>':'';
    html+='<div class="lb-row '+rowCls(i,r.pct)+'" style="animation-delay:'+Math.min(i*.05,.4)+'s">'
      +rankEl(i)
      +'<div class="lb-av" id="av'+i+'">'+(ph?'<img src="'+esc(ph)+'" alt="">':mn(r.name))+'</div>'
      +'<div class="lb-info"><div class="lb-name">'+esc(r.name)+'</div>'+boardSub+'</div>'
      +(show!=='none'&&show!=='topper_only'
        ? '<div class="lb-right">'
          +'<div class="lb-pct" style="color:'+col+'">'+(show==='pct'?r.pct+'%':r.score+'/'+r.max)+'</div>'
          +'<div class="lb-marks">'+r.score+' / '+r.max+'</div>'
          +'<div class="lb-bar"><div class="lb-bar-fill" style="width:'+barW+'%;background:'+col+'"></div></div>'
          +'</div>'
        : '')
      +'</div>';
  });

  g('mainOut').innerHTML=html;

  /* Async photo updates */
  scored.forEach(function(r,i){
    if(r.photo){
      var img=new Image();
      img.onload=(function(url,idx){return function(){
        var el=g('av'+idx);if(el)el.innerHTML='<img src="'+url+'" alt="">';
      };})(r.photo,i);
      img.src=r.photo;
    }
  });
  if(t.photo){
    var ti=new Image();
    ti.onload=function(){var el=g('topAv');if(el)el.innerHTML='<img src="'+t.photo+'" alt="">';};
    ti.src=t.photo;
  }
}

/* Export card HTML */
function buildCard(){
  var cls=g('selClass').value,month=g('selMonth').value;
  var board=g('selBoard').value,show=g('selShow').value;
  var meta=getMeta(cls,month);
  var scored=getList(cls,month,board);
  if(!scored||!scored.length)return '<div style="padding:20px;color:#fff">No data</div>';

  var t=scored[0];
  var tp=getPhoto(t);
  var boardCls=board==='STATE'?'state':board==='CBSE'?'cbse':'all';
  var boardTxt=board==='STATE'?'Kerala State Board':board==='CBSE'?'CBSE':'All Boards';
  var examDate=meta.date||month;

  var html=
    '<div class="wc-top">'
    +'<div style="display:flex;align-items:center">'
    +'<div class="wc-logo">SEHR<span>.</span></div>'
    +'<div class="wc-divider"></div>'
    +'<div class="wc-tag">Exam Results</div>'
    +'</div>'
    +'<div class="wc-date">'+esc(examDate)+'</div>'
    +'</div>'

    +'<div class="wc-hero">'
    +'<div class="wc-eyebrow">Monthly Examination Results</div>'
    +'<div class="wc-class">Class '+esc(cls)+'</div>'
    +'<div class="wc-month">'+esc(month)+'</div>'
    +'<div class="wc-sub">Second Saturday Examination</div>'
    +'<div class="wc-board '+boardCls+'">'+esc(boardTxt)+'</div>'
    +'</div>'

    +'<div class="wc-topper">'
    +'<div class="wc-t-glow"></div>'
    +'<div class="wc-t-av" id="wc-tav">'+(tp?'<img src="'+esc(tp)+'" alt="">':mn(t.name))+'</div>'
    +'<div class="wc-t-info">'
    +'<div class="wc-t-badge"><span style="font-weight:900">1st</span>&nbsp;·&nbsp;Class Topper</div>'
    +'<div class="wc-t-name">'+esc(t.name)+'</div>'
    +(board==='ALL'?'<div class="wc-t-sub">'+esc(t.board==='STATE'?'Kerala State':t.board)+'</div>':'')
    +'</div>'
    +(show!=='none'
      ? '<div style="text-align:right;flex-shrink:0">'
        +'<div class="wc-t-pct">'+(show==='pct'||show==='topper_only'?t.pct+'%':t.score+'/'+t.max)+'</div>'
        +'<div class="wc-t-pct-sub">'+t.score+' / '+t.max+'</div>'
        +'</div>'
      : '')
    +'</div>'

    +'<div class="wc-rows">';

  scored.forEach(function(r,i){
    if(i===0)return;
    var rc=i===1?'r2':i===2?'r3':'rn';
    var pc=i===1?'r2':i===2?'r3':r.pct>=35?'rp':'rf';
    var ph=getPhoto(r);
    var medal=i===1?'2<span style="font-size:.62em">nd</span>':i===2?'3<span style="font-size:.62em">rd</span>':'#'+(i+1);
    html+='<div class="wc-row">'
      +'<div class="wc-rrank '+rc+'">'+medal+'</div>'
      +'<div class="wc-rav" id="wc-av'+i+'">'+(ph?'<img src="'+esc(ph)+'" alt="">':mn(r.name))+'</div>'
      +'<div class="wc-rinfo">'
      +'<div class="wc-rname">'+esc(r.name)+'</div>'
      +(board==='ALL'?'<div class="wc-rsub">'+esc(r.board==='STATE'?'Kerala State':r.board)+'</div>':'')
      +'</div>'
      +(show!=='none'&&show!=='topper_only'
        ? '<div class="wc-rpct '+pc+'">'+(show==='pct'?r.pct+'%':r.score+'/'+r.max)+'</div>'
        : '')
      +'</div>';
  });

  html+='</div>'
    +'<div class="wc-footer">'
    +'<div class="wc-foot-brand">SEHR<span>.</span> ACADEMY</div>'
    +'<div class="wc-foot-url">Vadanappally, Thrissur · sehracademy.com</div>'
    +'</div>';

  return html;
}


function buildPDF(){
  var cls=g('selClass').value,month=g('selMonth').value;
  var board=g('selBoard').value,show=g('selShow').value;
  var meta=getMeta(cls,month);
  var scored=getList(cls,month,board);
  if(!scored||!scored.length)return '<div style="padding:20px">No data</div>';

  var boardCls=board==='STATE'?'state':board==='CBSE'?'cbse':'all';
  var boardTxt=board==='STATE'?'Kerala State Board':board==='CBSE'?'CBSE':'All Boards';
  var examDate=meta.date||month;

  var html=
    '<div class="pc-top">'
    +'<div style="display:flex;align-items:center">'
    +'<div class="pc-logo">SEHR<span>.</span></div>'
    +'<div class="pc-divider"></div>'
    +'<div class="pc-tag">Exam Results</div>'
    +'</div>'
    +'<div class="pc-date-pill">'+esc(examDate)+'</div>'
    +'</div>'

    +'<div class="pc-hero">'
    +'<div class="pc-eyebrow">Monthly Examination Results</div>'
    +'<div class="pc-class">Class '+esc(cls)+'</div>'
    +'<div class="pc-month">'+esc(month)+'</div>'
    +'<div class="pc-sub">Second Saturday · '+esc(examDate)+'</div>'
    +'<div class="pc-board-badge">'+esc(boardTxt)+'</div>'
    +'</div>'

    +'<div class="pc-table">';

  scored.forEach(function(r,i){
    var rankC=i===0?'gold':i===1?'silver':i===2?'bronze':'other';
    var medal=i===0?'1st':i===1?'2nd':i===2?'3rd':'#'+(i+1);
    var pctC=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    var ph=getPhoto(r);
    var barW=Math.max(0,r.score/r.max*100);
    html+='<div class="pc-row">'
      +'<div class="pc-rank '+rankC+'">'+medal+'</div>'
      +'<div class="pc-av" id="pc-av'+i+'">'+(ph?'<img src="'+esc(ph)+'" alt="">':mn(r.name))+'</div>'
      +'<div class="pc-info">'
      +'<div class="pc-name">'+esc(r.name)+'</div>'
      +(board==='ALL'?'<div class="pc-board">'+esc(r.board==='STATE'?'Kerala State':r.board)+'</div>':'')
      +'</div>'
      +(show!=='none'
        ? '<div class="pc-score">'
          +'<div class="pc-pct '+pctC+'">'+(show==='topper_only'&&i>0?'':show==='pct'?r.pct+'%':r.score+'/'+r.max)+'</div>'
          +'<div class="pc-marks">'+r.score+' / '+r.max+'</div>'
          +'<div class="pc-bar"><div class="pc-bar-fill" style="width:'+barW+'%"></div></div>'
          +'</div>'
        : '')
      +'</div>';
  });

  html+='</div>'
    +'<div class="pc-footer">'
    +'<div class="pc-foot-brand">SEHR<span>.</span> ACADEMY</div>'
    +'<div class="pc-foot-url">Vadanappally, Thrissur · sehracademy.com</div>'
    +'</div>';

  return html;
}

/* Download PNG — draws avatar images manually before html2canvas */
function downloadCard(){
  var btn=g('dlBtn');
  btn.disabled=true;btn.textContent='Generating…';

  var card=g('wcard');
  var cls=g('selClass').value,month=g('selMonth').value,board=g('selBoard').value;
  var filename='SEHR_Class'+cls+'_'+month.replace(/ /g,'_')+(board!=='ALL'?'_'+board:'')+'.png';

  /* Pre-render images to canvas elements so html2canvas sees pixels not CSS */
  var avEls=card.querySelectorAll('.wc-t-av img,.wc-rav img');
  var total=avEls.length,done=0;

  function doCapture(){
    html2canvas(card,{
      backgroundColor:'#0f0f0d',scale:2,useCORS:true,allowTaint:true,
      logging:false,imageTimeout:0
    }).then(function(canvas){
      var a=document.createElement('a');
      a.download=filename;a.href=canvas.toDataURL('image/png');a.click();
      btn.disabled=false;
      btn.innerHTML='<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" width="13" height="13"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PNG';
      /* Restore */
      card.querySelectorAll('canvas.tmp-av').forEach(function(c){c.remove();});
      card.querySelectorAll('.wc-t-av img,.wc-rav img').forEach(function(i){i.style.display='';});
    }).catch(function(err){
      btn.disabled=false;btn.textContent='⚠ Try Again';
      card.querySelectorAll('canvas.tmp-av').forEach(function(c){c.remove();});
      card.querySelectorAll('.wc-t-av img,.wc-rav img').forEach(function(i){i.style.display='';});
      console.error(err);
    });
  }

  if(!total){doCapture();return;}

  avEls.forEach(function(img){
    var par=img.parentElement;
    var w=par.offsetWidth||72,h=par.offsetHeight||72;

    function draw(){
      var c=document.createElement('canvas');
      c.width=w*2;c.height=h*2;c.className='tmp-av';
      c.style.cssText='position:absolute;inset:0;width:'+w+'px;height:'+h+'px;border-radius:inherit;z-index:2';
      var ctx=c.getContext('2d');
      var iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height;
      if(iw&&ih){
        var scale=Math.max((w*2)/iw,(h*2)/ih);
        var sw=iw*scale,sh=ih*scale;
        ctx.drawImage(img,(w*2-sw)/2,0,sw,sh);
      }
      img.style.display='none';
      par.appendChild(c);
      done++;if(done>=total)doCapture();
    }

    if(img.complete&&img.naturalWidth>0){draw();}
    else{img.onload=draw;img.onerror=function(){done++;if(done>=total)doCapture();};}
  });
}

/* WhatsApp share */
function shareWA(){
  var cls=g('selClass').value,month=g('selMonth').value;
  var board=g('selBoard').value,show=g('selShow').value;
  var meta=getMeta(cls,month);
  var scored=getList(cls,month,board);
  if(!scored||!scored.length){alert('No data to share.');return;}
  var boardLabel=board==='ALL'?'':(board==='STATE'?' · Kerala State':' · CBSE');
  var lines=[
    '📊 *SEHR Academy — Exam Results*',
    '🎓 Class '+cls+boardLabel+' · '+month,
    '📅 '+(meta.date||month)+' · Second Saturday',
    '',
    '🏆 *Rankings*'
  ];
  scored.forEach(function(r,i){
    var m=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
    var sc=show==='pct'?' — '+r.pct+'%':show==='marks'?' — '+r.score+'/'+r.max:
           show==='topper_only'&&i===0?' — '+r.pct+'%':'';
    lines.push(m+' *'+r.name+'*'+sc);
  });
  lines.push('');lines.push('_SEHR Academy · sehracademy.com_');
  window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank');
}
