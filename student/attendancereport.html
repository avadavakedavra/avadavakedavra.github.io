<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Attendance Report — SEHR Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a18;--ink2:#2e2e2b;--ink3:#4a4a46;
  --cr:#f5f2eb;--c2:#ede9e0;--c3:#e4dfd4;
  --wh:#fdfcfa;--mu:#7a7970;--pa:#b0ada4;--ru:#d8d4cb;
  --li:#8BC53F;--l2:#72a530;--l3:#5e8a24;
  --lb:#f0f7e3;--lm:#c8e48e;
  --re:#dc2626;--rb:#fef2f2;--rm:#fca5a5;
  --am:#d97706;--ab:#fffbeb;
  --bl:#2563eb;--bb:#eff6ff;--bm:#bfdbfe;
  --f:'Open Sans',sans-serif;
  --fs:'Open Sans',sans-serif;
  --e1:cubic-bezier(.22,1,.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--f);background:var(--cr);color:var(--ink);font-size:14px;line-height:1.5;min-height:100vh}

@keyframes fIn  {from{opacity:0}to{opacity:1}}
@keyframes fUp  {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin {to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── TOPBAR ── */
.topbar{background:var(--ink);padding:0 28px;overflow:hidden;position:sticky;top:0;z-index:300;border-bottom:3px solid var(--li)}
.topbar::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03)1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.topbar::after{content:'';position:absolute;top:-80px;right:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(139,197,63,.1),transparent 60%);pointer-events:none}
.tb-inner{padding:18px 0 14px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:relative;z-index:1;flex-wrap:wrap}
.tb-l{}
.tb-kicker{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.tb-kr{width:22px;height:2px;background:var(--li)}
.tb-kt{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--li);opacity:.85}
.tb-h{font-size:clamp(18px,2.5vw,28px);font-weight:800;letter-spacing:-1px;color:#fff;line-height:1;margin-bottom:4px}
.tb-h i{font-style:italic;font-weight:300;color:var(--li)}
.tb-date{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.tb-date-big{font-size:clamp(18px,2.2vw,26px);font-weight:800;letter-spacing:-.6px;color:#fff;line-height:1;margin-bottom:3px}
.tb-date-big em{font-style:normal;color:var(--li)}
.tb-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-icon{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;border:none;font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-print-all{background:var(--li);color:var(--ink);box-shadow:0 3px 12px rgba(139,197,63,.3)}
.btn-print-all:hover{background:var(--l2)}
.btn-copy-all{background:var(--cr);color:var(--ink);border:1.5px solid var(--ru)!important}
.btn-copy-all:hover{border-color:var(--lm)!important;color:var(--l3)}
.btn-copy-all.copied{background:rgba(139,197,63,.12)!important;border-color:rgba(139,197,63,.3)!important;color:var(--l3)!important}
.btn-icon svg{width:13px;height:13px;flex-shrink:0}

/* ── VIEW TABS ── */
.view-tabs-bar{background:var(--wh);border-bottom:1.5px solid var(--c3);padding:12px 28px}
.view-tabs{display:flex;gap:8px}
.view-tab{padding:8px 18px;border-radius:20px;border:1.5px solid var(--ru);background:var(--cr);font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;color:var(--mu);transition:all .15s var(--e1)}
.view-tab:hover{border-color:var(--lm);color:var(--l3)}
.view-tab.active{background:var(--ink);border-color:var(--ink);color:#fff}

/* ── CONTROLS ── */
.controls{background:var(--wh);border-bottom:1.5px solid var(--c3);padding:14px 28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:72px;z-index:200}
.hist-month-sel{padding:8px 14px;border:1.5px solid var(--ru);border-radius:7px;background:var(--cr);font-family:var(--f);font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;min-width:190px;outline:none;transition:border-color .18s}
.hist-month-sel:hover{border-color:var(--lm)}
.hist-month-sel:focus{border-color:var(--li);box-shadow:0 0 0 3px rgba(139,197,63,.12)}

/* Date dropdown calendar */
.date-picker-wrap{position:relative}
.date-display{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1.5px solid var(--ru);border-radius:7px;background:var(--cr);cursor:pointer;font-family:var(--f);font-size:13px;font-weight:700;color:var(--ink);transition:all .18s;user-select:none;min-width:160px}
.date-display:hover{border-color:var(--lm)}
.date-display.open{border-color:var(--li);box-shadow:0 0 0 3px rgba(139,197,63,.12)}
.date-display-icon{color:var(--mu);flex-shrink:0}
.date-display-txt{flex:1}
.date-display-arrow{color:var(--pa);font-size:10px;transition:transform .2s}
.date-display.open .date-display-arrow{transform:rotate(180deg)}
.date-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:var(--wh);border:1.5px solid var(--c3);border-radius:10px;box-shadow:0 16px 40px rgba(0,0,0,.14);z-index:500;min-width:220px;overflow:hidden;display:none;animation:fIn .18s var(--e1)}
.date-dropdown.open{display:block}
/* Dims the summary/class content behind the open calendar so it doesn't
   look like the stat cards vanished — sits below .controls (z-index 200)
   and the dropdown itself (z-index 500), above unpositioned page content. */
.cal-backdrop{display:none;position:fixed;inset:0;background:rgba(15,15,13,.28);backdrop-filter:blur(1.5px);z-index:150}
.cal-backdrop.on{display:block}
.dd-head{background:var(--ink);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.dd-month-nav{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;padding:4px 8px;border-radius:4px;font-family:var(--f);font-size:13px;transition:color .15s}
.dd-month-nav:hover{color:#fff}
.dd-month-label{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.2px}
.dd-cal{padding:10px}
.dd-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.dd-dow{text-align:center;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--pa);padding:3px 0}
.dd-week{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dd-day{text-align:center;padding:6px 2px;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;color:var(--mu);transition:all .15s;position:relative}
.dd-day:hover:not(.empty):not(.other-month){background:var(--lb);color:var(--l3)}
.dd-day.has-data{color:var(--ink);font-weight:800}
.dd-day.has-data::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--li)}
.dd-day.selected{background:var(--li)!important;color:var(--ink)!important;font-weight:800}
.dd-day.selected::after{background:var(--ink)!important}
.dd-day.empty,.dd-day.other-month{color:var(--ru);cursor:default;pointer-events:none}
.dd-day.today{box-shadow:0 0 0 1.5px var(--lm) inset}

/* Ctrl sep */
.ctrl-sep{width:1px;height:24px;background:var(--ru);flex-shrink:0}
.ctrl-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mu)}

/* Class tabs */
.cls-tabs{display:flex;gap:6px;flex-wrap:wrap}
.cls-tab{padding:7px 16px;border-radius:6px;border:1.5px solid var(--ru);background:var(--cr);font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;color:var(--mu);transition:all .15s var(--e1)}
.cls-tab:hover{border-color:var(--lm);color:var(--l3)}
.cls-tab.active{background:var(--ink);border-color:var(--ink);color:#fff}

/* Board filter */
.board-tabs{display:flex;gap:5px}
.board-tab{padding:6px 14px;border-radius:6px;border:1.5px solid var(--ru);background:var(--cr);font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;color:var(--mu);transition:all .15s}
.board-tab:hover{border-color:var(--lm)}
.board-tab.active-all{background:var(--cr);border-color:var(--ru);color:var(--ink)}
.board-tab.active-state{background:var(--lb);border-color:rgba(139,197,63,.4);color:var(--l3)}
.board-tab.active-cbse{background:var(--bb);border-color:var(--bm);color:var(--bl)}

/* ── MAIN ── */
.main{padding:24px 28px 80px;max-width:1240px}

/* Summary bar */
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.sum-card{background:var(--wh);border:1px solid var(--c3);border-radius:8px;padding:14px 16px;display:flex;align-items:center;gap:12px;animation:cardIn .4s var(--e1)}
.sum-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sum-val{font-family:var(--fs);font-size:26px;line-height:1;letter-spacing:-.5px}
.sum-val.lim{color:var(--l2)}
.sum-val.grn{color:#16a34a}
.sum-val.red{color:var(--re)}
.sum-val.blu{color:var(--bl)}
.sum-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-top:3px}

/* class block */
.cls-block{background:var(--wh);border:1.5px solid var(--c3);border-radius:10px;overflow:hidden;margin-bottom:16px;animation:cardIn .35s var(--e1)}
.cls-hd{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--c3);flex-wrap:wrap;gap:10px}
.cls-num{font-family:var(--fs);font-size:32px;color:var(--ink);line-height:1;flex-shrink:0}
.cls-info{flex:1;min-width:0}
.cls-name{font-size:14px;font-weight:800;color:var(--ink)}
.cls-meta-sub{font-size:11px;color:var(--mu);margin-top:2px}
.cls-pills{display:flex;gap:6px;margin-left:auto;align-items:center;flex-wrap:wrap;flex-shrink:0}
.stat-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.stat-p{background:rgba(34,197,94,.1);color:#16a34a;border:1px solid rgba(34,197,94,.2)}
.stat-a{background:var(--rb);color:var(--re);border:1px solid var(--rm)}
.stat-pct{background:var(--bb);color:var(--bl);border:1px solid var(--bm)}
.cls-btns{display:flex;gap:6px;flex-shrink:0}
.btn-cls-pdf{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:5px;border:1.5px solid var(--ru);background:var(--cr);font-family:var(--f);font-size:11px;font-weight:700;color:var(--ink3);cursor:pointer;transition:all .15s}
.btn-cls-pdf:hover{border-color:var(--li);color:var(--l2)}
.btn-cls-copy{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:5px;border:1.5px solid var(--ru);background:var(--cr);font-family:var(--f);font-size:11px;font-weight:700;color:var(--ink);cursor:pointer;transition:all .15s}
.btn-cls-copy:hover{border-color:var(--lm);color:var(--l3)}
.btn-cls-copy.copied{background:rgba(139,197,63,.12);border-color:rgba(139,197,63,.3);color:var(--l3)}
.btn-cls-pdf svg,.btn-cls-copy svg{width:12px;height:12px;flex-shrink:0}

.cls-body{padding:16px}

/* board section */
.board-section{margin-bottom:14px}
.board-section:last-child{margin-bottom:0}
.board-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:5px;font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.board-tag.st{background:var(--lb);color:var(--l3);border:1px solid rgba(139,197,63,.25)}
.board-tag.cb{background:var(--bb);color:var(--bl);border:1px solid var(--bm)}
.board-tag-dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* student grid */
.stu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.sc{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1.5px solid var(--c3);background:var(--wh);position:relative;overflow:hidden;animation:cardIn .3s var(--e1) both}
.sc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:rgba(34,197,94,.5);border-radius:3px 0 0 3px}
.sc.ab{border-color:var(--rm);background:var(--rb)}
.sc.ab::before{background:var(--re)}
.sc-photo{width:40px;height:40px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1.5px solid var(--ru)}
.sc-mono{width:40px;height:40px;border-radius:8px;background:var(--ink2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--li);flex-shrink:0}
.sc.ab .sc-mono{background:var(--re);color:#fff}
.sc-info{flex:1;min-width:0}
.sc-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc.ab .sc-name{color:var(--re)}
.sc-id{font-size:10px;color:var(--mu);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-badge{flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 8px;border-radius:10px}
.sc-badge.p{background:rgba(34,197,94,.1);color:#16a34a}
.sc-badge.a{background:var(--rb);color:var(--re);border:1px solid rgba(220,38,38,.2)}

/* history table */
.hist-table{width:100%;border-collapse:collapse}
.hist-table th{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);padding:8px 10px;background:var(--cr);border-bottom:1px solid var(--c3);text-align:left}
.hist-table td{padding:8px 10px;border-bottom:1px solid var(--c2);font-size:12px;color:var(--ink2);vertical-align:middle}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr.low td{background:var(--rb)}
.hist-table tr.low td:nth-child(2){color:var(--re)}
.hist-photo{width:28px;height:28px;border-radius:6px;object-fit:cover;border:1.5px solid var(--ru);vertical-align:middle}
.hist-mono{width:28px;height:28px;border-radius:6px;background:var(--ink2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--li);vertical-align:middle}
.hist-pct-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;display:inline-block}

/* skeleton */
.skel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.skel{height:62px;border-radius:8px;background:linear-gradient(90deg,var(--c2) 0%,var(--c3) 50%,var(--c2) 100%);background-size:600px 100%;animation:shimmer 1.5s linear infinite}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}

/* empty */
.empty{text-align:center;padding:56px 20px;color:var(--mu)}
.empty-ico{font-size:36px;opacity:.25;margin-bottom:12px}
.empty-txt{font-size:16px;font-weight:700;color:var(--pa)}
.empty-sub{font-size:12px;color:var(--pa);margin-top:5px}

/* loading overlay */
.loading{display:flex;align-items:center;gap:10px;padding:32px;color:var(--mu);font-size:13px;font-weight:600}
.loading-spin{width:18px;height:18px;border:2px solid var(--c3);border-top-color:var(--li);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ── PRINT ── */
#printDoc{display:none}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  @page{margin:1.4cm 1.6cm;size:A4 portrait}
  html,body{background:#fff!important}
  body > *:not(#printDoc){display:none!important}
  #printDoc{display:block!important}
}
.pr-lh{display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:10px;border-bottom:2.5px solid var(--ink);margin-bottom:5px}
.pr-brand{font-size:16px;font-weight:900;letter-spacing:-.3px;color:var(--ink)}
.pr-brand span{color:var(--li)}
.pr-brand-sub{font-size:9px;color:var(--mu);margin-top:3px}
.pr-r-title{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);text-align:right}
.pr-r-sub{font-size:9px;color:var(--mu);margin-top:2px;text-align:right}
.pr-stripe{height:3px;background:linear-gradient(90deg,var(--l3),var(--li),var(--lm),var(--li),var(--l3));margin-bottom:16px}
.pr-h1{font-size:22px;font-weight:900;letter-spacing:-.8px;color:var(--ink);margin-bottom:3px}
.pr-h1 em{font-style:italic;font-weight:300;color:var(--l2)}
.pr-meta{font-size:10px;color:var(--mu);margin-bottom:14px}
.pr-summary{display:grid;grid-template-columns:repeat(4,1fr);border:1px solid var(--c3);border-radius:5px;overflow:hidden;margin-bottom:16px}
.pr-sc{padding:10px 8px;text-align:center;border-right:1px solid var(--c3)}
.pr-sc:last-child{border-right:none}
.pr-sv{font-size:20px;font-weight:900;color:var(--ink);line-height:1}
.pr-sv.lim{color:var(--l2)}
.pr-sv.grn{color:#16a34a}
.pr-sv.red{color:var(--re)}
.pr-sl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--pa);margin-top:3px}
.pr-cls-head{display:flex;align-items:center;gap:8px;margin:14px 0 8px;padding-bottom:6px;border-bottom:1.5px solid var(--ink);break-after:avoid}
.pr-board-block{break-inside:avoid;page-break-inside:avoid}
.pr-cls-num{font-size:18px;font-weight:900;color:var(--ink)}
.pr-cls-name{font-size:12px;font-weight:700;color:var(--ink)}
.pr-syl{font-size:9px;font-weight:700;padding:2px 8px;border-radius:3px;margin-left:auto}
.pr-syl.st{background:var(--lb);color:var(--l3)}
.pr-syl.cb{background:var(--bb);color:var(--bl)}
.pr-table{width:100%;border-collapse:collapse;margin-bottom:8px;break-inside:avoid}
.pr-table th{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);padding:7px 10px;background:var(--cr);border-bottom:1px solid var(--c3);text-align:left}
.pr-table td{padding:7px 10px;border-bottom:1px solid var(--c2);font-size:11px;color:var(--ink2);vertical-align:middle}
.pr-table tr:last-child td{border-bottom:none}
.pr-photo{width:28px;height:28px;border-radius:5px;object-fit:cover;border:1px solid var(--ru)}
.pr-mono{width:28px;height:28px;border-radius:5px;background:var(--ink);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--li)}
.pr-badge{display:inline-flex;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700}
.pr-badge.p{background:rgba(34,197,94,.1);color:#16a34a}
.pr-badge.a{background:var(--rb);color:var(--re);border:1px solid rgba(220,38,38,.18)}
.pr-footer{border-top:1px solid var(--c3);padding-top:9px;display:flex;justify-content:space-between;font-size:8px;color:var(--pa);margin-top:16px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-inner">
    <div class="tb-l">
      <div class="tb-kicker"><div class="tb-kr"></div><span class="tb-kt">SEHR Academy · Admin</span></div>
      <div class="tb-h">Attendance <i>Report</i></div>
      <div class="tb-date-big" id="tbDateBig">Loading…</div>
      <div class="tb-date" id="tbDate"></div>
    </div>
    <div class="tb-r">
      <button class="btn-icon btn-print-all" onclick="doPrintAll()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print Report
      </button>
      <button class="btn-icon btn-copy-all" id="btnCopyAll" onclick="copyAttSummary(this)">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        <span class="btn-lbl">Copy Summary</span>

<script>
var API     = 'https://script.google.com/macros/s/AKfycbxpxedvIrF7AiWQ1cIx-jWfxGkv0r1-Yl2rJtkaSdTdQtfEll9M0Sf6qQrqvB9x0I1_/exec';
var MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_S= ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DAYS_S  = ['Su','Mo','Tu','We','Th','Fr','Sa'];

/* ── STATE ── */
var ALL_RECORDS    = [];   // all fetched records
var AVAIL_DATES    = [];   // dates that have data
var PHOTO_MAP      = {};   // student_id → photo url
var ATT_PCT        = {};   // student_id → {pct, sessions, present}
var CUR_DATE       = '';
var CUR_CLS        = 'ALL';
var CUR_BOARD      = 'ALL';
var _NOW           = new Date();
var CAL_YEAR       = _NOW.getFullYear();
var CAL_MONTH      = _NOW.getMonth();
var ALL_CLASSES    = [];

/* history tab state */
var CUR_VIEW       = 'daily';
var HIST_CLS       = 'ALL';
var HIST_BOARD     = 'ALL';
var HIST_MONTH     = 'ALL';  // 'ALL' = entire history, else 'YYYY-MM'
var AVAIL_MONTHS   = [];

/* ── UTILS ── */
function g(id){ return document.getElementById(id); }
function mn(n){ return (n||'?').trim().split(/\s+/).map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2); }
function hide(id){ g(id).classList.add('hidden'); }
function show(id){ g(id).classList.remove('hidden'); }

function fmtLong(d){
  if(!d) return '';
  var p=d.split('-');
  var dt=new Date(+p[0],+p[1]-1,+p[2]);
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return days[dt.getDay()]+', '+parseInt(p[2])+' '+MONTHS[+p[1]-1]+' '+p[0];
}
function fmtShort(d){
  if(!d) return '';
  var p=d.split('-');
  return parseInt(p[2])+' '+MONTHS_S[+p[1]-1]+' '+p[0];
}

/* ── API ── */
function apiCall(payload, cb){
  var url = API + '?data=' + encodeURIComponent(JSON.stringify(payload));
  fetch(url)
    .then(function(r){ return r.text(); })
    .then(function(t){
      try{ cb(JSON.parse(t), null); }
      catch(e){ cb(null,'Parse error: '+t.slice(0,80)); }
    })
    .catch(function(e){ cb(null, e.message||'Network error'); });
}

/* ── ATTENDANCE PERCENTAGE ── */
function buildAttendancePct(){
  ATT_PCT = {};
  // Count sessions and present per student across all dates
  ALL_RECORDS.forEach(function(r){
    if(!ATT_PCT[r.student_id]) ATT_PCT[r.student_id] = {sessions:0, present:0, name:r.full_name};
    ATT_PCT[r.student_id].sessions++;
    if(r.status === 'Present') ATT_PCT[r.student_id].present++;
  });
  // Compute percentage
  Object.keys(ATT_PCT).forEach(function(id){
    var a = ATT_PCT[id];
    a.pct = a.sessions ? Math.round(a.present / a.sessions * 100) : 0;
  });
}

function pctBadge(studentId, cls){
  // Only show for Class 9 and 10
  if(cls !== '9' && cls !== '10') return '';
  var a = ATT_PCT[studentId];
  if(!a || !a.sessions) return '';
  var pct = a.pct;
  var col, bg, border;
  if(pct >= 75){
    col='#16a34a'; bg='rgba(34,197,94,.1)'; border='rgba(34,197,94,.2)';
  } else if(pct >= 50){
    col='#d97706'; bg='rgba(217,119,6,.1)'; border='rgba(217,119,6,.22)';
  } else {
    col='#dc2626'; bg='rgba(220,38,38,.09)'; border='rgba(220,38,38,.2)';
  }
  return '<span style="flex-shrink:0;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;'
    +'background:'+bg+';color:'+col+';border:1px solid '+border+'">'
    +pct+'%</span>';
}

/* ── INIT ── */
function init(){
  g('loadingEl').style.display='flex';
  // Fetch all records (no date filter) to get available dates + photo map
  apiCall({action:'getAttendance'}, function(data, err){
    g('loadingEl').style.display='none';
    if(err || !data || !data.success){
      g('classBlocks').innerHTML='<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-txt">Could not connect to sheet</div><div class="empty-sub">'+(err||data&&data.message||'Check your Apps Script deployment')+'</div></div>';
      return;
    }
    ALL_RECORDS  = data.records || [];
    AVAIL_DATES  = data.availableDates || [];

    // Build photo map from all records
    ALL_RECORDS.forEach(function(r){
      if(r.photo && r.photo.startsWith('http')) PHOTO_MAP[r.student_id] = r.photo;
    });

    // Build attendance percentage map for each student (all-time)
    buildAttendancePct();

    // Get unique classes
    var cset={};
    ALL_RECORDS.forEach(function(r){ cset[r.class]=true; });
    ALL_CLASSES = Object.keys(cset).sort();

    // Build class tabs
    buildClsTabs();
    buildHistClsTabs();
    buildMonthOptions();

    // Auto-select today if data exists, else most recent date
    var todayYMD = (function(){
      var t = new Date();
      return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
    })();
    if(AVAIL_DATES.indexOf(todayYMD) > -1){
      CUR_DATE = todayYMD;
    } else {
      CUR_DATE = AVAIL_DATES[0] || '';
    }

    // Set calendar to show the selected date's month
    if(CUR_DATE){
      var p = CUR_DATE.split('-');
      CAL_YEAR  = +p[0];
      CAL_MONTH = +p[1]-1;
    }
    renderCalendar();
    updateDateDisplay();
    render();
  });
}

/* ── CLASS TABS ── */
function buildClsTabs(){
  var tabs = g('clsTabs');
  tabs.innerHTML='<button class="cls-tab'+(CUR_CLS==='ALL'?' active':'')+'" data-cls="ALL" onclick="setCls(\'ALL\',this)">All</button>';
  ALL_CLASSES.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='cls-tab'+(c===CUR_CLS?' active':'');
    btn.dataset.cls=c;
    btn.textContent='Class '+c;
    btn.onclick=function(){ setCls(c,btn); };
    tabs.appendChild(btn);
  });
}

function setCls(cls, btn){
  CUR_CLS=cls;
  document.querySelectorAll('.cls-tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

function setBoard(board){
  CUR_BOARD=board;
  g('bt-all').className  ='board-tab'+(board==='ALL'  ? ' active-all'  :'');
  g('bt-state').className='board-tab'+(board==='STATE'? ' active-state':'');
  g('bt-cbse').className ='board-tab'+(board==='CBSE' ? ' active-cbse' :'');
  render();
}

/* ── VIEW SWITCH (Daily / History) ── */
function setView(view){
  CUR_VIEW=view;
  g('vtDaily').classList.toggle('active', view==='daily');
  g('vtHistory').classList.toggle('active', view==='history');
  g('dailyView').style.display   = view==='daily'   ? '' : 'none';
  g('historyView').style.display = view==='history' ? '' : 'none';
  if(view==='history'){
    renderHistory();
    g('tbDateBig').innerHTML='<em>Attendance</em> · History';
    g('tbDate').textContent='Cumulative attendance percentage by student';
  } else {
    updateDateDisplay();
  }
}

/* ── HISTORY: MONTH FILTER ── */
function monthLabel(m){
  var p=m.split('-');
  return MONTHS[+p[1]-1]+' '+p[0];
}

function buildMonthOptions(){
  var set={};
  ALL_RECORDS.forEach(function(r){ set[r.date.slice(0,7)]=true; });
  AVAIL_MONTHS = Object.keys(set).sort().reverse();
  var sel=g('histMonthSel');
  var opts='<option value="ALL">All Time (Entire History)</option>';
  AVAIL_MONTHS.forEach(function(m){ opts+='<option value="'+m+'">'+monthLabel(m)+'</option>'; });
  sel.innerHTML=opts;
  var curYM=_NOW.getFullYear()+'-'+String(_NOW.getMonth()+1).padStart(2,'0');
  HIST_MONTH = AVAIL_MONTHS.indexOf(curYM)>-1 ? curYM : 'ALL';
  sel.value=HIST_MONTH;
}

function onHistMonthChange(){
  HIST_MONTH=g('histMonthSel').value;
  renderHistory();
}

/* ── HISTORY: CLASS / BOARD FILTERS ── */
function buildHistClsTabs(){
  var tabs=g('histClsTabs');
  tabs.innerHTML='<button class="cls-tab'+(HIST_CLS==='ALL'?' active':'')+'" onclick="setHistCls(\'ALL\',this)">All</button>';
  ALL_CLASSES.forEach(function(c){
    var btn=document.createElement('button');
    btn.className='cls-tab'+(c===HIST_CLS?' active':'');
    btn.textContent='Class '+c;
    btn.onclick=function(){ setHistCls(c,btn); };
    tabs.appendChild(btn);
  });
}

function setHistCls(cls,btn){
  HIST_CLS=cls;
  g('histClsTabs').querySelectorAll('.cls-tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  renderHistory();
}

function setHistBoard(board){
  HIST_BOARD=board;
  g('hbt-all').className  ='board-tab'+(board==='ALL'  ? ' active-all'  :'');
  g('hbt-state').className='board-tab'+(board==='STATE'? ' active-state':'');
  g('hbt-cbse').className ='board-tab'+(board==='CBSE' ? ' active-cbse' :'');
  renderHistory();
}

/* ── HISTORY: STATS ── */
function computeHistoryStats(cls, board, month){
  var recs = ALL_RECORDS.filter(function(r){
    if(cls!=='ALL' && r.class!==cls) return false;
    if(board!=='ALL' && r.syllabus!==board) return false;
    if(month!=='ALL' && r.date.slice(0,7)!==month) return false;
    return true;
  });
  var map={};
  recs.forEach(function(r){
    if(!map[r.student_id]) map[r.student_id]={id:r.student_id,name:r.full_name,cls:r.class,syllabus:r.syllabus,sessions:0,present:0};
    map[r.student_id].sessions++;
    if(r.status==='Present') map[r.student_id].present++;
  });
  return Object.keys(map).map(function(k){
    var a=map[k];
    a.pct = a.sessions ? Math.round(a.present/a.sessions*100) : 0;
    return a;
  });
}

function histPctBadge(pct){
  var col,bg;
  if(pct>=75){col='#16a34a';bg='rgba(34,197,94,.1)';}
  else if(pct>=50){col='#d97706';bg='rgba(217,119,6,.1)';}
  else{col='#dc2626';bg='rgba(220,38,38,.09)';}
  return '<span class="hist-pct-badge" style="background:'+bg+';color:'+col+'">'+pct+'%</span>';
}

/* ── HISTORY: RENDER ── */
function renderHistory(){
  var stats = computeHistoryStats(HIST_CLS, HIST_BOARD, HIST_MONTH);
  var monthLbl = HIST_MONTH==='ALL' ? 'All Time (Entire History)' : monthLabel(HIST_MONTH);

  if(!stats.length){
    g('histSummaryBar').classList.add('hidden');
    g('historyBlocks').innerHTML='<div class="empty"><div class="empty-ico">📈</div><div class="empty-txt">No attendance data</div><div class="empty-sub">No records found for this selection.</div></div>';
    return;
  }

  var avgPct = Math.round(stats.reduce(function(s,a){return s+a.pct;},0)/stats.length);
  var below50 = stats.filter(function(a){return a.pct<50;}).length;

  g('histSummaryBar').classList.remove('hidden');
  g('histSummaryBar').innerHTML =
    sum(stats.length,'👥','lim','Students','rgba(139,197,63,.1)')+
    sum(avgPct+'%','📊','blu','Avg. Attendance','rgba(37,99,235,.07)')+
    sum(below50,'⚠️','red','Below 50%','rgba(220,38,38,.08)')+
    sum(monthLbl,'📅','grn','Period','rgba(34,197,94,.08)');

  var classes = HIST_CLS==='ALL'
    ? ALL_CLASSES.filter(function(c){ return stats.some(function(a){return a.cls===c;}); })
    : [HIST_CLS];

  var html='';
  classes.forEach(function(cls){
    var cstats=stats.filter(function(a){return a.cls===cls;});
    if(!cstats.length) return;
    var cAvg=Math.round(cstats.reduce(function(s,a){return s+a.pct;},0)/cstats.length);
    var cLow=cstats.filter(function(a){return a.pct<50;}).length;
    var syls=[...new Set(cstats.map(function(a){return a.syllabus;}))].sort(function(a,b){
        if(a==='STATE') return -1; if(b==='STATE') return 1; return a.localeCompare(b);
      });

    html+='<div class="cls-block">';
    html+='<div class="cls-hd">';
    html+='<div class="cls-num">'+cls+'</div>';
    html+='<div class="cls-info"><div class="cls-name">Class '+cls+'</div><div class="cls-meta-sub">'+monthLbl+' · '+cstats.length+' student'+(cstats.length>1?'s':'')+'</div></div>';
    html+='<div class="cls-pills">'
      +'<span class="stat-pill stat-pct">'+cAvg+'% avg</span>'
      +(cLow?'<span class="stat-pill stat-a">'+cLow+' below 50%</span>':'')
      +'</div>';
    html+='<div class="cls-btns">'
      +'<button class="btn-cls-pdf" onclick="doPrintHistoryClass(\''+cls+'\')">'
      +'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>PDF</button>'
      +'<button class="btn-cls-copy" onclick="copyAttendanceList(\''+cls+'\',this)">'
      +'<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg><span class="btn-lbl">Copy Attendance</span></button>'
      +'</div>';
    html+='</div>';

    html+='<div class="cls-body">';
    syls.forEach(function(syl){
      var srows=cstats.filter(function(a){return a.syllabus===syl;}).sort(function(a,b){return a.name.localeCompare(b.name);});
      html+='<div class="board-section">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        +'<div class="board-tag '+(syl==='STATE'?'st':'cb')+'"><div class="board-tag-dot"></div>'+syl+'</div>'
        +'</div>';
      html+='<table class="hist-table"><thead><tr><th style="width:34px"></th><th>Name</th><th>Sessions</th><th>Present</th><th>Attendance</th></tr></thead><tbody>';
      srows.forEach(function(a){
        var photo=PHOTO_MAP[a.id]||'';
        var av=photo
          ?'<img class="hist-photo" src="'+photo+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'inline-flex\'">'
            +'<div class="hist-mono" style="display:none">'+mn(a.name)+'</div>'
          :'<div class="hist-mono">'+mn(a.name)+'</div>';
        html+='<tr'+(a.pct<50?' class="low"':'')+'>'
          +'<td>'+av+'</td>'
          +'<td style="font-weight:600">'+a.name+'</td>'
          +'<td>'+a.sessions+'</td>'
          +'<td>'+a.present+'</td>'
          +'<td>'+histPctBadge(a.pct)+'</td>'
          +'</tr>';
      });
      html+='</tbody></table></div>';
    });
    html+='</div></div>';
  });

  g('historyBlocks').innerHTML=html;
}

/* ── CALENDAR ── */
function toggleCalendar(){
  var dd=g('dateDropdown'), disp=g('dateDisplay'), bd=g('calBackdrop');
  var open=dd.classList.toggle('open');
  disp.classList.toggle('open',open);
  bd.classList.toggle('on',open);
  if(open) renderCalendar();
}

function closeCalendar(){
  g('dateDropdown').classList.remove('open');
  g('dateDisplay').classList.remove('open');
  g('calBackdrop').classList.remove('on');
}

function calPrev(){ CAL_MONTH--; if(CAL_MONTH<0){CAL_MONTH=11;CAL_YEAR--;} renderCalendar(); }
function calNext(){ CAL_MONTH++; if(CAL_MONTH>11){CAL_MONTH=0;CAL_YEAR++;} renderCalendar(); }

function renderCalendar(){
  g('calMonthLabel').textContent = MONTHS[CAL_MONTH]+' '+CAL_YEAR;
  var firstDOW = new Date(CAL_YEAR, CAL_MONTH, 1).getDay();
  var daysInMonth = new Date(CAL_YEAR, CAL_MONTH+1, 0).getDate();
  var today = new Date();
  var todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  var html = '<div class="dd-dow-row">'+DAYS_S.map(function(d){return '<div class="dd-dow">'+d+'</div>';}).join('')+'</div>';

  // weeks
  var cells = [];
  for(var i=0;i<firstDOW;i++) cells.push({empty:true});
  for(var d=1;d<=daysInMonth;d++){
    var dStr = CAL_YEAR+'-'+String(CAL_MONTH+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    cells.push({d:d, str:dStr, hasData: AVAIL_DATES.indexOf(dStr)>-1, isToday:dStr===todayStr, isSel:dStr===CUR_DATE});
  }
  while(cells.length%7!==0) cells.push({empty:true});

  for(var w=0;w<cells.length;w+=7){
    html+='<div class="dd-week">';
    for(var wd=0;wd<7;wd++){
      var cell=cells[w+wd];
      if(cell.empty){ html+='<div class="dd-day empty"></div>'; continue; }
      var cls='dd-day';
      if(cell.hasData) cls+=' has-data';
      if(cell.isToday) cls+=' today';
      if(cell.isSel)   cls+=' selected';
      html+='<div class="'+cls+'" onclick="selectDate(\''+cell.str+'\')">'+cell.d+'</div>';
    }
    html+='</div>';
  }
  g('calGrid').innerHTML=html;
}

function selectDate(d){
  CUR_DATE = d;
  updateDateDisplay();
  renderCalendar();
  closeCalendar();
  render();
}

function updateDateDisplay(){
  g('dateDisplayTxt').textContent = CUR_DATE ? fmtShort(CUR_DATE) : 'Select date';
  if(CUR_DATE){
    var p=CUR_DATE.split('-');
    var dt=new Date(+p[0],+p[1]-1,+p[2]);
    var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    g('tbDateBig').innerHTML='<em>'+days[dt.getDay()]+'</em> · '+parseInt(p[2])+' '+months[+p[1]-1]+' '+p[0];
    g('tbDate').textContent='Viewing attendance for this date';
  } else {
    g('tbDateBig').textContent='Select a date';
    g('tbDate').textContent='';
  }
}

function render(){
  if(!CUR_DATE){ g('classBlocks').innerHTML='<div class="empty"><div class="empty-ico">📅</div><div class="empty-txt">Select a date</div><div class="empty-sub">Choose a date from the calendar above.</div></div>'; return; }

  // Filter records
  var rows = ALL_RECORDS.filter(function(r){
    if(r.date !== CUR_DATE) return false;
    if(CUR_CLS !== 'ALL' && r.class !== CUR_CLS) return false;
    if(CUR_BOARD !== 'ALL' && r.syllabus !== CUR_BOARD) return false;
    return true;
  });

  // Summary
  var total=rows.length, present=rows.filter(function(r){return r.status==='Present';}).length;
  var absent=total-present, pct=total?Math.round(present/total*100):0;

  g('summaryBar').classList.remove('hidden');
  g('summaryBar').innerHTML=
    sum(total,'👥','lim','Total','rgba(139,197,63,.1)')+
    sum(present,'✅','grn','Present','rgba(34,197,94,.08)')+
    sum(absent,'❌','red','Absent','rgba(220,38,38,.08)')+
    sum(pct+'%','📊','blu','Rate','rgba(37,99,235,.07)');

  // Classes to show
  var clsList = CUR_CLS==='ALL'
    ? ALL_CLASSES.filter(function(c){ return rows.some(function(r){return r.class===c;}); })
    : (rows.length ? [CUR_CLS] : []);

  if(!clsList.length || !rows.length){
    g('classBlocks').innerHTML='<div class="empty"><div class="empty-ico">📋</div><div class="empty-txt">No attendance data</div><div class="empty-sub">No records found for this selection.</div></div>';
    buildPrintDoc(rows, [], null);
    return;
  }

  var html='';
  clsList.forEach(function(cls){
    var cr=rows.filter(function(r){return r.class===cls;});
    if(!cr.length) return;
    var cp=cr.filter(function(r){return r.status==='Present';}).length;
    var ca=cr.length-cp;
    var cpct=cr.length?Math.round(cp/cr.length*100):0;
    var syls=[...new Set(cr.map(function(r){return r.syllabus;}))].sort(function(a,b){
        if(a==='STATE') return -1; if(b==='STATE') return 1; return a.localeCompare(b);
      });
    var markedBy=[...new Set(cr.map(function(r){return r.marked_by;}))].join(', ');

    html+='<div class="cls-block">';
    // header
    html+='<div class="cls-hd">';
    html+='<div class="cls-num">'+cls+'</div>';
    html+='<div class="cls-info">'
      +'<div class="cls-name">Class '+cls+'</div>'
      +'<div class="cls-meta-sub">Marked by: '+markedBy+' · '+cr[0].submitted_at+'</div>'
      +'</div>';
    html+='<div class="cls-pills">'
      +'<span class="stat-pill stat-p">'+cp+' Present</span>'
      +'<span class="stat-pill stat-a">'+ca+' Absent</span>'
      +'<span class="stat-pill stat-pct">'+cpct+'%</span>'
      +'</div>';
    html+='<div class="cls-btns">'
      +'<button class="btn-cls-pdf" onclick="doPrintClass(\''+cls+'\')">'
      +'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>PDF</button>'
      +'<button class="btn-cls-copy" onclick="copyClassSummary(\''+cls+'\',this)">'
      +'<svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg><span class="btn-lbl">Copy</span></button>'
      +'</div>';
    html+='</div>';

    // body — split by syllabus
    html+='<div class="cls-body">';
    syls.forEach(function(syl){
      var sr=cr.filter(function(r){return r.syllabus===syl;});
      var sp=sr.filter(function(r){return r.status==='Present';}).length;
      html+='<div class="board-section">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        +'<div class="board-tag '+(syl==='STATE'?'st':'cb')+'">'
        +'<div class="board-tag-dot"></div>'+syl
        +'</div>'
        +'<span style="font-size:11px;color:var(--mu)">'+sp+'/'+sr.length+' present</span>'
        +'</div>';
      html+='<div class="stu-grid">';
      sr.forEach(function(r,idx){
        var ab=r.status==='Absent';
        var photo = PHOTO_MAP[r.student_id] || r.photo || '';
        var av = photo
          ? '<img class="sc-photo" src="'+photo+'" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">'
            +'<div class="sc-mono" style="display:none">'+mn(r.full_name)+'</div>'
          : '<div class="sc-mono">'+mn(r.full_name)+'</div>';

/* ── CLASS SUMMARY (copy to clipboard) ── */
function buildClassSummaryText(rows, cls){
  var present=rows.filter(function(r){return r.status==='Present';});
  var absent =rows.filter(function(r){return r.status==='Absent';});
  var pct=rows.length?Math.round(present.length/rows.length*100):0;
  var syls=[...new Set(rows.map(function(r){return r.syllabus;}))].sort(function(a,b){
        if(a==='STATE') return -1; if(b==='STATE') return 1; return a.localeCompare(b);
      });
  var lines=[];
  lines.push('*SEHR Academy — Attendance Report*');
  lines.push('📅 '+fmtLong(CUR_DATE));
  lines.push('🏫 Class '+cls);
  lines.push('');
  lines.push('*Summary*');
  lines.push('✅ Present: '+present.length);
  lines.push('❌ Absent:  '+absent.length);
  lines.push('📊 Rate:    '+pct+'%');
  syls.forEach(function(syl){
    var sylAb=rows.filter(function(r){return r.syllabus===syl&&r.status==='Absent';});
    if(sylAb.length){
      lines.push('');
      lines.push('*'+syl+' Absent:*');
      sylAb.forEach(function(r,i){ lines.push((i+1)+'. '+r.full_name); });
    }
  });
  lines.push('');
  lines.push('_SEHR Academy Attendance System_');
  return lines.join('\n');
}

function copyClassSummary(cls,btn){
  var rows=ALL_RECORDS.filter(function(r){
    return r.date===CUR_DATE && r.class===cls && (CUR_BOARD==='ALL'||r.syllabus===CUR_BOARD);
  });
  if(!rows.length){alert('No data for Class '+cls);return;}
  var text=buildClassSummaryText(rows,cls);
  var lbl=btn.querySelector('.btn-lbl');
  function done(){
    btn.classList.add('copied');
    lbl.textContent='Copied!';
    setTimeout(function(){ btn.classList.remove('copied'); lbl.textContent='Copy'; },2000);
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){
      var ta=document.createElement('textarea');
      ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); done();
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); done();
  }
}

  });
  lines.push('');
  lines.push('_SEHR Academy Attendance System_');
  return lines.join('\n');
}

function copyAttendanceList(cls, btn){
  var stats=computeHistoryStats(cls, HIST_BOARD, HIST_MONTH);
  if(!stats.length){alert('No data for Class '+cls);return;}
  var text=buildAttendanceListText(stats, 'Class '+cls);
  copyTextGeneric(text, btn, 'Copy Attendance');
}

function copyAttendanceListAll(btn){
  var stats=computeHistoryStats(HIST_CLS, HIST_BOARD, HIST_MONTH);
  if(!stats.length){alert('No data for this selection');return;}
  var scopeLabel = HIST_CLS==='ALL' ? 'All Classes' : ('Class '+HIST_CLS);
  var text=buildAttendanceListText(stats, scopeLabel);
  copyTextGeneric(text, btn, 'Copy Summary');
}

function copyAttSummary(btn){
  if(CUR_VIEW==='history'){ copyAttendanceListAll(btn); return; }
  if(!CUR_DATE){alert('Select a date first');return;}
  var text=buildAttSummaryText();
  if(!text){alert('No data for this date');return;}
  var lbl=btn.querySelector('.btn-lbl');
  function done(){
    btn.classList.add('copied');
    lbl.textContent='Copied!';
    setTimeout(function(){ btn.classList.remove('copied'); lbl.textContent='Copy Summary'; },2000);
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){
      var ta=document.createElement('textarea');
      ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); done();
    });
  } else {
    var ta=document.createElement('textarea');
    ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); done();
  }
}

init();
</script>
